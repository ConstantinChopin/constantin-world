<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Odyssey — A Cosmos in Three Registers</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400;1,6..72,500&display=swap" rel="stylesheet">
<style>
  /* theme tokens — lifted from constantin.world (styles.css) */
  :root{
    --paper:#090d09; --ink:rgba(255,255,255,0.64); --ink-bright:rgba(247,244,236,0.94);
    --muted:#8d877d; --faint:rgba(255,255,255,0.30); --rule:rgba(255,255,255,0.12);
    --mark:rgb(143,119,54);
    --serif:"Newsreader",Georgia,"Times New Roman",serif;
  }
  html,body{margin:0;padding:0;background:var(--paper);height:100%;overflow:hidden;}
  *{box-sizing:border-box;}
  ::selection{background:rgba(143,119,54,0.22);}
  #stage{position:fixed;inset:0;background:var(--paper);overflow:hidden;font-family:var(--serif);}
  #mount{position:absolute;inset:0;}
  #svg{position:absolute;inset:0;z-index:5;pointer-events:none;opacity:0;transition:opacity .25s;width:100%;height:100%;}
  #legend{position:absolute;left:30px;bottom:30px;z-index:6;pointer-events:none;will-change:opacity;opacity:0;
    width:340px;max-width:86vw;padding:22px 22px 20px;border-radius:12px;
    transition:opacity .45s ease;
    background:linear-gradient(135deg,rgba(9,13,9,0.9) 0%,rgba(9,13,9,0.68) 70%,rgba(9,13,9,0.46) 100%);
    backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
    border:1px solid var(--rule);max-height:84vh;overflow-y:auto;}
  #legend.show{pointer-events:auto;}
  #legNum{font:500 9px var(--serif);letter-spacing:.2em;color:var(--mark);text-transform:uppercase;margin-bottom:8px;}
  #legTitle{font:500 27px var(--serif);color:var(--ink-bright);letter-spacing:-0.01em;margin-bottom:7px;line-height:1.08;text-shadow:0 1px 14px rgba(0,0,0,.9);}
  #legPlace{font:500 10px var(--serif);letter-spacing:.13em;color:var(--faint);text-transform:uppercase;margin-bottom:11px;}
  .reflHead{font:500 8.5px var(--serif);letter-spacing:.17em;color:var(--faint);text-transform:uppercase;margin-bottom:7px;}
  #legOrient{font:400 14.5px/1.6 var(--serif);color:var(--ink);text-shadow:0 1px 10px rgba(0,0,0,.9);margin-bottom:15px;}
  .reflHead2{margin-top:0;}
  #compareBtn,#backBtn{pointer-events:auto;cursor:pointer;background:transparent;
    border:1px solid var(--rule);color:var(--muted);border-radius:3px;padding:7px 13px;
    font:500 9.5px var(--serif);letter-spacing:.1em;text-transform:uppercase;transition:all .25s;}
  #compareBtn{margin-top:11px;}
  #compareBtn:hover,#backBtn:hover{border-color:var(--mark);color:var(--ink-bright);}
  #backBtn{margin-top:16px;border-color:var(--rule);color:var(--faint);}
  #readingWrap{display:none;margin-top:15px;}
  #noteBox{pointer-events:auto;width:100%;min-height:78px;resize:vertical;box-sizing:border-box;
    background:rgba(255,255,255,0.03);border:1px solid var(--rule);border-radius:4px;padding:9px 11px;
    font:400 14px/1.55 var(--serif);color:var(--ink-bright);outline:none;transition:border-color .25s;}
  #noteBox:focus{border-color:var(--mark);}
  #noteBox::placeholder{color:var(--faint);font-style:italic;}
  #relWrap{margin-bottom:15px;}
  #relLinks{display:flex;flex-wrap:wrap;gap:5px;}
  .relChip{pointer-events:auto;cursor:pointer;display:inline-flex;align-items:center;gap:5px;
    background:rgba(255,255,255,0.03);border:1px solid var(--rule);border-radius:13px;
    padding:3px 10px 3px 8px;font:400 11px var(--serif);color:var(--muted);transition:all .2s;white-space:nowrap;}
  .relChip:hover{border-color:var(--mark);color:var(--ink-bright);}
  .relChip .rdot{width:5px;height:5px;border-radius:50%;box-shadow:0 0 5px currentColor;flex:0 0 auto;}
  .relChip .rtype{font:500 7px var(--serif);letter-spacing:.08em;text-transform:uppercase;opacity:.5;}
  #legReading{font:400 14px/1.6 var(--serif);color:var(--muted);text-shadow:0 1px 9px rgba(0,0,0,.9);}
  #storeNote{font:500 8px var(--serif);letter-spacing:.08em;color:var(--faint);text-transform:uppercase;margin-top:13px;}
  #hint{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);z-index:6;pointer-events:none;
    font:500 10px var(--serif);letter-spacing:.2em;color:var(--faint);text-transform:uppercase;transition:opacity .8s;}
  #titlecard{position:absolute;top:26px;left:28px;z-index:6;pointer-events:none;transition:opacity 1.1s;}
  #titlecard .t{font:500 20px var(--serif);color:var(--ink-bright);letter-spacing:0;}
  #titlecard .s{font:500 8.5px var(--serif);letter-spacing:.26em;color:var(--mark);text-transform:uppercase;margin-top:5px;}
  /* register guide — the three planes named, right side */
  #registers{position:absolute;right:26px;top:50%;transform:translateY(-50%);z-index:6;pointer-events:none;
    display:flex;flex-direction:column;gap:0;opacity:0;transition:opacity 1s;}
  #registers .rg{display:flex;align-items:center;gap:9px;height:64px;}
  #registers .rl{font:500 9px var(--serif);letter-spacing:.17em;text-transform:uppercase;color:var(--faint);text-align:right;width:74px;}
  #registers .rb{width:1px;height:64px;background:linear-gradient(rgba(143,119,54,.02),rgba(143,119,54,.42),rgba(143,119,54,.02));}
  #err{position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;display:none;}
  #labels{position:absolute;inset:0;z-index:5;pointer-events:none;overflow:hidden;}
  .lab{position:absolute;transform:translate(-50%,-100%);will-change:transform,opacity;text-align:center;white-space:nowrap;transition:opacity .3s ease;pointer-events:auto;cursor:pointer;}
  .lab .lt{font:500 13.5px var(--serif);color:var(--ink-bright);letter-spacing:0;line-height:1.05;text-shadow:0 1px 8px rgba(0,0,0,.95),0 0 3px rgba(0,0,0,.85);}
  .lab .ls{font:500 7.5px var(--serif);letter-spacing:.12em;color:var(--faint);text-transform:uppercase;margin-top:2px;text-shadow:0 1px 7px rgba(0,0,0,.95);max-width:160px;white-space:normal;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.25;margin-left:auto;margin-right:auto;}
  .lab .dot{display:block;width:4px;height:4px;border-radius:50%;margin:0 auto 5px;box-shadow:0 0 6px currentColor;}
  .lab.anchor .lt{font-size:15.5px;}
  .lab.dim{opacity:.3;}
  .lab.dim .ls,.lab.normal .ls{display:none;}
  .lab.selected .lt{color:#fff;font-size:16px;}
  .lab.hover .ls,.lab.rel .ls{display:-webkit-box;}
  .lab.hover .lt{color:#fff;}
</style>
</head>
<body>
<div id="stage">
  <div id="mount"></div>
  <svg id="svg"></svg>
  <div id="labels"></div>
  <div id="legend">
    <div id="legNum"></div>
    <div id="legTitle"></div>
    <div id="legPlace"></div>
    <div id="legOrient"></div>
    <div id="relWrap">
      <div class="reflHead">Bound to this</div>
      <div id="relLinks"></div>
    </div>
    <div class="reflHead">Your note</div>
    <textarea id="noteBox" placeholder="What did you notice here?"></textarea>
    <button id="compareBtn" type="button">Compare with one reading ↓</button>
    <div id="readingWrap">
      <div class="reflHead reflHead2">One possible reading</div>
      <div id="legReading"></div>
    </div>
    <div id="storeNote"></div>
    <button id="backBtn" type="button">← back to the cosmos</button>
  </div>
  <div id="registers">
    <div class="rg"><div class="rl">the gods</div><div class="rb"></div></div>
    <div class="rg"><div class="rl">the sea</div><div class="rb"></div></div>
    <div class="rg"><div class="rl">the dead</div><div class="rb"></div></div>
  </div>
  <div id="titlecard">
    <div class="t">The Odyssey</div>
    <div class="s">Three registers — sky, sea, the dead</div>
  </div>
  <div id="hint">Drag to turn the cosmos · touch any star to enter it</div>
</div>
<div id="err"></div>

<script>
window.addEventListener('error', function(e){
  var d=document.getElementById('err'); d.style.display='block';
  d.textContent=(d.textContent?d.textContent+'\n':'')+'['+(e.message||e.type)+']';
});
// Load THREE (r128 UMD — sets window.THREE) with a fallback CDN.
(function(){
  var srcs=[
    'https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js',
    'https://unpkg.com/three@0.128.0/build/three.min.js'
  ];
  function load(i){
    if(i>=srcs.length){
      var d=document.getElementById('err'); d.style.display='block';
      d.textContent='Could not load the 3D library (THREE). Check your connection and reload.';
      var h=document.getElementById('hint'); if(h) h.textContent='3D library failed to load';
      return;
    }
    var s=document.createElement('script');
    s.src=srcs[i];
    s.onload=function(){ if(!window.THREE){ load(i+1); } };
    s.onerror=function(){ load(i+1); };
    document.head.appendChild(s);
  }
  load(0);
})();
</script>

<script>
(function(){
  'use strict';

  /* ============================================================
     THE ODYSSEY — A COSMOS IN THREE REGISTERS
     ------------------------------------------------------------
     The poem is not a flat plane. It is stacked on a vertical axis:
       the gods, above  — they descend at will, usually disguised
       the sea, the broad middle — where the wandering runs flat
       the dead, below  — reached once, at a single gate
     Verticality is rare and charged; who may cross, and which way,
     is the argument. The structure is fixed and fully lit. Your
     logbook thread runs through whatever you have noted, dropping
     to the dead or rising to the gods wherever your reading crossed.
     ============================================================ */

  // ---- THE POPULATION ----
  const E=[]; function ent(o){ E.push(o); return o; }

  // --- EPISODES (the 15 places — the sea) ---
  ent({ id:'troy', type:'episode', name:'Troy', sub:'Hisarlık · the departure', lon:26.24, lat:39.96,
    gods:['athena'], people:['odysseus'], concepts:['kleos','nostos'],
    orient:'The departure. The war is over; the wandering has not begun. Everything that follows is measured from here.',
    reading:'One of the two fixed pins the poem hangs between. Not part of the wandering — the thing the wandering is trying to get away from. Home from here is short on the map and ten years long in the living.' });
  ent({ id:'ismarus', type:'episode', name:'Ismarus', sub:'the Cicones · the first raid', lon:25.52, lat:40.87,
    gods:['zeus'], people:['odysseus','crew'], concepts:['xenia','hybris'],
    orient:'The first landfall, and the first mistake. Still in the known world, still acting like men at war.',
    reading:'The hinge between the Iliad and the Odyssey: Odysseus behaves as a sacker of cities and is punished for it. The rules have changed — what worked at Troy now gets his men killed.' });
  ent({ id:'malea', type:'episode', name:'Cape Malea', sub:'the storm westward', lon:23.19, lat:36.43,
    gods:['poseidon','zeus'], people:['odysseus','crew'], concepts:['nostos'],
    orient:'The last familiar water. Round this cape and the map turns strange.',
    reading:'He almost goes straight home. A storm seizes the fleet and throws it west, out of the known Aegean into the strange central Mediterranean. One gust converts a short voyage into an odyssey.' });
  ent({ id:'lotus', type:'episode', name:'The Lotus-Eaters', sub:'Djerba · the flower of forgetting', lon:10.85, lat:33.80,
    gods:[], people:['odysseus','crew'], concepts:['memory','nostos'],
    orient:'The first temptation. No violence — only a flower that makes you forget you were going anywhere.',
    reading:'The poem’s first taste of its real antagonist: not a monster but amnesia. The danger is not death; it is forgetting you wanted to go home at all. Home becomes a word with no pull.' });
  ent({ id:'cyclops', type:'episode', name:'The Cyclops', sub:'Sicily · the cave of Polyphemus', lon:15.16, lat:37.56,
    gods:['poseidon'], people:['odysseus','crew'], concepts:['metis','xenia','hybris','naming'],
    orient:'The cave of the one-eyed giant, where strength fails and only cunning gets out.',
    reading:'Against brute force, metis. He gives his name as "Nobody," blinds Polyphemus, escapes beneath a ram. But pride makes him shout his true name from the ship, and that boast buys him Poseidon’s ten-year grudge. He weaponises identity, and is billed for it.' });
  ent({ id:'aeolia', type:'episode', name:'Aeolia', sub:'the bag of winds', lon:15.21, lat:38.79,
    gods:['aeolus'], people:['odysseus','crew'], concepts:['nostos','memory'],
    orient:'The island of the wind-king, and the cruellest near-miss in the poem.',
    reading:'Aeolus bags every contrary wind and gives Odysseus a clear run home; Ithaca rises on the horizon — and the crew, suspecting gold, open the bag. The winds blow them all the way back. Home reached and lost, in a single loop.' });
  ent({ id:'laistry', type:'episode', name:'The Laestrygonians', sub:'the fleet destroyed', lon:9.16, lat:41.39,
    gods:[], people:['odysseus','crew'], concepts:['xenia','margin'],
    orient:'The far north of the wandering, where hospitality turns to slaughter and the fleet is destroyed.',
    reading:'Cannibal giants sink eleven of twelve ships. The threshold past which the world stops being human — where xenia curdles entirely into predation, and Odysseus is left with a single crew.' });
  ent({ id:'circe', type:'episode', name:'Circe', sub:'Aeaea · the enchantress', lon:13.09, lat:41.24,
    gods:['kirke','hermes'], people:['odysseus','crew'], concepts:['memory','metis'],
    orient:'The enchantress’s island — a year of ease, and the doorway to the dead.',
    reading:'Circe turns men to swine, then becomes a guide. Two faces of one lure: the year of comfortable forgetting, and the instruction that sends him to the underworld. To go home he must first be told to go down.' });
  ent({ id:'nekuia', type:'episode', name:'The House of the Dead', sub:'the one descent', lon:14.07, lat:40.84,
    gods:['hades','teiresias'], people:['odysseus','anticleia','achilles'], concepts:['memory','nostos'],
    orient:'The gate where you leave the surface of the world. The one place the poem’s plane is broken — the thread goes down.',
    reading:'Here, and only here, the poem leaves the surface. He goes down for directions home — to Teiresias, to his mother’s shade, to Achilles, who would rather be a slave alive than a king among the dead. The descent teaches him what living is worth.' });
  ent({ id:'sirens', type:'episode', name:'The Sirens', sub:'the bound mast', lon:14.43, lat:40.58,
    gods:[], people:['odysseus','crew'], concepts:['memory','metis','margin'],
    orient:'The singing rocks, where the danger is knowledge itself — and the only safety is being bound.',
    reading:'The Sirens offer total knowing; their song is that they know everything that happened at Troy. Odysseus is lashed to the mast so he can hear it and survive — the one temptation he faces directly, by making himself unable to act on it.' });
  ent({ id:'scylla', type:'episode', name:'Scylla & Charybdis', sub:'the strait of no clean passage', lon:15.63, lat:38.25,
    gods:[], people:['odysseus','crew'], concepts:['margin','metis'],
    orient:'The strait with no clean passage, where the only choice is which loss to accept.',
    reading:'Between the six-headed Scylla and the whirlpool there is no route that costs nothing. He is told in advance: steer for Scylla, lose six men, save the ship. At the margins, the only victory is the smaller loss, chosen with open eyes.' });
  ent({ id:'thrina', type:'episode', name:'Thrinacia', sub:'the cattle of the Sun', lon:14.27, lat:37.08,
    gods:['helios'], people:['odysseus','crew'], concepts:['xenia','hybris'],
    orient:'The Sun’s island, where one act of hunger ends the last of the crew.',
    reading:'Forbidden the cattle of Helios and warned plainly, the starving crew eat them anyway. Every man but Odysseus drowns for it. This is where he becomes truly alone — the rest of the way home made by himself.' });
  ent({ id:'ogygia', type:'episode', name:'Ogygia', sub:'Calypso · seven years', lon:14.24, lat:36.05,
    gods:['calypso','athena'], people:['odysseus','calypso'], concepts:['memory','nostos','kleos'],
    orient:'The end of the wandering — seven years held by a goddess who offers to make him immortal.',
    reading:'Calypso offers the ultimate lure: not a year of forgetting but eternity, deathlessness, oblivion as a gift. He refuses. He chooses mortal Penelope and a home that can be lost over an immortality without meaning — the poem’s deepest answer to what a life is for.' });
  ent({ id:'scheria', type:'episode', name:'Scheria', sub:'the Phaeacian court', lon:19.92, lat:39.62,
    gods:['athena','poseidon'], people:['odysseus','nausicaa'], concepts:['xenia','kleos'],
    orient:'The last island before home — the safe court where Odysseus becomes the teller of his own wandering.',
    reading:'The wildest stretch you never hear from Homer. You hear it from Odysseus, telling his story to the Phaeacian court. The teller is inside the telling, and the only witness to the marvels is the man they make a hero.' });
  ent({ id:'ithaca', type:'episode', name:'Ithaca', sub:'home · recognition', lon:20.72, lat:38.36,
    gods:['athena'], people:['odysseus','penelope','telemachus'], concepts:['nostos','recognition','kleos'],
    orient:'Home at last — but disguised, unrecognised, a beggar in his own hall. Arriving is not yet returning.',
    reading:'Homecoming is not arrival; it is being known — by his dog, his scar, his bow, and last by Penelope, who tests him with the secret of their immovable bed. The journey ends not at a place but at a moment of being seen. Completion is recognition.' });

  // --- GODS / POWERS ---
  ent({ id:'athena', type:'god', name:'Athena', sub:'grey-eyed · cunning made divine',
    gods:[], people:['odysseus','telemachus'], concepts:['metis','recognition'],
    orient:'Odysseus’ patron and protector — the goddess of exactly the intelligence he embodies. She descends to stand at his shoulder, disguised.',
    reading:'Athena is metis raised to the divine: she loves Odysseus because he thinks as she does. She engineers his return, disguises him, and stages the recognition. If Poseidon is the wrath that delays, she is the cunning that delivers.' });
  ent({ id:'poseidon', type:'god', name:'Poseidon', sub:'earth-shaker · the wrath that delays',
    gods:[], people:['odysseus'], concepts:['margin','hybris'],
    orient:'Not a god above but the sea itself, turned against him — the antagonist who is the very medium he must cross.',
    reading:'Blinding the Cyclops, Poseidon’s son, earns Odysseus the god’s undying enmity. Poseidon cannot kill him — fate forbids it — but he can make the sea long. He is the friction the whole voyage works against, beneath the surface the whole way.' });
  ent({ id:'zeus', type:'god', name:'Zeus', sub:'the scales · justice and the storm',
    gods:[], people:[], concepts:['xenia','hybris'],
    orient:'The keeper of the order the poem keeps testing — guest-right, oath, and the limits of men. The highest of the sky.',
    reading:'Zeus presides over xenia and over justice. The storms that punish the raid on the Cicones and the slaughter of the Sun’s cattle are his. He is the cosmic ledger the human actions are weighed against.' });
  ent({ id:'hermes', type:'god', name:'Hermes', sub:'the messenger · the timely gift',
    gods:[], people:['odysseus','calypso'], concepts:['metis'],
    orient:'The crosser of boundaries — the one god whose nature is the descent itself, carrying word from sky to sea.',
    reading:'Hermes appears at thresholds: he gives Odysseus the moly that defeats Circe’s magic, and carries Zeus’s command that Calypso release him. The god of passage, he unlocks the doors the plot is stuck behind.' });
  ent({ id:'calypso', type:'god', name:'Calypso', sub:'the nymph · deathless oblivion',
    gods:[], people:['odysseus'], concepts:['memory','nostos'],
    orient:'A goddess not of the sky but of one island in the sea — who offers immortality, and so poses the poem’s deepest question.',
    reading:'Calypso is not cruel; she loves him and offers eternity. Her island is the sharpest form of the lure — to stop being mortal, to stop going home, to be held forever outside time. His refusal defines what the poem thinks a human is.' });
  ent({ id:'kirke', type:'god', name:'Circe (the goddess)', sub:'witch and guide',
    gods:[], people:['odysseus'], concepts:['memory','metis'],
    orient:'An island-power of the sea’s own plane — witch first, guide second, who must be mastered before she helps.',
    reading:'Circe turns men to beasts, then, once met as an equal, becomes the one who charts the way to the dead and past the Sirens. She is the threshold-power who turns from obstacle to ally the moment Odysseus refuses to be transformed.' });
  ent({ id:'helios', type:'god', name:'Helios', sub:'the Sun · the inviolable cattle',
    gods:[], people:[], concepts:['xenia','hybris'],
    orient:'The all-seeing Sun, highest witness of the sky, whose herds are the one thing the starving crew must not touch.',
    reading:'Helios sees everything and forgets nothing. His cattle are a test laid plainly before the crew; their hunger fails it, and he demands their destruction. He is the limit that does not bend, the line that ends the last of the men.' });
  ent({ id:'aeolus', type:'god', name:'Aeolus', sub:'keeper of the winds',
    gods:[], people:['odysseus'], concepts:['nostos'],
    orient:'The wind-king of the upper air, whose gift is squandered at the very threshold of home.',
    reading:'Aeolus hands Odysseus a clear run home, every contrary wind tied in a bag. It is the kindest gift in the poem and the most wasted — opened by the crew within sight of Ithaca. He is generosity undone by mistrust.' });
  ent({ id:'hades', type:'god', name:'The Dead', sub:'the house of Hades',
    gods:[], people:['anticleia','achilles','teiresias'], concepts:['memory','nostos'],
    orient:'Not a god but a realm — the country of the dead below the sea, reached at one gate, by one man, alive.',
    reading:'The house of Hades is the one place below the world’s surface. The dead crowd to the blood; the prophet, the mother, the great Achilles all speak. It is where the poem measures the worth of a mortal life by showing the alternative.' });

  // --- PEOPLE ---
  ent({ id:'odysseus', type:'person', name:'Odysseus', sub:'the man of many turns',
    gods:['athena','poseidon'], people:[], concepts:['metis','nostos','naming','kleos'],
    orient:'The heart of the sea — polytropos, the man of many turns, around whom every register arranges.',
    reading:'Cunning, enduring, many-sided — defined by metis and by the will to get home. Every god takes a side over him, every character is measured by loyalty to him, every concept is something he embodies or resists. He is the gravity the whole poem orbits.' });
  ent({ id:'penelope', type:'person', name:'Penelope', sub:'the one who waits and tests',
    gods:['athena'], people:['odysseus','telemachus'], concepts:['recognition','nostos'],
    orient:'At Ithaca, the fixed home-point — not passive but the mirror of his cunning, the weaver, the setter of the final test.',
    reading:'Penelope matches Odysseus in metis: the shroud unwoven each night, the contest of the bow, the trick of the marriage bed that only the true husband can fail to be fooled by. Recognition — the poem’s idea of completion — is hers to grant.' });
  ent({ id:'telemachus', type:'person', name:'Telemachus', sub:'the son coming of age',
    gods:['athena'], people:['odysseus','penelope'], concepts:['recognition','kleos'],
    orient:'At Ithaca — the son who must become a man before the father can return — the poem’s other journey.',
    reading:'The first four books are his: a boy goaded by Athena into seeking news of his father, growing into someone who can stand beside him. His coming-of-age is the quiet structure beneath the wandering.' });
  ent({ id:'crew', type:'person', name:'The Crew', sub:'the companions, all lost',
    gods:[], people:['odysseus'], concepts:['hybris','nostos'],
    orient:'Strung along the route — the companions who do not make it, every one lost, often by their own hand.',
    reading:'The crew are the poem’s running grief: drowned, eaten, transformed, undone by the bag of winds and the Sun’s cattle. They are the cost of the journey and the foil to Odysseus’ survival — the many who do not come home.' });
  ent({ id:'penlpe_suitors', type:'person', name:'The Suitors', sub:'the devourers of the house',
    gods:[], people:['penelope'], concepts:['xenia','hybris'],
    orient:'At Ithaca — the men eating Odysseus’ household alive, guest-right turned to parasitism.',
    reading:'The suitors are xenia inverted: guests who consume their host. Their slaughter in the hall is the violent restoration of the order they broke. They are the rot the return must cut out.' });

  const byId = Object.fromEntries(E.map(e=>[e.id,e]));

  const REG = {
    zeus:'sky', athena:'sky', hermes:'sky', helios:'sky', aeolus:'sky',
    poseidon:'deep', kirke:'isle', calypso:'isle',
    hades:'under', anticleia:'under', achilles:'under', teiresias:'under',
    odysseus:'sea', penelope:'sea', telemachus:'sea', crew:'sea', penlpe_suitors:'sea', nausicaa:'sea'
  };
  function regOf(e){ if(e.type==='episode') return 'sea'; if(e.type==='concept') return 'concept'; return REG[e.id]||'sea'; }

  // ---- palette ----
  const COL = { episode:[0.86,0.80,0.62], god:[0.86,0.70,0.36], person:[0.62,0.80,0.86], concept:[0.70,0.55,0.84] };
  const GOD_COL = {
    poseidon:[0.40,0.60,0.86], athena:[0.86,0.82,0.55], zeus:[0.92,0.84,0.52], hermes:[0.62,0.86,0.74],
    calypso:[0.74,0.55,0.84], kirke:[0.80,0.52,0.70], helios:[0.98,0.84,0.46], aeolus:[0.66,0.82,0.88]
  };
  const CONCEPT_COL = {
    nostos:[0.95,0.80,0.42], metis:[0.86,0.70,0.36], xenia:[0.92,0.89,0.80], memory:[0.62,0.40,0.78],
    recognition:[0.95,0.85,0.62], kleos:[0.80,0.78,0.70], hybris:[0.80,0.40,0.34], naming:[0.70,0.80,0.55],
    margin:[0.72,0.33,0.29]
  };
  const UNDER_COL = [0.58,0.50,0.70];

  // deterministic small offset (no Math.random in the layout — the sky is constant)
  function doff(i,amp){ return [Math.cos(i*2.39996)*amp, Math.sin(i*2.39996*1.7)*amp]; }
  function mulberry32(a){ return function(){ a|=0; a=a+0x6D2B79F5|0; let t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }

  function dotTexture(THREE){
    const s=64,cv=document.createElement('canvas'); cv.width=cv.height=s;
    const g=cv.getContext('2d'); const grd=g.createRadialGradient(s/2,s/2,0,s/2,s/2,s/2);
    grd.addColorStop(0,'rgba(255,255,255,1)'); grd.addColorStop(0.35,'rgba(255,255,255,0.85)');
    grd.addColorStop(0.7,'rgba(255,255,255,0.25)'); grd.addColorStop(1,'rgba(255,255,255,0)');

  }

  function project(lon,lat,lon0,lat0,scale){
    const x=(lon-lon0)*Math.cos(lat0*Math.PI/180)*scale;
    const z=-(lat-lat0)*scale;
    return [x,z];
  }

  /* ============================================================
     THE COSMOS — one fixed, deterministic layout.
       sea  (y=0)      : the 15 episodes at real lon/lat
       isle (y~+0.35)  : island-goddesses on their own islands
       deep (y~-0.9)   : Poseidon, beneath his waters
       sky  (y~+4.8)   : the Olympians, above the region they govern
       under(y~-4)     : the dead, in a lobe beneath the Nekuia gate
     Concepts have no register — they are readings, not places.
     ============================================================ */
  const SKY_Y=4.8, DEEP_Y=-0.95, ISLE_Y=0.35, UNDER_Y=-4.0;
  function layoutCosmos(){
    const eps=E.filter(e=>e.type==='episode');
    const lons=eps.map(e=>e.lon), lats=eps.map(e=>e.lat);
    const lon0=(Math.min(...lons)+Math.max(...lons))/2, lat0=(Math.min(...lats)+Math.max(...lats))/2;
    const scale=0.62, sea={};
    eps.forEach(e=>{ sea[e.id]=project(e.lon,e.lat,lon0,lat0,scale); });
    const govXZ=(id)=>{ const es=eps.filter(ep=>(ep.gods||[]).indexOf(id)>=0); if(!es.length) return [0,0];
      let x=0,z=0; es.forEach(ep=>{ x+=sea[ep.id][0]; z+=sea[ep.id][1]; }); return [x/es.length,z/es.length]; };
    const centroid=(ids)=>{ let x=0,z=0; ids.forEach(id=>{ x+=sea[id][0]; z+=sea[id][1]; }); return [x/ids.length,z/ids.length]; };
    const pos={};
    // sea — episodes
    eps.forEach(e=>{ pos[e.id]=[sea[e.id][0], 0, sea[e.id][1]]; e.col=COL.episode; });
    // sky — Olympians, lifted above the region they touch
    ['zeus','athena','hermes','helios','aeolus'].forEach((id,i)=>{ if(!byId[id])return;
      const g=govXZ(id), o=doff(i,0.7); pos[id]=[g[0]+o[0], SKY_Y+(i%3)*0.55, g[1]+o[1]]; byId[id].col=GOD_COL[id]||COL.god; });
    // deep — Poseidon beneath his waters
    if(byId['poseidon']){ const g=govXZ('poseidon'); pos['poseidon']=[g[0],DEEP_Y,g[1]]; byId['poseidon'].col=GOD_COL.poseidon; }
    // isle — island-goddesses on their islands
    if(byId['calypso']){ pos['calypso']=[sea['ogygia'][0],ISLE_Y,sea['ogygia'][1]]; byId['calypso'].col=GOD_COL.calypso; }
    if(byId['kirke']){ pos['kirke']=[sea['circe'][0],ISLE_Y,sea['circe'][1]]; byId['kirke'].col=GOD_COL.kirke; }
    // under — the dead, a lobe beneath the Nekuia gate
    const gate=sea['nekuia'];
    if(byId['hades']){ pos['hades']=[gate[0],UNDER_Y,gate[1]]; byId['hades'].col=UNDER_COL; }
    ['anticleia','achilles','teiresias'].forEach((id,i)=>{ if(!byId[id])return;
      const o=doff(i+1,1.05); pos[id]=[gate[0]+o[0], UNDER_Y+0.55-(i*0.4), gate[1]+o[1]]; byId[id].col=UNDER_COL; });
    // sea — people near their principal place
    if(byId['odysseus']){ const c=centroid(eps.map(e=>e.id)); pos['odysseus']=[c[0],0,c[1]]; byId['odysseus'].col=[0.95,0.86,0.6]; }
    const ith=sea['ithaca'];
    [['penelope',0],['telemachus',1],['penlpe_suitors',2]].forEach(p=>{ const id=p[0],i=p[1]; if(!byId[id])return;
      const o=doff(i+4,0.75); pos[id]=[ith[0]+o[0],0,ith[1]+o[1]]; byId[id].col=COL.person; });
    if(byId['nausicaa']){ pos['nausicaa']=[sea['scheria'][0],0,sea['scheria'][1]]; byId['nausicaa'].col=COL.person; }
    if(byId['crew']){ const c=centroid(['cyclops','sirens','thrina']); pos['crew']=[c[0],0,c[1]]; byId['crew'].col=COL.person; }
    // concepts — no home; parked, never drawn
    E.filter(e=>e.type==='concept').forEach(e=>{ pos[e.id]=[0,0,0]; e.col=CONCEPT_COL[e.id]||COL.concept; });
    return pos;
  }

  // related entities of e, as a de-duped list (for chips, lines, highlight)
  function relationsOf(e){
    const out=[], seen={};
    function add(ids){ (ids||[]).forEach(id=>{ if(id&&id!==e.id&&byId[id]&&!seen[id]){ seen[id]=1; out.push(byId[id]); } }); }
    add(e.gods); add(e.people); add(e.concepts);
    if(e.type!=='episode'){ E.forEach(x=>{ if(x.type==='episode'){ const r=[].concat(x.gods||[],x.people||[],x.concepts||[]); if(r.indexOf(e.id)>=0) add([x.id]); } }); }
    return out;
  }

  /* ============================================================ RENDER ENGINE ============================================================ */
  function init(){
    const THREE=window.THREE;
    const mount=document.getElementById('mount');
    const legend=document.getElementById('legend'), legNum=document.getElementById('legNum'),
          legTitle=document.getElementById('legTitle'), legPlace=document.getElementById('legPlace'),
          legOrient=document.getElementById('legOrient'), noteBox=document.getElementById('noteBox'),
          compareBtn=document.getElementById('compareBtn'), readingWrap=document.getElementById('readingWrap'),
          legReading=document.getElementById('legReading'), backBtn=document.getElementById('backBtn'),
          storeNote=document.getElementById('storeNote');
    const svg=document.getElementById('svg');
    const hint=document.getElementById('hint'), titlecard=document.getElementById('titlecard');

    /* ---- persistence (notes keyed by entity id; logbook = visit order) ---- */
    const memStore={}; let storeMode='memory';
    (function(){ try{ const k='__od_probe'; localStorage.setItem(k,'1'); localStorage.removeItem(k); storeMode='local'; }catch(e){ storeMode='memory'; } })();
    function lsGet(k){ if(storeMode==='local'){ try{ return localStorage.getItem(k); }catch(e){} } return (k in memStore)?memStore[k]:null; }
    function lsSet(k,v){ if(storeMode==='local'){ try{ localStorage.setItem(k,v); return; }catch(e){} } memStore[k]=v; }
    function getNote(id){ return lsGet('od_note_'+id)||''; }
    function setNote(id,v){ lsSet('od_note_'+id,v); }
    function getLog(){ try{ return JSON.parse(lsGet('od_log')||'[]'); }catch(e){ return []; } }
    function setLog(a){ lsSet('od_log',JSON.stringify(a)); }
    function recordVisit(id){ if(!getNote(id)) return; const l=getLog(); if(l.indexOf(id)===-1){ l.push(id); setLog(l); } }
    function logCrossing(fromId,toId){ try{ const k='od_crossings'; const arr=JSON.parse(lsGet(k)||'[]'); arr.push({from:fromId,to:toId}); lsSet(k,JSON.stringify(arr)); }catch(e){} }

    const relLinksEl=document.getElementById('relLinks');
    let current=null;            // open entity
    let relatedIds={};           // ids highlighted while a room is open

    function typeColor(t){ return COL[t]||[0.7,0.7,0.8]; }
    function rgbCss(c){ return 'rgb('+Math.round(c[0]*255)+','+Math.round(c[1]*255)+','+Math.round(c[2]*255)+')'; }

    function buildRelChips(e){
      relLinksEl.innerHTML='';
      const rels=relationsOf(e);
      if(!rels.length){ document.getElementById('relWrap').style.display='none'; return; }
      document.getElementById('relWrap').style.display='block';
      rels.forEach(r=>{
        const chip=document.createElement('div'); chip.className='relChip';
        const dot=document.createElement('span'); dot.className='rdot'; dot.style.color=rgbCss(r.col||typeColor(r.type));
        const nm=document.createElement('span'); nm.textContent=r.name;
        const ty=document.createElement('span'); ty.className='rtype'; ty.textContent=r.type;
        chip.appendChild(dot); chip.appendChild(nm); chip.appendChild(ty);
        chip.addEventListener('click',ev=>{ ev.stopPropagation(); if(current) logCrossing(current.id,r.id); enterRoom(r); });
        relLinksEl.appendChild(chip);
      });
    }

    function enterRoom(e){
      if(current && current.id!==e.id){ setNote(current.id,noteBox.value); recordVisit(current.id); }
      current=e;
      legNum.textContent = (e.type==='concept'?'CONCEPT · A READING':e.type.toUpperCase()+' · '+regOf(e).toUpperCase());
      legTitle.textContent=e.name; legPlace.textContent=e.sub||'';
      legOrient.textContent=e.orient||'';
      legReading.textContent=e.reading||'';
      buildRelChips(e);
      noteBox.value=getNote(e.id);
      readingWrap.style.display='none';
      compareBtn.style.display = e.reading?'inline-block':'none';
      storeNote.textContent = (storeMode==='local')?'saved on this device':'kept this session · download to save permanently';
      legend.classList.add('show'); legend.style.opacity='1';
      hint.style.opacity='0';
      // highlight related actors in place + draw their lines (no relocation — the cosmos is fixed)
      relatedIds={}; relationsOf(e).forEach(r=>{ if(isActor(r)) relatedIds[r.id]=1; });
      buildRelationLines(e);
      setTimeout(()=>{ try{ noteBox.focus(); }catch(err){} }, 420);
    }
    function leaveRoom(){
      if(current){ setNote(current.id,noteBox.value); recordVisit(current.id); }
      current=null; relatedIds={}; legend.classList.remove('show'); legend.style.opacity='0';
      buildRelationLines(null);
    }
    compareBtn.addEventListener('click', ()=>{ readingWrap.style.display='block'; compareBtn.style.display='none'; });
    backBtn.addEventListener('click', ()=>{ leaveRoom(); });
    noteBox.addEventListener('input', ()=>{ if(current) setNote(current.id,noteBox.value); });
    noteBox.addEventListener('keydown', e=>e.stopPropagation());
    noteBox.addEventListener('wheel', e=>e.stopPropagation(), {passive:true});
    window.addEventListener('beforeunload', ()=>{ if(current){ setNote(current.id,noteBox.value); recordVisit(current.id); } });

    const reduced = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
    renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
    renderer.setSize(mount.clientWidth,mount.clientHeight);
    renderer.setClearColor(0x000000,0);
    mount.appendChild(renderer.domElement);
    const scene=new THREE.Scene();
    const camera=new THREE.PerspectiveCamera(50, mount.clientWidth/mount.clientHeight, 0.1, 200);

    // background dust — denser and brighter up high (the star-sky), sparse below
    const bgN=320, bp=new Float32Array(bgN*3), bc=new Float32Array(bgN*3), tmp=new THREE.Color();
    for(let i=0;i<bgN;i++){ const r=44+Math.random()*42, th=Math.random()*7, ph=Math.acos(2*Math.random()-1);
      bp[i*3]=r*Math.sin(ph)*Math.cos(th); bp[i*3+1]=r*Math.cos(ph); bp[i*3+2]=r*Math.sin(ph)*Math.sin(th);
      const rr=Math.random(); if(rr<0.10) tmp.setHSL(0.12,0.55,0.84); else if(rr<0.16) tmp.setHSL(0.11,0.66,0.66); else tmp.setHSL(0.10+Math.random()*0.03,0.22,0.40+Math.random()*0.2);
      bc[i*3]=tmp.r; bc[i*3+1]=tmp.g; bc[i*3+2]=tmp.b; }
    const bgG=new THREE.BufferGeometry(); bgG.setAttribute('position',new THREE.BufferAttribute(bp,3)); bgG.setAttribute('color',new THREE.BufferAttribute(bc,3));
    scene.add(new THREE.Points(bgG,new THREE.PointsMaterial({size:0.16,map:dotTexture(THREE),vertexColors:true,transparent:true,opacity:0.6,depthWrite:false})));

    const world=new THREE.Group(); scene.add(world);     // gesture-orbited group
    const cloudGrp=new THREE.Group(); world.add(cloudGrp);

    // a faint sea-plane disc at y=0 so the middle register reads as a surface
    (function(){
      const segs=64, r=7.4, gp=new Float32Array((segs+1)*3);
      for(let i=0;i<=segs;i++){ const a=i/segs*Math.PI*2; gp[i*3]=Math.cos(a)*r; gp[i*3+1]=0; gp[i*3+2]=Math.sin(a)*r; }
      const gg=new THREE.BufferGeometry(); gg.setAttribute('position',new THREE.BufferAttribute(gp,3));
      cloudGrp.add(new THREE.LineLoop(gg,new THREE.LineBasicMaterial({color:0xffffff,transparent:true,opacity:0.09})));
    })();

    /* ---- entity point cloud: a small glowing cluster per entity ---- */
    const PER=34;
    const N=E.length, COUNT=N*PER;
    const pos=new Float32Array(COUNT*3), col=new Float32Array(COUNT*3), siz=new Float32Array(COUNT), pha=new Float32Array(COUNT);
    const rnd=mulberry32(20240624);                       // seeded — cluster shapes are stable across reloads
    const offs=[];
    for(let e=0;e<N;e++){ const o=[]; for(let k=0;k<PER;k++){ const g=()=>((rnd()+rnd()+rnd()+rnd()-2)/2)*0.34; o.push([g(),g()*0.8,g()]); pha[e*PER+k]=rnd()*6.28; siz[e*PER+k]=(k<4?3.0:2.0)+rnd()*1.8; } offs.push(o); }
    const baseSiz=siz.slice();

    const geo=new THREE.BufferGeometry();
    geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
    geo.setAttribute('aColor',new THREE.BufferAttribute(col,3));
    geo.setAttribute('aSize',new THREE.BufferAttribute(siz,1));
    geo.setAttribute('aPhase',new THREE.BufferAttribute(pha,1));
    geo.setAttribute('aSel',new THREE.BufferAttribute(new Float32Array(COUNT),1));
    geo.setAttribute('aVis',new THREE.BufferAttribute(new Float32Array(COUNT),1));
    const PT_VERT=`
      attribute vec3 aColor; attribute float aSize; attribute float aPhase; attribute float aSel; attribute float aVis;
      uniform float uTime,uSizeScale; varying vec3 vCol; varying float vSel; varying float vVis;
      void main(){
        float tw=0.82+0.18*sin(uTime*0.5+aPhase);
        float emph=mix(1.0,1.7,aSel);
        vCol=aColor*tw*emph; vSel=aSel; vVis=aVis;
        vec4 mv=modelViewMatrix*vec4(position,1.0);
        gl_PointSize=aSize*uSizeScale*mix(1.0,1.5,aSel)*max(aVis,0.0)*(16.0/-mv.z);
        gl_Position=projectionMatrix*mv;
      }`;
    const PT_FRAG=`
      varying vec3 vCol; varying float vSel; varying float vVis;
      void main(){ if(vVis<0.02) discard; vec2 d=gl_PointCoord-0.5; float rr=length(d)*2.0; if(rr>1.0) discard;
        float a=smoothstep(1.0,0.0,rr); a=pow(a,1.35); gl_FragColor=vec4(vCol,a*0.92*vVis); }`;
    const ptMat=new THREE.ShaderMaterial({vertexShader:PT_VERT,fragmentShader:PT_FRAG,
      uniforms:{uTime:{value:0},uSizeScale:{value:Math.min(window.devicePixelRatio,2)}},
      transparent:true,depthWrite:false,depthTest:true,blending:THREE.NormalBlending});
    cloudGrp.add(new THREE.Points(geo,ptMat));

    // prominence: episodes and gods lead the eye
    function anchorWeight(e){
      if(e.type==='concept') return 0;
      if(regOf(e)==='sky') return 1.6;
      if(e.id==='poseidon'||e.id==='hades') return 1.5;
      if(e.id==='odysseus') return 1.6;
      if(e.type==='episode') return 1.2;
      return 1.0;
    }
    const aw=E.map(anchorWeight);

    // positions (fixed cosmos) — eased once into place, then constant
    const COSMOS=layoutCosmos();
    const curP=E.map(()=>[0,0,0]), tgtP=E.map((e,i)=>{ const p=COSMOS[e.id]||[0,0,0]; return [p[0],p[1],p[2]]; });
    const curC=E.map(()=>[0.6,0.6,0.6]), tgtC=E.map(e=>{ const c=e.col||[0.6,0.6,0.6]; return [c[0],c[1],c[2]]; });
    const tgtVis=E.map(e=>isActor(e)?1:0);                 // actors lit; concepts hidden
    const curVis=E.map(()=>0);
    // start placed (instant) so there is no opening scramble
    E.forEach((e,i)=>{ curP[i]=[tgtP[i][0],tgtP[i][1],tgtP[i][2]]; curC[i]=[tgtC[i][0],tgtC[i][1],tgtC[i][2]]; curVis[i]=tgtVis[i]; });

    /* ---- vertical traffic: relation lines (rebuilt on selection) + a faint
       always-on Nekuia shaft from the gate down to the dead ---- */
    const lineMat=new THREE.LineBasicMaterial({color:0xffffff,transparent:true,opacity:0.26});
    const shaftMat=new THREE.LineBasicMaterial({color:0xffffff,transparent:true,opacity:0.14});
    let relLineObj=null;
    (function(){ // the one descent — always faint
      const gate=COSMOS['nekuia'], dead=COSMOS['hades'];
      if(gate&&dead){ const a=new Float32Array([gate[0],gate[1],gate[2], dead[0],dead[1],dead[2]]);
        const gg=new THREE.BufferGeometry(); gg.setAttribute('position',new THREE.BufferAttribute(a,3));
        cloudGrp.add(new THREE.LineSegments(gg,shaftMat)); }
    })();
    function buildRelationLines(e){
      if(relLineObj){ cloudGrp.remove(relLineObj); relLineObj.geometry.dispose(); relLineObj=null; }
      if(!e) return;
      const ci=E.findIndex(x=>x.id===e.id); if(ci<0) return;
      const c=curP[ci]; const verts=[];
      relationsOf(e).forEach(r=>{ if(!isActor(r)) return; const ri=E.findIndex(x=>x.id===r.id); if(ri<0) return;
        const p=curP[ri]; verts.push(c[0],c[1],c[2], p[0],p[1],p[2]); });
      if(!verts.length) return;
      const gg=new THREE.BufferGeometry(); gg.setAttribute('position',new THREE.BufferAttribute(new Float32Array(verts),3));
      relLineObj=new THREE.LineSegments(gg,lineMat); cloudGrp.add(relLineObj);
    }

    // ---- SVG layer: the logbook thread + visited rings ----
    while(svg.firstChild) svg.removeChild(svg.firstChild);
    const SVGNS='http://www.w3.org/2000/svg';
    const threadPath=document.createElementNS(SVGNS,'path');
    threadPath.setAttribute('fill','none'); threadPath.setAttribute('stroke','rgba(143,119,54,0.62)');
    threadPath.setAttribute('stroke-width','1.1'); threadPath.setAttribute('stroke-dasharray','1 5'); threadPath.setAttribute('stroke-linecap','round');
    svg.appendChild(threadPath);
    const ringLayer=document.createElementNS(SVGNS,'g'); svg.appendChild(ringLayer);
    svg.style.opacity='1';
    document.getElementById('registers').style.opacity='1';

    const meta=E.map((e,i)=>({e,i,world:new THREE.Vector3(),sx:0,sy:0,on:false,depth:0}));

    /* ---- floating labels ---- */
    const labelsWrap=document.getElementById('labels');
    const labels=E.map((e,i)=>{
      const d=document.createElement('div'); d.className='lab';
      const dot=document.createElement('span'); dot.className='dot';
      const lt=document.createElement('div'); lt.className='lt'; lt.textContent=e.name;
      const ls=document.createElement('div'); ls.className='ls'; ls.textContent=e.sub||'';
      d.appendChild(dot); d.appendChild(lt); d.appendChild(ls);
      d.addEventListener('click',ev=>{ ev.stopPropagation(); enterRoom(e); });
      d.addEventListener('mouseenter',()=>{ d.classList.add('hover'); });
      d.addEventListener('mouseleave',()=>{ d.classList.remove('hover'); });
      labelsWrap.appendChild(d);
      return { el:d, dot, lt, ls };
    });
    function isAnchor(e){ return e.type==='episode' || regOf(e)==='sky' || e.id==='odysseus' || e.id==='poseidon' || e.id==='hades'; }

    function drawOverlay(){
      const log=getLog();
      const pts=[];
      log.forEach(id=>{ const ix=E.findIndex(e=>e.id===id); if(ix<0) return; const m=meta[ix];
        if(m && m.on && curVis[ix]>0.4) pts.push(m); });
      if(pts.length>=2){ let d='M '+pts[0].sx.toFixed(1)+' '+pts[0].sy.toFixed(1); for(let i=1;i<pts.length;i++) d+=' L '+pts[i].sx.toFixed(1)+' '+pts[i].sy.toFixed(1); threadPath.setAttribute('d',d); }
      else threadPath.setAttribute('d','');
      while(ringLayer.firstChild) ringLayer.removeChild(ringLayer.firstChild);
      log.forEach(id=>{ const ix=E.findIndex(e=>e.id===id); if(ix<0) return; const m=meta[ix]; if(!m||!m.on||curVis[ix]<0.4) return;
        const c=document.createElementNS(SVGNS,'circle'); c.setAttribute('cx',m.sx.toFixed(1)); c.setAttribute('cy',m.sy.toFixed(1));
        c.setAttribute('r','9'); c.setAttribute('fill','none'); c.setAttribute('stroke','rgba(143,119,54,0.7)'); c.setAttribute('stroke-width','1'); ringLayer.appendChild(c); });
    }

    // ---- gesture orbit (drag to rotate the whole cosmos) — side-on so the registers stack ----
    let yaw=0.0, pitch=0.34, yawV=0, pitchV=0;
    const dom=renderer.domElement; dom.style.touchAction='none';
    let downX=0,downY=0,downT=0,dragging=false,lx=0,ly=0;
    function onDown(x,y){ downX=lx=x; downY=ly=y; downT=performance.now(); dragging=true; titlecard.style.opacity='0'; hint.style.opacity='0'; }
    function onMove(x,y){ if(!dragging) return; const dx=x-lx, dy=y-ly; lx=x; ly=y; if(current===null){ yawV+=dx*0.0006; pitchV+=dy*0.0006; } }
    function pickAt(px,py){ let best=null,bd=30; meta.forEach(m=>{ if(!m.on || curVis[m.i]<0.25) return; const d=Math.hypot(m.sx-px,m.sy-py); if(d<bd){ bd=d; best=m; } }); return best; }
    function onUp(x,y){ dragging=false; const dt=performance.now()-downT, moved=Math.hypot(x-downX,y-downY);
      if(dt<450 && moved<8){ const hit=pickAt(x,y); if(hit){ if(current && current.id===hit.e.id) return; enterRoom(hit.e); } else if(current){ leaveRoom(); } } }
    dom.addEventListener('mousedown',e=>onDown(e.clientX,e.clientY));
    window.addEventListener('mousemove',e=>onMove(e.clientX,e.clientY));
    window.addEventListener('mouseup',e=>onUp(e.clientX,e.clientY));
    dom.addEventListener('touchstart',e=>{ if(e.touches.length===1) onDown(e.touches[0].clientX,e.touches[0].clientY); },{passive:true});
    dom.addEventListener('touchmove',e=>{ if(e.touches.length===1) onMove(e.touches[0].clientX,e.touches[0].clientY); },{passive:true});
    dom.addEventListener('touchend',e=>{ const t=(e.changedTouches&&e.changedTouches[0])||{clientX:lx,clientY:ly}; onUp(t.clientX,t.clientY); });
    window.addEventListener('keydown',e=>{ if(e.key==='Escape'&&current) leaveRoom(); });
    dom.addEventListener('mousemove',e=>{ if(current) return; dom.style.cursor=pickAt(e.clientX,e.clientY)?'pointer':'default'; });

    function onResize(){ const w=mount.clientWidth||1,h=mount.clientHeight||1; camera.aspect=w/h; camera.updateProjectionMatrix(); renderer.setSize(w,h); }
    window.addEventListener('resize',onResize); onResize();
    if(window.ResizeObserver) new ResizeObserver(onResize).observe(mount);

    const clock=new THREE.Clock(); const _v=new THREE.Vector3();

    function animate(){
      requestAnimationFrame(animate);
      const t=clock.getElapsedTime();
      ptMat.uniforms.uTime.value=t; ptMat.uniforms.uSizeScale.value=Math.min(window.devicePixelRatio,2);

      // orbit integrate (vertical axis stays vertical; pitch is camera height)
      yaw+=yawV; pitch+=pitchV; yawV*=0.9; pitchV*=0.9;
      pitch=Math.max(0.08,Math.min(1.25,pitch));
      if(current===null && !reduced && Math.abs(yawV)<0.0003) yaw+=0.0010;
      world.rotation.set(0,yaw,0);
      const dist=18.5; camera.position.set(0, Math.sin(pitch)*dist, Math.cos(pitch)*dist);
      camera.lookAt(0,0.3,0); camera.updateMatrixWorld();
      world.updateMatrixWorld(true);

      // settle positions/colours/visibility; write buffer
      const sel = current? E.findIndex(e=>e.id===current.id) : -1;
      for(let e=0;e<N;e++){
        const tp=tgtP[e], cp=curP[e]; cp[0]+=(tp[0]-cp[0])*0.12; cp[1]+=(tp[1]-cp[1])*0.12; cp[2]+=(tp[2]-cp[2])*0.12;
        const cc=curC[e], tc=tgtC[e]; cc[0]+=(tc[0]-cc[0])*0.06; cc[1]+=(tc[1]-cc[1])*0.06; cc[2]+=(tc[2]-cc[2])*0.06;
        curVis[e]+=(tgtVis[e]-curVis[e])*0.12;
        const ent=E[e];
        let selv=0;
        if(e===sel) selv=1; else if(current && relatedIds[ent.id]) selv=0.55; else if(sel>=0) selv=0.06;
        const wsc=aw[e];
        const o=offs[e];
        for(let k=0;k<PER;k++){ const idx=e*PER+k, b=idx*3, off=o[k];
          pos[b]=cp[0]+off[0]*wsc; pos[b+1]=cp[1]+off[1]*wsc; pos[b+2]=cp[2]+off[2]*wsc;
          col[b]=cc[0]; col[b+1]=cc[1]; col[b+2]=cc[2];
          siz[idx]=baseSiz[idx]*wsc;
          geo.attributes.aSel.array[idx]=selv;
          geo.attributes.aVis.array[idx]=curVis[e];
        }
      }
      geo.attributes.position.needsUpdate=true; geo.attributes.aColor.needsUpdate=true; geo.attributes.aSel.needsUpdate=true; geo.attributes.aSize.needsUpdate=true; geo.attributes.aVis.needsUpdate=true;

      // project entity centres
      const W=mount.clientWidth, Hh=mount.clientHeight;
      meta.forEach((m,e)=>{ m.world.set(curP[e][0],curP[e][1],curP[e][2]); cloudGrp.localToWorld(m.world);
        _v.copy(m.world).project(camera); m.on=_v.z<1; m.depth=_v.z; m.sx=(_v.x*0.5+0.5)*W; m.sy=(-_v.y*0.5+0.5)*Hh; });
      drawOverlay();

      // ---- labels ----
      const order=meta.map(m=>m.i).sort((a,b)=>meta[a].depth-meta[b].depth);
      const placed=[];
      for(let oi=0; oi<order.length; oi++){
        const e=order[oi], m=meta[e], L=labels[e], ent=E[e];
        const vis=curVis[e];
        if(vis<0.12 || !m.on || m.sx<-60||m.sx>W+60||m.sy<-30||m.sy>Hh+30){ L.el.style.opacity='0'; continue; }
        const anchor=isAnchor(ent), selected=(current&&current.id===ent.id), isRel=(current&&relatedIds[ent.id]);
        let crowded=false;
        if(!anchor && !selected && !isRel){ for(let q=0;q<placed.length;q++){ if(Math.abs(placed[q].x-m.sx)<58 && Math.abs(placed[q].y-m.sy)<22){ crowded=true; break; } } }
        const df = 1 - Math.min(1, Math.max(0,(m.depth+0.2)/1.2));
        let cls='lab';
        if(selected) cls+=' selected anchor';
        else if(isRel) cls+=' rel';
        else if(anchor) cls+=' anchor';
        else cls+=' normal';
        if(L.el.classList.contains('hover')) cls+=' hover';
        let op = anchor? (0.55+0.45*df) : (0.32+0.4*df);
        if(isRel) op=0.85;
        if(selected) op=1;
        if(current && !selected && !isRel) op*=0.32;
        if(crowded && !selected && !isRel){ op=0; }
        op*=vis;
        L.el.className=cls;
        L.el.style.transform='translate('+m.sx.toFixed(1)+'px,'+(m.sy-14).toFixed(1)+'px) translate(-50%,-100%)';
        L.el.style.opacity=op.toFixed(2);
        L.dot.style.color=rgbCss(ent.col||[0.6,0.7,0.8]);
        if(op>0.05 && !crowded) placed.push({x:m.sx,y:m.sy});
      }

      renderer.render(scene,camera);
    }
    animate();
  }

  var _w=0; function boot(){ if(!window.THREE){ _w+=60; if(_w>8000) return; setTimeout(boot,60); return; } init(); }
  boot();
})();
</script>
</body></html>
