<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Hamlet’s Mill — The Cosmic Mill</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Inter:wght@300;400&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;padding:0;background:#090d09;height:100%;overflow:hidden;}
  *{box-sizing:border-box;}
  #stage{position:fixed;inset:0;background:#090d09;overflow:hidden;font-family:'Inter',sans-serif;}
  #mount{position:absolute;inset:0;}
  #svg{position:absolute;inset:0;z-index:5;pointer-events:none;opacity:0;transition:opacity .25s;width:100%;height:100%;}
  #legend{position:absolute;top:0;left:0;z-index:6;pointer-events:none;will-change:transform,opacity;opacity:0;padding:15px 18px;border-radius:11px;
    transition-property:opacity; transition-duration:.25s,.5s; transition-timing-function:ease,cubic-bezier(.4,0,.2,1);
    background:linear-gradient(to right,rgba(5,8,18,0.70) 0%,rgba(5,8,18,0.36) 62%,rgba(5,8,18,0) 100%);
    backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);}
  #legNum{font:300 9px 'JetBrains Mono',monospace;letter-spacing:.3em;color:#9ee8ff;text-transform:uppercase;margin-bottom:8px;text-shadow:0 1px 10px rgba(0,0,0,.85);}
  #legTitle{font:500 26px 'Cormorant Garamond',Georgia,serif;color:#eaf3ff;letter-spacing:.02em;margin-bottom:8px;line-height:1.05;text-shadow:0 1px 14px rgba(0,0,0,.9),0 0 2px rgba(0,0,0,.7);}
  #legText{font:300 13.5px/1.6 'Inter',sans-serif;color:rgba(226,236,250,.82);text-shadow:0 1px 10px rgba(0,0,0,.92),0 0 2px rgba(0,0,0,.7);}
  #dots{position:absolute;right:22px;top:50%;transform:translateY(-50%);z-index:6;display:flex;flex-direction:column;gap:11px;}
  #dots button{width:7px;height:7px;transform:rotate(45deg);padding:0;cursor:pointer;transition:all .25s;background:transparent;border:1px solid rgba(158,232,255,.4);}
  #dots button.on{background:#9ee8ff;border-color:#9ee8ff;box-shadow:0 0 8px rgba(158,232,255,.7);}
  #hint{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);z-index:6;pointer-events:none;
    font:300 10px 'JetBrains Mono',monospace;letter-spacing:.26em;color:rgba(220,232,247,.4);text-transform:uppercase;transition:opacity .8s;}
  #titlecard{position:absolute;top:26px;left:28px;z-index:6;pointer-events:none;transition:opacity 1.1s;}
  #titlecard .t{font:500 19px 'Cormorant Garamond',Georgia,serif;color:rgba(234,243,255,.92);letter-spacing:.04em;}
  #titlecard .s{font:300 8.5px 'JetBrains Mono',monospace;letter-spacing:.34em;color:rgba(158,232,255,.6);text-transform:uppercase;margin-top:4px;}
  #err{position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;display:none;}
</style>
</head>
<body>
<div id="stage">
  <div id="mount"></div>
  <svg id="svg">
    <line id="leadline" x1="0" y1="0" x2="0" y2="0" stroke="rgba(150,225,255,0.55)" stroke-width="1"></line>
    <circle id="leaddot" cx="0" cy="0" r="3" fill="none" stroke="#9ee8ff" stroke-width="1.4"></circle>
  </svg>
  <div id="legend">
    <div id="legNum"></div>
    <div id="legTitle"></div>
    <div id="legText"></div>
  </div>
  <div id="dots"></div>
  <div id="titlecard">
    <div class="t">Hamlet’s Mill</div>
    <div class="s">The Cosmic Mill · the precessing wheel</div>

</div>
<div id="err"></div>

<script>
window.addEventListener('error', function(e){
  var d=document.getElementById('err'); d.style.display='block';
  d.textContent=(d.textContent?d.textContent+'\n':'')+'['+(e.message||e.type)+']';
});
// Load THREE (r128 UMD — sets window.THREE) with a fallback CDN, and surface
// a visible message rather than waiting silently if neither resolves.
(function(){
  var srcs=[
    'https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js',
    'https://unpkg.com/three@0.128.0/build/three.min.js'
  ];
  function load(i){
    if(i>=srcs.length){
      var d=document.getElementById('err'); d.style.display='block';
      d.textContent='Could not load the 3D library (THREE). Check your connection and reload.';
      var h=document.getElementById('hint'); if(h) h.textContent='3D library failed to load';
      return;
    }
    var s=document.createElement('script');
    s.src=srcs[i];
    s.onload=function(){ if(!window.THREE){ load(i+1); } };
    s.onerror=function(){ load(i+1); };
    document.head.appendChild(s);
  }
  load(0);
})();
</script>

<script>
(function(){
  'use strict';

  /* ============================================================
     HAMLET'S MILL — TOPOLOGY
     ------------------------------------------------------------
     Not a map but a MACHINE. The book's claim is that world myths
     encode a single cosmic mill — the precessing heavens — so the
     figure is vertical: a spindle (the world-axis) with a bright
     wobble-spiral climbing it, ages of the world stratified down
     its height (gold → salt → sand), and mythic figures from every
     culture pinned around it as glowing knots, webbed together by
     the book's argument and trailing threads where it reaches past
     itself. The y-axis is the master here — height is time, and the
     turning is the grinding.
     ============================================================ */

  const H = 3.2;                                   // half-height of the mill
  const CULTURES = [0, 0.9, 2.1, 3.3, 4.4, 5.4];   // angular lobes (cultures that share the myth)

  // the mythic cast — each a figure from a different tradition, pinned to
  // a lobe (culture) and a height (its age of the world)
  const KNOTS = [
    { name:'Amlodhi',       lobe:0,    y:1.9,  r:2.6 },
    { name:'Saturn-Kronos', lobe:0.3,  y:2.6,  r:2.7 },
    { name:'Samson',        lobe:1.6,  y:1.2,  r:2.5 },
    { name:'Phaethon',      lobe:0.45, y:0.4,  r:2.7 },
    { name:'Orion',         lobe:5.0,  y:-0.3, r:2.6 },
    { name:'Quetzalcoatl',  lobe:5.4,  y:-1.0, r:2.8 },
    { name:'Väinämöinen',   lobe:0.9,  y:1.4,  r:2.5 },
    { name:'Kullervo',      lobe:0.9,  y:-1.8, r:2.6 },
    { name:'Kai Khusrau',   lobe:2.1,  y:0.8,  r:2.7 },
    { name:'Vasuki',        lobe:3.3,  y:-0.6, r:2.6 },
    { name:'Maui',          lobe:4.4,  y:-1.2, r:2.7 },
    { name:'Sampo',         lobe:0.95, y:0.2,  r:2.5 },
  ];
  const knotPos = KNOTS.map(k => [Math.cos(k.lobe)*k.r, k.y, Math.sin(k.lobe)*k.r]);
  const mid = (a,b) => [(a[0]+b[0])/2,(a[1]+b[1])/2,(a[2]+b[2])/2];

  /* ---- camera stations: the essay through the machine ----
     target : where the camera looks   dir : direction to camera
     dist   : camera distance          anchor : where the leader-line pins
     aspect : which lens to emphasise (-1 = none)
     axis   : true => raise the spindle line  */
  const STATIONS = [
    { title:'The Mill', text:'This whole turning shape is a mill. Myths the world over tell of a giant cosmic mill that grinds out the ages of the world — and this book’s startling claim is that those myths are a hidden code for events in the sky. The line down the middle is its spindle; the slow turning is its grinding.',
      aspect:-1, axis:true, target:[0,0,0], dir:[0.45,0.28,1], dist:13.5, anchor:[0,1.6,0] },
    { title:'The Spindle & the Wobble', text:'The mill turns because the sky turns. Over ~26,000 years the Earth wobbles like a spinning top and the heavens slowly drift — even the pole star changes. The book says this almost-invisible drift is the real thing hiding inside myths of broken mills and toppled kings. The bright spiral up the spindle is that wobble.',
      aspect:1, axis:true, target:[0,0,0], dir:[1,0.16,0.28], dist:7.4, anchor:[0,1.3,0.34] },
    { title:'What It Grinds', text:'What the mill makes is time itself. Each age of the world comes out coarser than the last: a golden age at the top, then salt, then plain sand at the bottom. Travelling down the height is watching the world grow old.',
      aspect:4, target:[0,0,0], dir:[1,0.05,0.16], dist:9.4, anchor:[1.3,2.3,0] },
    { title:'The Cast', text:'The heroes of these myths aren’t quite people — they’re stars and planets in costume. Saturn is the old king of the golden age; Hamlet’s far older ancestor, Amlodhi, owns the mill. Each glowing knot is one of these figures, pinned to its place in the sky.',
      aspect:2, target:knotPos[1], dir:[0.85,0.42,0.55], dist:4.2, anchor:knotPos[1] },
    { title:'The Same Story Everywhere', text:'Here’s the eerie part: the same tale surfaces in Iceland, Iran, India, Polynesia, the Americas — cultures that never met. When one image recurs across the world, it shows up here as a ring threading through them all.',
      aspect:3, target:[0,0.9,0], dir:[0.25,0.5,1], dist:8.4, anchor:[0.4,1.2,2.5] },
    { title:'What’s Solid', text:'The closer to the center, the surer the ground. The dense, bright heart is the hard astronomy almost everyone accepts — the part of the argument the rest leans on.',
      aspect:0, target:[0,0,0], dir:[0.35,0.12,1], dist:7.2, anchor:[0.7,0.4,0.5] },
    { title:'What’s Shaky', text:'The further out, the bigger the leap. At the ragged red edge the claims grow thin and speculative — the places where even friendly readers raise an eyebrow. The book keeps its own doubts in plain view.',
      aspect:6, target:[3.4,0,0], dir:[1,0.12,0.4], dist:4.6, anchor:[3.9,0.5,0] },
    { title:'How It’s Argued', text:'The book doesn’t argue in a straight line — it builds a web, linking myth to myth until a pattern appears. These threads between the knots are those links. The method is the mesh itself.',
      aspect:5, target:[0,0,0], dir:[0.4,0.34,1], dist:9.0, anchor:mid(knotPos[1],[0,0.78,0]) },
    { title:'Where It Leads', text:'A few threads escape the cloud completely. These are the places the book reaches into other questions — older star-lore, sacred geometry, your own reading. The doors it leaves open.',
      aspect:7, target:mid(knotPos[0],[5.6,3.1,0]), dir:[1,0.32,0.42], dist:4.6, anchor:[4.7,2.8,0] },
    { title:'The Quernstone', text:'Look straight down the spindle and the whole cloud flattens: the spiral, the rings, and the fading edge become circles and graduations — the face of an engraved millstone. The scattered argument and the single carved stone are one thing, seen two ways.',
      aspect:-1, target:[0,0,0], dir:[0.05,1,0.03], dist:11, anchor:[0,0,0] },
  ];

  // the ages of the world, read off the height: gold at the top, salt in the
  // middle, sand at the bottom
  function strata(y){
    const t = (y + H) / (2 * H);
    const gold=[0.83,0.64,0.31], salt=[0.80,0.81,0.77], sand=[0.42,0.37,0.28];
    let a,b,f;
    if (t>0.6){a=salt;b=gold;f=(t-0.6)/0.4;} else if (t>0.34){a=sand;b=salt;f=(t-0.34)/0.26;} else {a=sand;b=sand;f=0;}
    return [a[0]+(b[0]-a[0])*f, a[1]+(b[1]-a[1])*f, a[2]+(b[2]-a[2])*f];
  }

  /* ============================================================
     CLOUD BUILDER
     ============================================================ */
  function buildCloud(){
    const P=[],C=[],S=[],A=[],CE=[],PH=[]; const fil=[];
    const ivory=[0.92,0.89,0.80], oxide=[0.72,0.33,0.29], gold=[0.83,0.64,0.31];
    const push=(x,y,z,col,size,aspect,cert)=>{ P.push(x,y,z); C.push(col[0],col[1],col[2]); S.push(size); A.push(aspect); CE.push(cert); PH.push(Math.random()*6.28); };
    const tint=(col,cert)=>{ const m=cert*0.32; const b=0.40+cert*0.48; return [(col[0]*(1-m)+ivory[0]*m)*b,(col[1]*(1-m)+ivory[1]*m)*b,(col[2]*(1-m)+ivory[2]*m)*b]; };
    const rnd=()=> (Math.random()+Math.random()+Math.random())/3;

    // aspect 0 — the body of the cloud: certainty fades from the dense centre out
    for(let i=0;i<1800;i++){ const r=0.3+2.0*Math.pow(Math.random(),1.3); const lobe=CULTURES[(Math.random()*6)|0];
      const th=(Math.random()<0.4?lobe:Math.random()*6.28)+(Math.random()-0.5)*0.7; const y=(rnd()*2-1)*H;
      const cert=0.62+0.38*(1-r/2.3)*Math.random(); push(Math.cos(th)*r,y,Math.sin(th)*r,tint(strata(y),cert),1.6+Math.random()*1.8,0,cert); }
    // aspect 1 — the precession wobble: a bright spiral climbing the spindle
    const turns=5;
    for(let i=0;i<520;i++){ const u=i/520; const y=-H+2*H*u; const th=u*turns*6.2831; const r=0.32+0.12*Math.sin(u*40);
      push(Math.cos(th)*r,y,Math.sin(th)*r,tint(ivory,1.0),2.0+Math.random()*1.5,1,1.0); }
    // aspect 2 — the cast: glowing knots of mythic figures
    knotPos.forEach(([cx,cy,cz])=>{ for(let i=0;i<92;i++){ const g=()=> (Math.random()+Math.random()+Math.random()+Math.random()-2)/2*0.42;
      const x=cx+g(), yy=cy+g()*0.8, z=cz+g(); const cert=0.6+Math.random()*0.25; const col=tint(strata(yy),cert);
      push(x,yy,z,col,2.2+Math.random()*2.0,2,cert); } });
    // aspect 3 — the same story everywhere: rings threading the cultures
    const rings=[[1.2,2.6],[2.0,2.3],[-1.4,2.7],[-2.2,2.4]];
    rings.forEach(([y,r])=>{ for(let i=0;i<170;i++){ const th=Math.random()*6.28; const rr=r+(Math.random()-0.5)*0.18; const yy=y+(Math.random()-0.5)*0.16;
      push(Math.cos(th)*rr,yy,Math.sin(th)*rr,tint([0.78,0.80,0.74],0.5),1.6+Math.random()*1.4,3,0.5); } });
    // aspect 4 — the strata columns ("What It Grinds"): full-height samples that
    // read top→bottom as gold (golden age) → salt → sand. Kept literal, not cosmos-recolored.
    for(let c=0;c<4;c++){ const lobe=CULTURES[c*2 % CULTURES.length]; const r=1.2+c*0.34; for(let i=0;i<360;i++){ const y=(Math.random()*2-1)*H; const th=lobe+(Math.random()-0.5)*0.34;
      const col=strata(y); const rr=r+(Math.random()-0.5)*0.2; push(Math.cos(th)*rr,y,Math.sin(th)*rr,[Math.min(1,col[0]*1.18),Math.min(1,col[1]*1.18),Math.min(1,col[2]*1.18)],2.2+Math.random()*1.6,4,0.85); } }
    // aspect 5 — the mesh ("How It's Argued"): luminous beaded strands threading knot to
    // knot. Warm gold near the knots cooling to soft cyan mid-link, with jitter + twinkle so
    // they read as glowing constellations rather than a hard wireframe. Skipped by recolor.
    const methodNode=(x,y,z,f)=>{ const g=Math.sin(f*Math.PI); // brightest mid-link
      const r=(gold[0]*(1-g)+0.42*g)*(0.6+0.4*g), gg=(gold[1]*(1-g)+0.78*g)*(0.6+0.4*g), b=(gold[2]*(1-g)+0.96*g)*(0.6+0.4*g);
      push(x+(Math.random()-0.5)*0.12, y+(Math.random()-0.5)*0.12, z+(Math.random()-0.5)*0.12, [r,gg,b], 1.8+Math.random()*1.2, 5, 0.45); };
    for(let i=0;i<knotPos.length;i++){ const d=knotPos.map((k,j)=>[j,(k[0]-knotPos[i][0])**2+(k[1]-knotPos[i][1])**2+(k[2]-knotPos[i][2])**2]).filter(z=>z[0]!==i).sort((a,b)=>a[1]-b[1]);
      for(let n=0;n<2;n++){ const j=d[n][0]; const a=knotPos[i], b=knotPos[j]; fil.push(a[0],a[1],a[2],b[0],b[1],b[2]);
        for(let s=0;s<22;s++){ const f=s/22; methodNode(a[0]+(b[0]-a[0])*f,a[1]+(b[1]-a[1])*f,a[2]+(b[2]-a[2])*f,f); } } }
    // aspect 7 — escaping threads ("Where It Leads"): soft tapering wisps that arc
    // out of the cloud and dissolve, warm gold at the knot cooling to cyan-white at the
    // tip. Kept literal (skipped by the cosmos recolor) so they read as coherent threads.
    [0,2,4,6,8].forEach((ki,idx)=>{ const a=knotPos[ki]; const dir=Math.atan2(a[2],a[0]);
      const out=[Math.cos(dir)*6.4, a[1]+1.7, Math.sin(dir)*6.4];
      const px=-Math.sin(dir), pz=Math.cos(dir); const bend=(idx%2?1:-1);
      const n=58;
      for(let s=0;s<n;s++){ const f=s/(n-1); const ease=f*f; const arc=Math.sin(f*Math.PI)*1.0*bend;
        const x=a[0]+(out[0]-a[0])*ease + px*arc + (Math.random()-0.5)*0.1;
        const y=a[1]+(out[1]-a[1])*ease + (Math.random()-0.5)*0.1;
        const z=a[2]+(out[2]-a[2])*ease + pz*arc + (Math.random()-0.5)*0.1;
        const fade=0.95-0.82*f; // tip dissolves toward the void
        const r=(gold[0]*(1-f)+0.50*f)*fade, g=(gold[1]*(1-f)+0.80*f)*fade, b=(gold[2]*(1-f)+0.98*f)*fade;
        push(x,y,z,[r,g,b],(2.4-1.7*f)+Math.random()*0.4,7,0.4); } });
    // aspect 6 — the speculative margin: a ragged, dim oxide-red halo at the edge
    for(let i=0;i<1100;i++){ const r=3.2+Math.abs((Math.random()+Math.random()-1))*1.5; const th=Math.random()*6.28; const y=(Math.random()*2-1)*H*1.05; const cert=Math.random()*0.28;
      push(Math.cos(th)*r,y,Math.sin(th)*r,[oxide[0]*(0.5+cert),oxide[1]*(0.5+cert),oxide[2]*(0.5+cert)],1.2+Math.random()*1.6,6,cert); }

    return { positions:new Float32Array(P), colors:new Float32Array(C), sizes:new Float32Array(S),
      aspects:new Float32Array(A), certs:new Float32Array(CE), phases:new Float32Array(PH), filaments:new Float32Array(fil) };
  }

  // Cosmos treatment: dust white / cyan / magenta sparkles and push the base
  // palette toward saturated, glowing cosmic color (in place on the color buffer).
  // Strata columns, escaping wisps & mesh strands keep their literal gradients.
  function cosmosify(THREE, colors, aspects){
    const c = new THREE.Color();
    const hsl = { h: 0, s: 0, l: 0 };
    for (let i = 0, p = 0; i < colors.length; i += 3, p++) {
      if (aspects[p] === 4 || aspects[p] === 7 || aspects[p] === 5) continue;
      const r = Math.random();
      if (r < 0.06) { colors[i] = 1; colors[i+1] = 1; colors[i+2] = 1; continue; }         // white sparkle
      if (r < 0.13) { c.setHSL(0.49 + Math.random()*0.05, 0.92, 0.7); colors[i]=c.r; colors[i+1]=c.g; colors[i+2]=c.b; continue; } // cyan glint
      if (r < 0.19) { c.setHSL(0.91 + Math.random()*0.07, 0.92, 0.62); colors[i]=c.r; colors[i+1]=c.g; colors[i+2]=c.b; continue; } // magenta fleck
      c.setRGB(colors[i], colors[i+1], colors[i+2]);
      c.getHSL(hsl);
      c.setHSL(hsl.h, Math.min(1, hsl.s * 1.85 + 0.32), Math.min(0.76, hsl.l * 1.2 + 0.13));
      colors[i] = c.r; colors[i+1] = c.g; colors[i+2] = c.b;
    }
  }

  function dotTexture(THREE){
    const s=64,cv=document.createElement('canvas'); cv.width=cv.height=s;
    const g=cv.getContext('2d'); const grd=g.createRadialGradient(s/2,s/2,0,s/2,s/2,s/2);
    grd.addColorStop(0,'rgba(255,255,255,1)'); grd.addColorStop(0.35,'rgba(255,255,255,0.85)');
    grd.addColorStop(0.7,'rgba(255,255,255,0.25)'); grd.addColorStop(1,'rgba(255,255,255,0)');
    g.fillStyle=grd; g.fillRect(0,0,s,s); return new THREE.CanvasTexture(cv);
  }

  /* ============================================================
     RENDER ENGINE
     ============================================================ */
  function init(){
    const THREE=window.THREE;
    const mount=document.getElementById('mount');
    const legend=document.getElementById('legend'), legNum=document.getElementById('legNum'),
          legTitle=document.getElementById('legTitle'), legText=document.getElementById('legText');
    const svg=document.getElementById('svg'), line=document.getElementById('leadline'), dot=document.getElementById('leaddot');
    const hint=document.getElementById('hint'), titlecard=document.getElementById('titlecard');
    const dotsWrap=document.getElementById('dots');

    const reduced = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
    renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
    renderer.setSize(mount.clientWidth,mount.clientHeight);
    renderer.setClearColor(0x000000,0);
    mount.appendChild(renderer.domElement);

    const scene=new THREE.Scene();
    const camera=new THREE.PerspectiveCamera(48, mount.clientWidth/mount.clientHeight, 0.1, 200);

    // background star dust
    const bgN=320, bp=new Float32Array(bgN*3), bc=new Float32Array(bgN*3), tmp=new THREE.Color();
    for(let i=0;i<bgN;i++){ const r=44+Math.random()*40, th=Math.random()*7, ph=Math.acos(2*Math.random()-1);
      bp[i*3]=r*Math.sin(ph)*Math.cos(th); bp[i*3+1]=r*Math.cos(ph); bp[i*3+2]=r*Math.sin(ph)*Math.sin(th);
      const rr=Math.random();
      if(rr<0.1) tmp.setHSL(0.5,0.7,0.85); else if(rr<0.16) tmp.setHSL(0.95,0.8,0.7); else tmp.setHSL(0.6+Math.random()*0.06,0.7,0.45+Math.random()*0.25);
      bc[i*3]=tmp.r; bc[i*3+1]=tmp.g; bc[i*3+2]=tmp.b; }
    const bgG=new THREE.BufferGeometry();
    bgG.setAttribute('position',new THREE.BufferAttribute(bp,3));
    bgG.setAttribute('color',new THREE.BufferAttribute(bc,3));
    scene.add(new THREE.Points(bgG,new THREE.PointsMaterial({size:0.16,map:dotTexture(THREE),vertexColors:true,transparent:true,opacity:0.7,depthWrite:false})));

    const nutate=new THREE.Group(); scene.add(nutate);
    const tilt=new THREE.Group(); tilt.rotation.z=0.12; nutate.add(tilt);
    const cloud=new THREE.Group(); tilt.add(cloud);

    const D=buildCloud();
    cosmosify(THREE,D.colors,D.aspects);

    const geo=new THREE.BufferGeometry();
    geo.setAttribute('position',new THREE.BufferAttribute(D.positions,3));
    geo.setAttribute('aColor',new THREE.BufferAttribute(D.colors,3));
    geo.setAttribute('aSize',new THREE.BufferAttribute(D.sizes,1));
    geo.setAttribute('aAspect',new THREE.BufferAttribute(D.aspects,1));
    geo.setAttribute('aCert',new THREE.BufferAttribute(D.certs,1));
    geo.setAttribute('aPhase',new THREE.BufferAttribute(D.phases,1));

    const PT_VERT=`
      attribute vec3 aColor; attribute float aSize; attribute float aAspect; attribute float aCert; attribute float aPhase;
      uniform float uTime,uLens,uLensStrength,uSizeScale;
      varying vec3 vCol; varying float vA;
      void main(){
        float match=step(abs(aAspect-uLens),0.5);
        float lensActive=step(0.0,uLens);
        float k=uLensStrength*lensActive;
        float emph=mix(1.0, mix(0.12,1.5,match), k);
        float szf=mix(1.0, mix(0.55,1.7,match), k);
        float tw=0.82+0.18*sin(uTime*0.5+aPhase);
        vCol=aColor*emph*tw; vA=emph;
        vec4 mv=modelViewMatrix*vec4(position,1.0);
        gl_PointSize=aSize*szf*uSizeScale*(16.0/-mv.z);
        gl_Position=projectionMatrix*mv;
      }`;
    const PT_FRAG=`
      varying vec3 vCol; varying float vA;
      void main(){
        vec2 d=gl_PointCoord-0.5; float rr=length(d)*2.0;
        if(rr>1.0) discard;
        float a=smoothstep(1.0,0.0,rr); a=pow(a,1.35);
        gl_FragColor=vec4(vCol, a*0.92*clamp(vA,0.0,2.0));
      }`;
    const ptMat=new THREE.ShaderMaterial({vertexShader:PT_VERT,fragmentShader:PT_FRAG,
      uniforms:{uTime:{value:0},uLens:{value:-1},uLensStrength:{value:0},uSizeScale:{value:Math.min(window.devicePixelRatio,2)}},
      transparent:true,depthWrite:false,depthTest:true,blending:THREE.NormalBlending,fog:false});
    cloud.add(new THREE.Points(geo,ptMat));

    // the argument mesh (faint connective filaments)
    const filGeo=new THREE.BufferGeometry(); filGeo.setAttribute('position',new THREE.BufferAttribute(D.filaments,3));
    const filMat=new THREE.LineBasicMaterial({color:'#7fd4ff',transparent:true,opacity:0.06,depthWrite:false,blending:THREE.AdditiveBlending});
    cloud.add(new THREE.LineSegments(filGeo,filMat));

    // the spindle — the world-axis
    const axisMat=new THREE.LineBasicMaterial({color:'#cfeaff',transparent:true,opacity:0.16,depthWrite:false,blending:THREE.AdditiveBlending});
    cloud.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,-H-0.4,0),new THREE.Vector3(0,H+0.6,0)]),axisMat));

    // ---- nav dots ----
    const N=STATIONS.length;
    const dotEls=[];
    for(let i=0;i<N;i++){ const b=document.createElement('button'); b.onclick=()=>{ jumpTo(i); };
      dotsWrap.appendChild(b); dotEls.push(b); }

    // ---- scroll / input ----
    const PR={p:0,target:0};
    let firstScroll=false;
    function bump(){ if(!firstScroll){ firstScroll=true; hint.style.opacity='0'; titlecard.style.opacity='0'; } }
    function onWheel(e){ e.preventDefault(); PR.target=Math.max(0,Math.min(N-1,PR.target+e.deltaY*0.0026)); bump(); }
    let ty=0,touching=false;
    function onTS(e){ if(e.touches.length===1){ touching=true; ty=e.touches[0].clientY; } }
    function onTM(e){ if(!touching||e.touches.length!==1) return; e.preventDefault(); const dy=e.touches[0].clientY-ty; ty=e.touches[0].clientY; PR.target=Math.max(0,Math.min(N-1,PR.target-dy*0.006)); bump(); }
    function onTE(){ touching=false; }
    function onKey(e){ if(e.key==='ArrowDown'||e.key==='ArrowRight'){ PR.target=Math.min(N-1,Math.round(PR.target)+1); bump(); } else if(e.key==='ArrowUp'||e.key==='ArrowLeft'){ PR.target=Math.max(0,Math.round(PR.target)-1); bump(); } }
    function jumpTo(i){ PR.target=i; bump(); }
    const dom=renderer.domElement; dom.style.touchAction='none';
    dom.addEventListener('wheel',onWheel,{passive:false});
    dom.addEventListener('touchstart',onTS,{passive:true}); dom.addEventListener('touchmove',onTM,{passive:false}); dom.addEventListener('touchend',onTE);
    window.addEventListener('keydown',onKey);
    function onResize(){ const w=mount.clientWidth||1,h=mount.clientHeight||1; camera.aspect=w/h; camera.updateProjectionMatrix(); renderer.setSize(w,h); }
    window.addEventListener('resize',onResize); onResize();
    if(window.ResizeObserver){ new ResizeObserver(onResize).observe(mount); }

    const lerp=(a,b,f)=>a+(b-a)*f, smooth=x=>x*x*(3-2*x);
    const v=a=>new THREE.Vector3(a[0],a[1],a[2]);
    const tA=new THREE.Vector3(),tB=new THREE.Vector3(),targetW=new THREE.Vector3(),anchorW=new THREE.Vector3(),dirW=new THREE.Vector3(),projV=new THREE.Vector3();
    const clock=new THREE.Clock(); let lastIdx=-1;

    function animate(){
      requestAnimationFrame(animate);
      const t=clock.getElapsedTime();
      ptMat.uniforms.uTime.value=t;
      ptMat.uniforms.uSizeScale.value=Math.min(window.devicePixelRatio,2);
      // the slow turning of the mill
      if(!reduced){ cloud.rotation.y=t*0.02; nutate.rotation.y=t*0.006; }
      nutate.updateMatrixWorld(true);

      PR.p+=(PR.target-PR.p)*0.08;
      const p=PR.p, i0=Math.floor(p), i1=Math.min(N-1,i0+1), f=smooth(p-i0);
      const s0=STATIONS[i0], s1=STATIONS[i1];

      tA.copy(v(s0.target)); tB.copy(v(s1.target)); targetW.copy(tA).lerp(tB,f); cloud.localToWorld(targetW);
      const aA=v(s0.anchor),aB=v(s1.anchor); anchorW.copy(aA).lerp(aB,f); cloud.localToWorld(anchorW);
      dirW.set(lerp(s0.dir[0],s1.dir[0],f),lerp(s0.dir[1],s1.dir[1],f),lerp(s0.dir[2],s1.dir[2],f)).normalize();
      const dist=lerp(s0.dist,s1.dist,f);
      camera.position.copy(targetW).addScaledVector(dirW,dist);
      camera.lookAt(targetW); camera.updateMatrixWorld();

      const idx=Math.round(p), st=STATIONS[idx];
      const focus=smooth(Math.max(0,1-Math.abs(p-idx)/0.5));
      ptMat.uniforms.uLens.value=st.aspect;
      ptMat.uniforms.uLensStrength.value=(st.aspect<0)?0:focus;
      filMat.opacity=0.05+(st.aspect===5?0.15:0)*focus;
      axisMat.opacity=0.16+(st.axis?0.55:0)*focus;

      if(idx!==lastIdx){ lastIdx=idx;
        legNum.textContent=(String(idx+1).padStart(2,'0')+' / '+String(N).padStart(2,'0'));
        legTitle.textContent=st.title; legText.textContent=st.text;
        dotEls.forEach((b,i)=>b.classList.toggle('on',i===idx));
      }

      projV.copy(anchorW).project(camera);
      const W=mount.clientWidth, Hh=mount.clientHeight, onScreen=projV.z<1;
      const sx=(projV.x*0.5+0.5)*W, sy=(-projV.y*0.5+0.5)*Hh;
      const op=onScreen?focus:0;
      const margin=38, boxW=Math.min(312,W-margin*2);
      // dock the panel in the gutter OPPOSITE the feature so text stays clear of the cloud
      const featureLeft = sx < W*0.5;
      const lx=featureLeft?(W-boxW-margin):margin;
      const ly=Math.max(margin,Math.min(sy-28,Hh-180));
      legend.style.transform=`translate(${lx}px,${ly}px)`; legend.style.opacity=op; legend.style.width=boxW+'px';
      svg.style.opacity=op;
      const cx=featureLeft?lx:lx+boxW;             // leader-line leaves the edge facing the feature
      dot.setAttribute('cx',sx); dot.setAttribute('cy',sy);
      line.setAttribute('x1',sx); line.setAttribute('y1',sy); line.setAttribute('x2',cx); line.setAttribute('y2',ly+26);

      renderer.render(scene,camera);
    }
    animate();
  }

  var _waited=0;
  function boot(){
    if(!window.THREE){
      _waited+=60;
      if(_waited>8000) return; // give up; the loader will have shown a message
      setTimeout(boot,60); return;
    }
    init();
  }
  boot();
})();
</script>
</body></html>
