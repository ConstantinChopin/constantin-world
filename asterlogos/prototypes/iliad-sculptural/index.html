<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Iliad — The Standing Order</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Newsreader:opsz,wght@6..72,300;6..72,400&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<script>
// the design system sits beside the prototypes; resolve it from the
// /prototypes/ segment so clean-URL servers (no trailing slash) still find it
(function(){
  var p=location.pathname, i=p.indexOf('/prototypes/');
  var base=(i>=0)?p.slice(0,i+12):'../';
  document.write('<link rel="stylesheet" href="'+base+'_shared/asterlogos.css">');
})();
</script>
<style>
  html,body{margin:0;padding:0;background:var(--paper);height:100%;overflow:hidden;}
  *{box-sizing:border-box;}
  #stage{position:fixed;inset:0;background:var(--paper);overflow:hidden;font-family:'Newsreader',Georgia,serif;}
  #mount{position:absolute;inset:0;}
  /* faint paper tooth — a barely-there stipple so the "page" isn't flat digital flat */
  #stage::before{content:"";position:absolute;inset:0;z-index:1;pointer-events:none;opacity:0.5;
    background-image:radial-gradient(var(--rule) 0.5px,transparent 0.5px);background-size:3px 3px;mix-blend-mode:multiply;}
  /* vignette like the bezel shadow of an e-ink panel */
  #stage::after{content:"";position:absolute;inset:0;z-index:2;pointer-events:none;
    box-shadow:inset 0 0 120px rgba(70,64,54,0.16);}

  #svg{position:absolute;inset:0;z-index:5;pointer-events:none;width:100%;height:100%;}

  /* node captions — italic place-names floating above each form, old-chart style */
  #caps{position:absolute;inset:0;z-index:6;pointer-events:none;overflow:hidden;}
  .cap{position:absolute;transform:translate(-50%,-100%);white-space:nowrap;
    font:italic 400 12px 'Newsreader',Georgia,serif;letter-spacing:.04em;color:rgba(57,53,46,0.78);
    text-shadow:0 0 5px var(--paper),0 0 3px var(--paper),0 0 2px var(--paper);
    transition:opacity .3s ease;}

  #legend{position:absolute;left:28px;bottom:28px;z-index:8;pointer-events:none;will-change:opacity;opacity:0;
    width:344px;max-width:86vw;padding:22px 24px 20px;border-radius:3px;
    transition:opacity .35s ease;
    background:var(--paper);
    border:1px solid var(--ink);
    box-shadow:5px 6px 0 rgba(27,25,22,0.14);
    max-height:84vh;overflow-y:auto;}
  #legend.show{pointer-events:auto;}
  #legNum{font:400 9px 'JetBrains Mono',monospace;letter-spacing:.32em;color:var(--ink-soft);text-transform:uppercase;margin-bottom:10px;
    border-bottom:1px solid var(--rule);padding-bottom:9px;}
  #legTitle{font:500 30px 'Cormorant Garamond',Georgia,serif;color:var(--ink);letter-spacing:.01em;margin-bottom:6px;line-height:1.0;}
  #legPlace{font:400 9.5px 'JetBrains Mono',monospace;letter-spacing:.16em;color:var(--ink-soft);text-transform:uppercase;margin-bottom:13px;}
  .reflHead{font:400 8.5px 'JetBrains Mono',monospace;letter-spacing:.3em;color:var(--ghost);text-transform:uppercase;margin-bottom:7px;}
  #legOrient{font:300 14px/1.66 'Newsreader',Georgia,serif;color:var(--ink-soft);margin-bottom:18px;}
  .reflHead2{margin-top:0;}
  #compareBtn,#backBtn{pointer-events:auto;cursor:pointer;background:transparent;
    border:1px solid var(--ink);color:var(--ink);border-radius:2px;padding:8px 14px;
    font:400 9px 'JetBrains Mono',monospace;letter-spacing:.16em;text-transform:uppercase;transition:all .18s;}
  #compareBtn{margin-top:4px;}
  #compareBtn:hover,#backBtn:hover{background:var(--ink);color:var(--paper);}
  #backBtn{margin-top:18px;border-color:var(--rule);color:var(--ink-soft);}
  #backBtn:hover{background:var(--ink-soft);color:var(--paper);border-color:var(--ink-soft);}
  #readingWrap{display:none;margin-top:16px;border-top:1px solid var(--rule);padding-top:15px;}
  #noteBox{pointer-events:auto;width:100%;min-height:74px;resize:vertical;box-sizing:border-box;
    background:var(--paper-deep);border:1px solid var(--rule);border-radius:2px;padding:9px 11px;
    font:300 13.5px/1.55 'Newsreader',Georgia,serif;color:var(--ink);outline:none;transition:border-color .18s;}
  #noteBox:focus{border-color:var(--ink);}
  #noteBox::placeholder{color:var(--ghost);font-style:italic;}
  #legReading{font:300 13.5px/1.66 'Newsreader',Georgia,serif;color:var(--ink-soft);}
  #storeNote{font:400 8px 'JetBrains Mono',monospace;letter-spacing:.1em;color:var(--ghost);text-transform:uppercase;margin-top:14px;}

  #hint{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);z-index:7;pointer-events:none;
    font:400 9.5px 'JetBrains Mono',monospace;letter-spacing:.3em;color:var(--ink-soft);text-transform:uppercase;transition:opacity .8s;}

  #titlecard{position:absolute;top:26px;left:28px;z-index:7;pointer-events:none;transition:opacity 1.0s;}
  #titlecard .t{font:500 22px 'Cormorant Garamond',Georgia,serif;color:var(--ink);letter-spacing:.02em;font-style:italic;}
  #titlecard .s{font:400 8px 'JetBrains Mono',monospace;letter-spacing:.34em;color:var(--ink-soft);text-transform:uppercase;margin-top:5px;}

  /* the e-ink refresh flash: a brief full-panel invert on transitions */
  #refresh{position:fixed;inset:0;z-index:40;pointer-events:none;background:var(--ink);opacity:0;}

  #err{position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#e7e4db;color:#7a2318;padding:10px 14px;border-radius:2px;border:1px solid #7a2318;z-index:99999;white-space:pre-wrap;display:none;}

  /* ---------- FULL-PAGE PLATE ---------- */
  #plate{position:fixed;inset:0;z-index:30;background:var(--paper);
    opacity:0;visibility:hidden;transition:opacity .42s ease;
    font-family:'Newsreader',Georgia,serif;}
  #plate.open{opacity:1;visibility:visible;}
  #plate::before{content:"";position:absolute;inset:0;z-index:1;pointer-events:none;opacity:0.5;
    background-image:radial-gradient(var(--rule) 0.5px,transparent 0.5px);background-size:3px 3px;mix-blend-mode:multiply;}
  #plate::after{content:"";position:absolute;inset:0;z-index:2;pointer-events:none;
    box-shadow:inset 0 0 130px rgba(70,64,54,0.18);}
  #plateMount{position:absolute;inset:0;z-index:3;}

  /* plate header — same grammar as the book header, one level deeper:
     [‹ parent chip] [Title, Cormorant italic 21px / mono context line].
     Left-aligned; the centre belongs to the sculpture. Right slot reserved. */
  #plateTopbar{position:absolute;top:var(--edge-top);left:var(--edge-x);z-index:6;display:flex;align-items:center;
    gap:14px;pointer-events:none;}
  #plateBack{pointer-events:auto;flex:0 0 auto;}
  #plateHead{text-align:left;}
  #plateTitle{font:italic 500 21px/1.1 'Cormorant Garamond',Georgia,serif;color:var(--ink);letter-spacing:.02em;}
  #platePlace{font:400 8px 'JetBrains Mono',monospace;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-soft);margin-top:4px;}

  /* ---------- the reading page — letterpress facing the engraving.
     No card, no border: floating text on the paper. The sculpture is
     the verso (left ~58%, camera offset); this column is the recto. */
  #platePage{position:absolute;top:var(--edge-top);right:var(--edge-x);bottom:96px;width:42%;z-index:6;
    display:flex;flex-direction:column;padding:0 24px 0 8px;pointer-events:none;}
  /* the column header rides the masthead line — the canonical .panel-head
     molecule (asterlogos.css); only pointer opt-ins live here */
  #pgEyebrow{flex:0 0 auto;}
  #pgEyebrow .ph-acts,#pgEyebrow .icon-act,#pgClose{pointer-events:auto;}
  #pgWrap{flex:1;display:flex;flex-direction:column;justify-content:center;min-height:0;}
  #pgWrap.stack{justify-content:flex-start;}
  #pgWrap.stack #pgBody{max-height:none;flex:1;}
  #platePage .btn-ink{pointer-events:auto;}
  #pgBody{pointer-events:auto;max-width:50ch;max-height:58vh;overflow-y:auto;scrollbar-width:none;}
  #pgBody::-webkit-scrollbar{display:none;}
  /* the notes column: leaf cards clamp in the stack, open in full screen */
  #pgBody .leaf{margin-bottom:20px;}
  #pgBody .ltxt{display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
  #plate.pgfull #pgBody .ltxt{-webkit-line-clamp:unset;display:block;overflow:visible;}
  /* slide-mode stepping: bare glyphs and hairline dots — no carousel furniture */
  #pgNav{display:none;align-items:center;gap:10px;margin-top:26px;max-width:50ch;min-height:28px;}
  #pgNav button{pointer-events:auto;cursor:pointer;width:28px;height:28px;display:grid;place-items:center;
    background:transparent;border:1px solid var(--rule);border-radius:2px;color:var(--ink-soft);
    font:400 14px 'JetBrains Mono',monospace;transition:border-color .16s,color .16s,background .16s;}
  #pgNav button:hover{border-color:var(--ink);color:var(--ink);}
  #pgNav button:disabled{opacity:.25;cursor:default;border-color:var(--rule);color:var(--ink-soft);}
  #pgDash{display:flex;gap:6px;align-items:center;}
  #pgDash .dsh{width:14px;height:2px;background:var(--rule);transition:background .2s;}
  #pgDash .dsh.on{background:var(--ink);}
  #pgDash .dnt{width:3px;height:3px;border-radius:50%;background:var(--rule);transition:background .2s;}
  #pgDash .dnt.on{background:var(--ink);}
  /* the in-panel editor & leaf cards belong to the shared notes column
     (asterlogos.css) — nothing bespoke lives on the node page anymore */
  #pgBody .lvEdit{pointer-events:auto;}
  /* the writing act: one inverted square, one fine glyph (the canonical corner) */
  #plateNote{position:absolute;right:var(--edge-x);bottom:var(--edge-bottom);z-index:6;
    width:var(--control-h);height:var(--control-h);
    display:grid;place-items:center;cursor:pointer;background:var(--ink);color:var(--paper);
    border:1px solid var(--ink);border-radius:var(--control-r);box-shadow:var(--shadow-sm);
    transition:background .18s,box-shadow .2s,transform .2s;}
  #plateNote:hover{background:#000;box-shadow:var(--lift);transform:translateY(-1px);}
  #plateNote:active{transform:scale(0.95);}

  /* the shell is writing on this knot: the reading column yields the recto */
  #plate.writing #platePage,#plate.writing #plateNote,#plate.writing #plateHint{visibility:hidden;}

  /* NOTE PANEL FULL SCREEN — the same pattern as the book topology: the
     sculpture recedes; the reading (and its writing/editing) takes the page,
     stacked centre-screen. Toggled from the panel head. */
  /* the figure recede is driven from the plate's rAF loop (see setPlateFull),
     not a CSS opacity transition — that transition stalls under the WebGL
     render loop and leaves the figure fully painted (focus mode "not deployed") */
  #plate.pgfull #plateMount{pointer-events:none;}
  #plate.pgfull #platePage{right:auto;left:50%;transform:translateX(-50%);
    width:min(680px,92vw);top:96px;bottom:56px;padding:0;}
  /* focus mode: the reading sits centred in the page — vertically (pgWrap)
     and horizontally (the 50ch body is auto-margined within its 680 column,
     instead of hugging the left). This matches the surface's notes-fullscreen. */
  #plate.pgfull #pgWrap{justify-content:center;}
  #plate.pgfull #pgBody{max-height:78vh;flex:0 1 auto;width:100%;margin:0 auto;}
  #plate.pgfull #cartouche,#plate.pgfull #plateHint{opacity:0 !important;pointer-events:none;}

  /* locator cartouche — bottom-left, chart furniture */
  #cartouche{position:absolute;left:30px;bottom:28px;z-index:6;background:var(--paper);
    border:1px solid var(--ink);border-radius:3px;box-shadow:3px 4px 0 rgba(27,25,22,0.12);padding:11px 12px 9px;}
  #cartouche .cHead{font:400 7.5px 'JetBrains Mono',monospace;letter-spacing:.24em;text-transform:uppercase;color:var(--ghost);margin-bottom:7px;}
  #cartCanvas{display:block;}

  #plateHint{position:absolute;left:29%;bottom:26px;transform:translateX(-50%);z-index:5;pointer-events:none;
    font:400 9px 'JetBrains Mono',monospace;letter-spacing:.28em;text-transform:uppercase;color:var(--ink-soft);
    opacity:.55;transition:opacity .8s;}

  @media (max-width:680px){
    #plateTopbar{left:20px;}
    #platePage{left:0;right:0;top:auto;bottom:0;width:auto;justify-content:flex-end;
      padding:14px 20px 16px;background:var(--paper);border-top:1px solid var(--rule);}
    #pgBody{max-height:34vh;}
    #plateHint,#cartouche,#plateNote{display:none !important;}
  }
  @media (prefers-reduced-motion: reduce){ #plate{transition:none;} }
</style>
</head>
<body>
<div id="stage">
  <div id="mount"></div>
  <svg id="svg">
    <line id="leadline" x1="0" y1="0" x2="0" y2="0" stroke="rgba(27,25,22,0.5)" stroke-width="1"></line>
  </svg>
  <div id="caps"></div>
  <div id="titlecard">
    <div class="t">The Iliad</div>
    <div class="s">The standing order · touch any figure</div>
  </div>
  <div id="hint">Drag to orbit · pinch to zoom · two fingers to pan · tap a figure</div>
  <div id="refresh"></div>
</div>

<!-- FULL-PAGE PLATE: one sculpture, isolated, with its own 3D view -->
<div id="plate" aria-hidden="true">
  <div id="plateMount"></div>
  <div id="plateTopbar">
    <button id="plateBack" type="button" class="btn btn--sheet" aria-label="Back to the atlas">
      <span class="arr">‹</span><span class="lbl">The standing order</span>
    </button>
    <div id="plateHead">
      <div id="plateTitle"></div>
      <div id="platePlace"></div>
    </div>
  </div>

  <!-- the reading page: points (it tells) · your notes · end (where next) -->
  <div id="platePage">
    <div id="pgEyebrow" class="panel-head"><span id="pgLabel" class="ph-label"></span><span id="pgCount" class="ph-count"></span><div id="pgHeadActs" class="ph-acts"></div>
      <button id="pgClose" type="button" class="icon-act ph-close" aria-label="Close the reading" title="Close">
        <svg viewBox="0 0 14 14" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"><path d="M3 3l8 8M11 3l-8 8"/></svg>
      </button></div>
    <div id="pgWrap">
      <div id="pgBody"></div>
      <div id="pgNav">
        <button id="pgPrev" type="button" aria-label="Previous point">‹</button>
        <div id="pgDash"></div>
        <button id="pgNext" type="button" aria-label="Next point">›</button>
      </div>
    </div>
  </div>

  <!-- the writing act — a new page in the stream, right where you stand -->
  <button id="plateNote" type="button" aria-label="Write a note here" title="Write">
    <svg width="17" height="17" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" aria-hidden="true"><path d="M8 2.5v11M2.5 8h11"/></svg>
  </button>

  <!-- locator cartouche: only when the perception is cartographic -->
  <div id="cartouche">
    <div class="cHead">The standing order · rank</div>
    <canvas id="cartCanvas"></canvas>
  </div>

  <div id="plateHint">Drag to turn · pinch or scroll to zoom</div>
</div>

<div id="err"></div>

<script>
window.addEventListener('error', function(e){
  var d=document.getElementById('err'); d.style.display='block';
  d.textContent=(d.textContent?d.textContent+'\n':'')+'['+(e.message||e.type)+']';
});
(function(){
  var srcs=[
    'https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js',
    'https://unpkg.com/three@0.128.0/build/three.min.js'
  ];
  function load(i){
    if(i>=srcs.length){
      var d=document.getElementById('err'); d.style.display='block';
      d.textContent='Could not load the 3D library (THREE). Check your connection and reload.';
      var h=document.getElementById('hint'); if(h) h.textContent='3D library failed to load';
      return;
    }
    var s=document.createElement('script');
    s.src=srcs[i];
    s.onload=function(){ if(!window.THREE){ load(i+1); } };
    s.onerror=function(){ load(i+1); };
    document.head.appendChild(s);
  }
  load(0);
})();
</script>
<script>
// the shared cloud engine sits beside the prototypes; resolve it from the
// /prototypes/ segment so clean-URL servers (no trailing slash) still find it
(function(){
  var p=location.pathname, i=p.indexOf('/prototypes/');
  var base=(i>=0)?p.slice(0,i+12):'../';
  document.write('<script src="'+base+'_shared/cloud-engine.js"><\/script>');
})();
</script>

<script>
(function(){
  'use strict';

  /* ============================================================
     THE ILIAD — TOPOLOGY  ·  "The Standing Order"
     The Odyssey spends its y-axis once, on the descent to the dead.
     The Iliad spends nothing else: here the y-axis IS the structure.
     Not a map you cross but an order of being you fall through —
     goddess, supra-human, hero, people, animal — rank by rank to
     the dogs. Each knot sits at the altitude of its rank; x spreads
     the figures within a rank, z carries the seams that cross between.

     E-INK ADAPTATION
     ----------------
     No colour. The seven concepts are told apart by MARK — a dot-
     signature each — and by ink-density. Dark ink on warm paper.
     ============================================================ */

  // aspect = concept lens (drives emphasis + resting tone):
  //   0 kleos      glory            5 epiphany   the crossing
  //   1 menis      wrath (darkest)  6 timē       honour / the prize
  //   2 moira      fate             8 (floor pinprick, structural)
  //   3 mortality  the mortal line
  //   4 atimia     exposure (heavy)
  const READING_BY = 'Constantin Chopin';

  // the five ranks, top → bottom; y is the whole poem's spine
  const STRATA = [
    { id:'gods',    label:'The Gods',         y: 3.4 },
    { id:'supra',   label:'The Supra-human',  y: 1.7 },
    { id:'heroes',  label:'Warriors · Kings', y: 0.0 },
    { id:'people',  label:'The People',       y:-1.7 },
    { id:'animals', label:'The Animals',      y:-3.4 },
  ];
  const STRAT = Object.fromEntries(STRATA.map(s=>[s.id,s]));

  // x = the figure's place across its rank; z carries the seams
  // (a node pulled forward in z is a crossing). yOff nudges within a band.
  const KNOTS = [
    { id:'zeus',      name:'Zeus',          strat:'gods',    x: 0.0, z: 0.0, aspect:2, place:'The scales · the plan of Zeus',
      orient:'The immortal ceiling. Above all of it, and free — because nothing a god does can ever cost a god the one thing it costs everyone below.' },
    { id:'athena',    name:'Athena',        strat:'gods',    x:-1.7, z: 0.2, aspect:5, place:'The hand · the restraint',
      orient:'The crossing made flesh: she reaches down, visible to one man alone, and rearranges the story by the hair.' },
    { id:'apollo',    name:'Apollo',        strat:'gods',    x: 1.7, z:-0.2, aspect:5, place:'The bow · a descent like night',
      orient:'He comes down "like night" and looses his plague-arrows. A passing displeasure above; the end of the world below.' },
    { id:'achilles',  name:'Achilles',      strat:'supra',   x:-1.0, z: 0.0, aspect:1, place:'The shield · gift and wound',
      orient:'Close enough to the divine to feel its pull; mortal enough to die anyway. The shield holds the whole ordered cosmos — the hierarchy he is caught inside.' },
    { id:'helen',     name:'Helen',         strat:'supra',   x: 1.2, z: 0.1, aspect:0, place:'The loom · the cause',
      orient:'Her divine beauty is catalytic — it draws an army across the sea. And she weaves the very war being fought over her.' },
    { id:'agamemnon', name:'Agamemnon',     strat:'heroes',  x:-1.2, z: 0.0, aspect:6, place:'The sceptre · lord of men',
      orient:'Glory is won only to be surrendered, or seized outright by someone stronger — exactly as he seizes Briseis.' },
    { id:'hector',    name:'Hector',        strat:'heroes',  x: 1.2, z: 0.0, aspect:0, place:'The wall · the lone defender',
      orient:'The code draws him from defending his people toward something lonelier: standing outside the walls, alone, to meet Achilles.' },
    { id:'thersites', name:'Thersites',     strat:'people',  x:-1.1, z: 0.1, aspect:4, place:'The truth · the wrong mouth',
      orient:'He says much of what Achilles has already said. The only difference is rank — and the order is restored by force.' },
    { id:'multitude', name:'The Multitude', strat:'people',  x: 1.1, z:-0.1, aspect:3, place:'The thousands · sent to Hades',
      orient:'In a story whose named figures are all kings, the common soldier is scenery — present in their thousands, dying in their thousands, invisible.' },
    { id:'lion',      name:'The Lion',      strat:'animals', x:-2.4, z: 0.1, aspect:1, place:'The simile · ferocity',
      orient:'Lions and wolves carry the predatory ferocity of battle — the simile lets a man become, for a line, pure appetite.' },
    { id:'eagle',     name:'The Eagle',     strat:'animals', x:-0.8, z:-0.1, aspect:2, place:'The omen · the legible sign',
      orient:'The eagle arrives as an omen, its flight read as the legible will of the gods — nature made to bear witness.' },
    { id:'horses',    name:'The Horses',    strat:'animals', x: 0.8, z: 0.1, aspect:3, place:'The chariot · mortality’s reach',
      orient:'Even horses of divine descent are not spared. They keep insisting on mortality’s reach — and weep for it.' },
    { id:'dogs',      name:'The Dogs',      strat:'animals', x: 2.4, z:-0.1, aspect:4, place:'The floor · exposure',
      orient:'The floor of the whole structure: to fall to them is to be unmade, exposed, no longer a person. This is the threat the proem names first.' },
    // the seam — the Feminine/Masculine mirror, pulled forward in z,
    // suspended between the hero's rank and the people's fate
    { id:'farewell',  name:'The Farewell',  strat:'heroes',  x: 1.2, z: 1.5, aspect:3, yOff:-0.9, place:'The Scaean gate · the mirror',
      orient:'His doom and hers are mirror images of the same helplessness — his death, her enslavement. Two faces of lives no one fully owns.' },
  ];

  const ROUTE = [];                              // the Iliad has no voyage
  // the proem's spine — one figure per rank, named top to bottom
  const DESCENT = ['zeus','achilles','agamemnon','multitude','dogs'];

  KNOTS.forEach(k=>{ const s=STRAT[k.strat]; k.y=s.y+(k.yOff||0); k.stratLabel=s.label; });
  const byId = Object.fromEntries(KNOTS.map(k=>[k.id,k]));

  const XS = KNOTS.map(k=>k.x), YS = KNOTS.map(k=>k.y);
  const EXT = Math.max(
    Math.max(...XS)-Math.min(...XS),
    Math.max(...YS)-Math.min(...YS)
  );

  // this perception is not cartographic: the plate locator is a rung-scale
  // (where you stand in the order), not a map of a sea.
  const CARTOGRAPHIC = false;

  // ---- concept memberships (drive the Kindred chips) ----
  const KCON={zeus:['moira','kleos'],athena:['epiphany','menis'],apollo:['epiphany','atimia'],
    achilles:['menis','mortality','moira','kleos'],helen:['kleos','moira'],
    agamemnon:['time','kleos'],hector:['kleos','mortality','time'],
    thersites:['kleos','atimia'],multitude:['mortality','atimia'],
    lion:['menis','kleos'],eagle:['moira','epiphany'],horses:['mortality','moira'],
    dogs:['atimia','mortality'],farewell:['mortality','moira','time']};
  function kindredOf(k){
    const mine=KCON[k.id]||[];
    return KNOTS.map((o,i)=>{ const shared=(KCON[o.id]||[]).filter(c=>mine.indexOf(c)>=0);
        return {o,i,shared,s:shared.length}; })
      .filter(x=>x.o.id!==k.id && x.s>0)
      .sort((a,b)=>b.s-a.s||a.i-b.i).slice(0,3);
  }

  // ---- note objects: the surface's store is the single truth; the old
  //      odyssey_note_/odyssey_log strings are derived (thread + legacy) ----
  function loadObjs(){ try{ return JSON.parse(localStorage.getItem('ast_notes_v2')||'[]'); }catch(e){ return []; } }
  function saveObjs(a){ try{ localStorage.setItem('ast_notes_v2',JSON.stringify(a)); }catch(e){} }
  function syncDerived(){
    const objs=loadObjs();
    KNOTS.forEach(k=>{
      const txt=objs.filter(n=>n.node===k.id).sort((a,b)=>a.ts-b.ts).map(n=>n.text).join('\n\n');
      try{ txt?localStorage.setItem('iliad_note_'+k.id,txt):localStorage.removeItem('iliad_note_'+k.id); }catch(e){}
    });
    const order=KNOTS.filter(k=>objs.some(n=>n.node===k.id))
      .sort((a,b)=>Math.min.apply(null,objs.filter(n=>n.node===a.id).map(n=>n.ts))
                  -Math.min.apply(null,objs.filter(n=>n.node===b.id).map(n=>n.ts)))
      .map(k=>k.id);
    try{ localStorage.setItem('iliad_log',JSON.stringify(order)); }catch(e){}
  }

  // ---- seed: the essay's insights as notes, once (book + node level) ----
  function seedNotes(){
    try{ if(localStorage.getItem('ast_iliad_seed_v1')) return; }catch(e){ return; }
    const objs=loadObjs();
    if(objs.some(n=>n.book==='iliad')){ try{ localStorage.setItem('ast_iliad_seed_v1','1'); }catch(e){} return; }
    const base=Date.now(); let i=0;
    const mk=o=>Object.assign({id:'nil'+i+'x'+base.toString(36),type:'thought',book:'iliad',node:null,ts:base-(i++)*3600e3},o);
    const seed=[
      mk({type:'quote',text:'“Goddess, sing of the cataclysmic wrath of great Achilles, son of Peleus, which caused the Greeks immeasurable pain and sent so many noble souls of heroes to Hades, and made men the spoils of dogs, a banquet for the birds, and so the plan of Zeus unfolded.”',src:'Iliad, Book 1 — tr. Emily Wilson'}),
      mk({text:'It does not begin with the war, or with Troy, or even with Achilles. It begins with a goddess, and then descends — rank by rank, all the way to the dogs. That descent is the architecture of the entire poem.'}),
      mk({text:'The most interesting moments are not the duels. They are the places where one layer pushes against another, and the order strains.'}),
      mk({node:'zeus',text:'Their immortality is precisely what frees them to be petty — nothing they do can ever cost them the one thing it costs everyone beneath them.'}),
      mk({node:'athena',text:'She catches him by the hair — visible to him alone — and redirects the whole story in a single gesture, then returns to Olympus as though nothing had happened.'}),
      mk({node:'apollo',text:'For the god it is a small correction, a passing displeasure. For the men dying of the plague it is the end of the world. That gap is the cosmic hierarchy made physical.'}),
      mk({node:'achilles',text:'Close enough to the divine to feel its pull; mortal enough to die anyway. His foreknowledge of his death is gift and wound at once.'}),
      mk({node:'helen',text:'Her divine beauty is catalytic — it draws a colossal army across the sea — and she weaves the very war being fought over her into a tapestry.'}),
      mk({node:'agamemnon',text:'A man’s motivations narrow to a single point: to win glory, and to be seen to have won it. That, in the Achaean world, is what it means to exist at all.'}),
      mk({node:'hector',text:'His fall foreshadows the fall of Troy itself, for he is the city’s defender. Andromache begs him not to go, because she knows what his death will mean.'}),
      mk({node:'thersites',text:'The same defiance that is tragic from a hero is contemptible from a commoner, and Odysseus beats him with the royal sceptre while the other men laugh.'}),
      mk({node:'multitude',text:'They are, to this poem, what extras are to a film — until the poem lets one of them speak, and tests its own aristocratic logic.'}),
      mk({node:'lion',text:'Lions and wolves carry the predatory ferocity of battle — the simile lets a man become, for a line, pure appetite.'}),
      mk({node:'eagle',text:'Eagles arrive as omens, their flight read as the legible will of the gods — nature made to bear witness to the tragic unfolding.'}),
      mk({node:'horses',text:'Even those of divine descent are not spared. The horses lend their riders nobility and speed, yet keep insisting on mortality’s reach.'}),
      mk({type:'quote',node:'dogs',text:'“made men the spoils of dogs, a banquet for the birds”',src:'Iliad, Book 1 — tr. Emily Wilson'}),
      mk({node:'dogs',text:'The threat the proem names in its very first lines is not only death but exposure — to be left for dogs and birds, to fall out of the human order and become meat.'}),
      mk({node:'farewell',text:'His doom and hers are mirror images of the same helplessness. The poem grants these characters magnificent voices and almost no freedom.'}),
    ];
    saveObjs(seed.concat(objs));
    try{ localStorage.setItem('ast_iliad_seed_v1','1'); }catch(e){}
  }

  // ---- locator: a vertical rung-scale — where you stand in the order,
  //      the non-cartographic twin of the Odyssey's little sea-map ----
  function drawRungs(cv,k){
    const dpr=Math.min(window.devicePixelRatio||1,2);
    const W=176,H=168; cv.width=W*dpr; cv.height=H*dpr; cv.style.width=W+'px'; cv.style.height=H+'px';
    const g=cv.getContext('2d'); g.setTransform(dpr,0,0,dpr,0,0); g.clearRect(0,0,W,H);
    const padY=15, spine=18;
    g.strokeStyle='rgba(27,25,22,0.42)'; g.lineWidth=1;
    g.beginPath(); g.moveTo(spine,padY); g.lineTo(spine,H-padY); g.stroke();
    g.fillStyle='rgba(27,25,22,0.42)';                                   // the descent arrow at the foot
    g.beginPath(); g.moveTo(spine-3,H-padY-5); g.lineTo(spine+3,H-padY-5); g.lineTo(spine,H-padY+1); g.fill();
    g.font='9px "JetBrains Mono", monospace'; g.textBaseline='middle';
    const hereStrat=(byId[k.id]||k).strat;
    STRATA.forEach((s,i)=>{
      const y=padY+(H-2*padY)*(i/(STRATA.length-1));
      const here=hereStrat===s.id;
      g.strokeStyle=here?'#1b1916':'rgba(27,25,22,0.3)'; g.lineWidth=here?1.7:1;
      g.beginPath(); g.moveTo(spine,y); g.lineTo(spine+(here?13:7),y); g.stroke();
      if(here){ g.fillStyle='#1b1916'; g.beginPath(); g.arc(spine,y,3.2,0,7); g.fill(); }
      g.fillStyle=here?'#1b1916':'rgba(27,25,22,0.5)';
      g.fillText(s.label.toUpperCase(), spine+19, y+0.5);
    });
  }

  // ============================================================
  //  LITERAL SCULPTURES — one volumetric metaphor per knot.
  //  Module-scope so BOTH the atlas map and the full-page plate can
  //  build them. Each builder receives (k, e) where
  //  e(dx,dy,dz,size,mark,colOverride) places a point in LOCAL space
  //  (origin-centred); the caller decides where that origin sits and
  //  at what scale. Figures of people are rendered by ATTRIBUTE.
  //  mark ids: 1 disc,2 stipple,3 dblring,4 cross,5 ring,6 blot,
  //            7 bar,8 square,9 routedot,0 pinprick
  // ============================================================
  // ---- geometry + stroke helpers — shared with every perception via
  //      the cloud engine (../_shared/cloud-engine.js). The treatment:
  //      many SMALL points tracing edges and surfaces, never fat fills;
  //      full-ink accents kept rare. Strokes are dense point-runs. ----
  const {R,gj,sdir,pRing,pDisc,pCone,pConeShell,pCol,pWall,pProfile,pProfileShell,
         pEll,stroke,strokeD,seg,segD,IFK}=window.CloudEngine;

  const SCULPT = {
    // 1 · ZEUS — the golden scales: the beam tipped, one pan sinking with
    //     the doomed fate; "and so the plan of Zeus unfolded."
    zeus(k,e){
      seg(e,[0,0,0],[0,0.66,0],46,1.2,7,IFK,0.005);                            // the fulcrum
      seg(e,[-0.52,0.52,0],[0.52,0.68,0],56,1.1,7,IFK,0.004);                  // the beam, one side down
      seg(e,[-0.52,0.52,0],[-0.52,0.16,0],20,0.95,7,null,0.004);               // left cord (sinking)
      seg(e,[0.52,0.68,0],[0.52,0.40,0],20,0.95,7,null,0.004);                 // right cord (rising)
      for(let i=0;i<80;i++){ const t=R()*6.2831, r=0.18*Math.sqrt(R());        // the heavy pan
        e(-0.52+Math.cos(t)*r, 0.16-0.05*(1-r/0.18), Math.sin(t)*r, 1.05, 5); }
      e(-0.52,0.14,0,2.6,1,IFK);                                               // the doomed weight — accent
      for(let i=0;i<60;i++){ const t=R()*6.2831, r=0.15*Math.sqrt(R());        // the light pan
        e(0.52+Math.cos(t)*r, 0.40, Math.sin(t)*r, 1.0, 5); }
      for(let i=0;i<70;i++){ const p=pDisc(0.5,0); e(p[0],0.0,p[2],1.0,0); }
    },
    // 2 · ATHENA — the hand from above: a shaft of presence descending into
    //     a grip at a lock of hair; she catches him and the story turns.
    athena(k,e){
      stroke(e,f=>[gj(0.012), 1.2-f*0.9, gj(0.012)],120,0.95,2,null,0.02);     // the descent of the god
      seg(e,[0,0.34,0],[0.16,0.14,0.02],22,1.15,1,IFK,0.006);                  // the forearm
      pEll(e,0.18,0.12,0.02,0.05,0.04,0.04,44,1.15,1,IFK);                     // the hand / knuckles
      for(let s=0;s<5;s++){ const o=-0.03+s*0.015;                             // the seized lock of hair
        stroke(e,f=>[0.18+o, 0.10-f*0.22, 0.02+gj(0.01)],18,0.85,2,null,0.006); }
      e(0.18,0.12,0.02,2.4,1,IFK);                                            // the grip — accent
      for(let i=0;i<60;i++){ const p=pDisc(0.42,0); e(p[0],0.0,p[2],0.95,0); }
    },
    // 3 · APOLLO — the bow, and a descent "like night": plague-arrows raining
    //     down as fine stipple, a wash of dark falling on the camp.
    apollo(k,e){
      const by=0.92;
      stroke(e,f=>{ const a=-1.05+f*2.1; return [Math.sin(a)*0.4, by+Math.cos(a)*0.4, 0]; },80,1.3,1,IFK,0.005); // the bow
      seg(e,[Math.sin(-1.05)*0.4,by+Math.cos(-1.05)*0.4,0],
            [Math.sin(1.05)*0.4,by+Math.cos(1.05)*0.4,0],40,0.85,7,null,0.004); // the string
      for(let s=0;s<7;s++){ const ax=-0.45+s*0.15;                            // the arrows, falling
        segD(e,[ax+gj(0.02),by-0.1,gj(0.05)],[ax*0.4+gj(0.05),0.0,gj(0.05)],0.03,0.85,2,null,0.01); }
      for(let i=0;i<120;i++){ e((R()-0.5)*0.9, R()*by, (R()-0.5)*0.4, 0.8, 2, [0.5,0.49,0.46]); } // "like night"
      e(0,by,0,2.2,1,IFK);                                                     // the grip
    },
    // 4 · ACHILLES — the shield of Achilles: the whole ordered cosmos in
    //     concentric tiers, the sun-boss at its heart, the Ocean at its rim.
    //     The hierarchy he is caught inside, carried on his arm.
    achilles(k,e){
      const cy=0.55;
      const rings=[0.12,0.24,0.36,0.48];
      rings.forEach((r,ri)=>{ const n=Math.round(70+r*150);
        for(let i=0;i<n;i++){ const t=R()*6.2831;
          e(Math.cos(t)*r, cy+Math.sin(t)*r, gj(0.01), 1.05, (ri%2)?5:1); } });
      for(let i=0;i<52;i++){ const t=R()*6.2831, r=0.07*Math.sqrt(R());        // the sun-boss — full ink
        e(Math.cos(t)*r, cy+Math.sin(t)*r, 0.02, 1.2, 1, IFK); }
      e(0,cy,0.03,2.6,1,IFK);
      for(let i=0;i<210;i++){ const t=R()*6.2831;                              // the Ocean rim — heavy band
        e(Math.cos(t)*(0.6+gj(0.015)), cy+Math.sin(t)*(0.6+gj(0.015)), gj(0.01), 1.15, 6); }
      for(let s=0;s<8;s++){ const a=s/8*6.2831;                                // radial fields
        strokeD(e,f=>[Math.cos(a)*0.6*f, cy+Math.sin(a)*0.6*f, gj(0.006)],0.03,0.7,2,[0.5,0.49,0.45]); }
      for(let i=0;i<60;i++){ const p=pDisc(0.4,0); e(p[0],0.0,p[2],0.9,0); }
    },
    // 5 · HELEN — the loom: an upright frame, the warp, a half-woven band
    //     rising — she weaves the very war being fought over her.
    helen(k,e){
      const w=0.5,h=0.82;
      seg(e,[-w,0,0],[-w,h,0],40,1.1,7,IFK,0.004);                            // frame
      seg(e,[w,0,0],[w,h,0],40,1.1,7,IFK,0.004);
      seg(e,[-w,h,0],[w,h,0],36,1.1,7,IFK,0.004);
      seg(e,[-w,0,0],[w,0,0],36,1.0,7,null,0.004);
      for(let s=0;s<11;s++){ const x=-w+(s/10)*2*w;                            // the warp threads
        segD(e,[x,0.02,0],[x,h-0.02,0],0.02,0.72,2,null,0.006); }
      for(let i=0;i<200;i++){ const x=-w+R()*2*w, y=R()*0.3;                   // the woven war, rising
        e(x, 0.02+y, gj(0.008), 0.9, 2, y<0.16?IFK:null); }
      e(0.1,0.2,0.03,2.2,1,IFK);                                              // the shuttle — accent
      for(let i=0;i<50;i++){ const p=pDisc(0.36,0); e(p[0],0.0,p[2],0.9,0); }
    },
    // 6 · AGAMEMNON — the sceptre: an upright studded staff, and the seized
    //     prize led away at its foot (Briseis, the honour taken by force).
    agamemnon(k,e){
      seg(e,[0,0,0],[0,0.9,0],80,1.2,7,IFK,0.005);                            // the staff
      pEll(e,0,0.95,0,0.07,0.08,0.07,60,1.2,1,IFK);                           // the head
      for(let i=0;i<8;i++){ const a=i/8*6.2831; e(Math.cos(a)*0.09,0.95,Math.sin(a)*0.09,1.8,1,IFK); } // studs
      const px=0.36;                                                          // the seized prize
      seg(e,[px,0.0,0.05],[px,0.34,0.05],22,1.05,1,null,0.005);
      e(px,0.4,0.05,2.0,1,IFK);                                              // her bowed head
      stroke(e,f=>[px-f*0.18,0.24,0.05],10,0.8,2,null,0.006);                 // led away
      for(let i=0;i<60;i++){ const p=pDisc(0.44,0); e(p[0],0.0,p[2],0.95,0); }
    },
    // 7 · HECTOR — the wall & the lone defender: an arc of stone, one
    //     figure standing outside it, apart, helmed and plumed, spear up.
    hector(k,e){
      for(let i=0;i<300;i++){ const t=-0.9+R()*1.8, rr=0.6;                    // the wall, an arc of courses
        e(Math.sin(t)*rr, R()*0.5, -0.18+Math.cos(t)*0.14, 1.1, 8); }
      const fz=0.5;                                                           // outside the wall (+z), apart
      seg(e,[0,0.0,fz],[0,0.42,fz],26,1.15,1,IFK,0.005);                       // the body
      pEll(e,0,0.5,fz,0.055,0.06,0.05,44,1.2,1,IFK);                          // the helmed head
      stroke(e,f=>[-0.02, 0.56+Math.sin(f*Math.PI)*0.08, fz+f*0.12],16,1.0,6,IFK,0.005); // the plume
      e(0,0.5,fz,2.2,1,IFK);
      seg(e,[0.12,0.0,fz],[0.12,0.6,fz],30,1.0,7,null,0.004);                  // his spear
      for(let i=0;i<60;i++){ const p=pDisc(0.5,0); e(p[0],0.0,p[2],0.95,0); }
    },
    // 8 · THERSITES — the truth struck down: one figure risen from a field
    //     of bowed marks, the royal sceptre descending on him.
    thersites(k,e){
      for(let i=0;i<160;i++){ const p=pDisc(0.55,0); e(p[0], 0.02+R()*0.06, p[2], 0.9, 0); } // the seated army
      for(let i=0;i<40;i++){ const p=pDisc(0.5,0); e(p[0],0.06+R()*0.05,p[2],1.0,1,[0.5,0.49,0.45]); }
      seg(e,[0,0.0,0],[0,0.4,0],24,1.15,1,IFK,0.005);                          // the one risen voice
      e(0,0.46,0,2.2,1,IFK);
      segD(e,[-0.3,0.72,0.0],[0.02,0.5,0.0],0.02,1.2,7,IFK,0.004);             // the sceptre coming down
      e(-0.3,0.74,0,2.2,1,IFK);                                               // its head — accent
    },
    // 9 · THE MULTITUDE — the thousands to Hades: a dense uniform field of
    //     anonymous marks, a portion tipping into the dark line below.
    multitude(k,e){
      for(let i=0;i<520;i++){ const x=(R()-0.5)*1.2, z=(R()-0.5)*0.8;
        if(R()<0.28){ e(x, -0.1-R()*0.5, z, 0.85, 0, [0.45,0.44,0.4]); }       // tipping into the dark

      pEll(e,0.3,0.26,0,0.08,0.07,0.07,50,1.15,1);                            // the head, thrust forward
      e(0.36,0.28,0.03,2.2,1,IFK);                                            // the eye
      seg(e,[0.18,0.24,0.06],[0.34,0.02,0.1],14,1.05,1,null,0.005);            // legs, mid-spring

      for(let i=0;i<50;i++){ const p=pDisc(0.5,0); e(p[0],0.0,p[2],0.9,0); }
    },
    // 11 · THE EAGLE — the omen: wings spread, a serpent writhing in the

    eagle(k,e){

      e(0.1,by+0.02,0,2.2,1,IFK);                                             // head / beak
