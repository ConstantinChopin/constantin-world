<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Odyssey — A Wandering</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Newsreader:opsz,wght@6..72,300;6..72,400&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<script>
// the design system sits beside the prototypes; resolve it from the
// /prototypes/ segment so clean-URL servers (no trailing slash) still find it
(function(){
  var p=location.pathname, i=p.indexOf('/prototypes/');
  var base=(i>=0)?p.slice(0,i+12):'../';
  document.write('<link rel="stylesheet" href="'+base+'_shared/asterlogos.css">');
})();
</script>
<style>
  html,body{margin:0;padding:0;background:var(--paper);height:100%;overflow:hidden;}
  *{box-sizing:border-box;}
  #stage{position:fixed;inset:0;background:var(--paper);overflow:hidden;font-family:'Newsreader',Georgia,serif;}
  #mount{position:absolute;inset:0;}
  /* faint paper tooth — a barely-there stipple so the "page" isn't flat digital flat */
  #stage::before{content:"";position:absolute;inset:0;z-index:1;pointer-events:none;opacity:0.5;
    background-image:radial-gradient(var(--rule) 0.5px,transparent 0.5px);background-size:3px 3px;mix-blend-mode:multiply;}
  /* vignette like the bezel shadow of an e-ink panel */
  #stage::after{content:"";position:absolute;inset:0;z-index:2;pointer-events:none;
    box-shadow:inset 0 0 120px rgba(70,64,54,0.16);}

  #svg{position:absolute;inset:0;z-index:5;pointer-events:none;width:100%;height:100%;}

  /* node captions — italic place-names floating above each form, old-chart style */
  #caps{position:absolute;inset:0;z-index:6;pointer-events:none;overflow:hidden;}
  .cap{position:absolute;transform:translate(-50%,-100%);white-space:nowrap;
    font:var(--text-caption);font-style:italic;letter-spacing:.04em;color:rgba(57,53,46,0.9);
    text-shadow:0 0 5px var(--paper),0 0 3px var(--paper),0 0 2px var(--paper);
    transition:opacity .3s ease;}

  #legend{position:absolute;left:28px;bottom:28px;z-index:8;pointer-events:none;will-change:opacity;opacity:0;
    width:344px;max-width:86vw;padding:22px 24px 20px;border-radius:3px;
    transition:opacity .35s ease;
    background:var(--paper);
    border:1px solid var(--ink);
    box-shadow:5px 6px 0 rgba(27,25,22,0.14);
    max-height:84vh;overflow-y:auto;}
  #legend.show{pointer-events:auto;}
  #legNum{font:400 9px 'JetBrains Mono',monospace;letter-spacing:.32em;color:var(--ink-soft);text-transform:uppercase;margin-bottom:10px;
    border-bottom:1px solid var(--rule);padding-bottom:9px;}
  #legTitle{font:500 30px 'Cormorant Garamond',Georgia,serif;color:var(--ink);letter-spacing:.01em;margin-bottom:6px;line-height:1.0;}
  #legPlace{font:400 9.5px 'JetBrains Mono',monospace;letter-spacing:.16em;color:var(--ink-soft);text-transform:uppercase;margin-bottom:13px;}
  .reflHead{font:400 8.5px 'JetBrains Mono',monospace;letter-spacing:.3em;color:var(--ghost);text-transform:uppercase;margin-bottom:7px;}
  #legOrient{font:300 14px/1.66 'Newsreader',Georgia,serif;color:var(--ink-soft);margin-bottom:18px;}
  .reflHead2{margin-top:0;}
  #compareBtn,#backBtn{pointer-events:auto;cursor:pointer;background:transparent;
    border:1px solid var(--rule);color:var(--ink-soft);border-radius:var(--control-r);padding:8px 14px;
    font:400 9px 'JetBrains Mono',monospace;letter-spacing:.16em;text-transform:uppercase;transition:all .18s;}
  #compareBtn{margin-top:4px;}
  #compareBtn:hover,#backBtn:hover{background:var(--paper-hi);color:var(--ink);border-color:var(--ink);}
  #backBtn{margin-top:18px;border-color:var(--rule);color:var(--ink-mid);}
  #backBtn:hover{background:var(--paper-hi);color:var(--ink-soft);border-color:var(--ink-soft);}
  #readingWrap{display:none;margin-top:16px;border-top:1px solid var(--rule);padding-top:15px;}
  #noteBox{pointer-events:auto;width:100%;min-height:74px;resize:vertical;box-sizing:border-box;
    background:var(--paper-deep);border:1px solid var(--rule);border-radius:var(--control-r);padding:9px 11px;
    font:300 13.5px/1.55 'Newsreader',Georgia,serif;color:var(--ink);outline:none;transition:border-color .18s;}
  #noteBox:focus{border-color:var(--ink);}
  #noteBox::placeholder{color:var(--ghost);font-style:italic;}
  #legReading{font:300 13.5px/1.66 'Newsreader',Georgia,serif;color:var(--ink-soft);}
  #storeNote{font:400 8px 'JetBrains Mono',monospace;letter-spacing:.1em;color:var(--ghost);text-transform:uppercase;margin-top:14px;}

  #hint{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);z-index:7;pointer-events:none;
    font:var(--text-label);letter-spacing:.3em;color:var(--ink-soft);text-transform:uppercase;transition:opacity .8s;}

  /* the three registers named down the right edge — the poem's vertical axis:
     gods above, the sea between, the dead below. A quiet chart legend. */
  #registers{position:absolute;right:26px;top:50%;transform:translateY(-50%);z-index:6;pointer-events:none;
    display:flex;flex-direction:column;align-items:flex-end;opacity:0;transition:opacity 1.1s;}
  #registers.show{opacity:1;}
  #registers .rg{font:var(--text-label);letter-spacing:.22em;text-transform:uppercase;color:var(--ink-soft);}
  #registers .rgl{width:1px;height:52px;margin:8px 3px;
    background:linear-gradient(rgba(27,25,22,0),rgba(27,25,22,0.3),rgba(27,25,22,0));}
  @media (max-width:680px){ #registers{display:none;} }

  #titlecard{position:absolute;top:26px;left:28px;z-index:7;pointer-events:none;transition:opacity 1.0s;}
  #titlecard .t{font:var(--text-title);color:var(--ink);letter-spacing:.02em;font-style:italic;}
  #titlecard .s{font:var(--text-label);letter-spacing:.34em;color:var(--ink-soft);text-transform:uppercase;margin-top:5px;}

  /* the e-ink refresh flash: a brief full-panel invert on transitions */
  #refresh{position:fixed;inset:0;z-index:40;pointer-events:none;background:var(--ink);opacity:0;}

  #err{position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#e7e4db;color:#7a2318;padding:10px 14px;border-radius:2px;border:1px solid #7a2318;z-index:99999;white-space:pre-wrap;display:none;}

  /* ---------- FULL-PAGE PLATE ---------- */
  #plate{position:fixed;inset:0;z-index:30;background:var(--paper);
    opacity:0;visibility:hidden;transition:opacity .42s ease;
    font-family:'Newsreader',Georgia,serif;}
  #plate.open{opacity:1;visibility:visible;}
  #plate::before{content:"";position:absolute;inset:0;z-index:1;pointer-events:none;opacity:0.5;
    background-image:radial-gradient(var(--rule) 0.5px,transparent 0.5px);background-size:3px 3px;mix-blend-mode:multiply;}
  #plate::after{content:"";position:absolute;inset:0;z-index:2;pointer-events:none;
    box-shadow:inset 0 0 130px rgba(70,64,54,0.18);}
  #plateMount{position:absolute;inset:0;z-index:3;}

  /* plate header — same grammar as the book header, one level deeper:
     [‹ parent chip] [Title, Cormorant italic 21px / mono context line].
     Left-aligned; the centre belongs to the sculpture. Right slot reserved. */
  #plateTopbar{position:absolute;top:var(--edge-top);left:var(--edge-x);z-index:6;display:flex;align-items:center;
    gap:14px;pointer-events:none;}
  #plateBack{pointer-events:auto;flex:0 0 auto;}
  #plateHead{text-align:left;}
  #plateTitle{font:var(--text-title);font-style:italic;color:var(--ink);letter-spacing:.02em;}

  /* ---------- the reading page — letterpress facing the engraving.
     No card, no border: floating text on the paper. The sculpture is
     the verso (left ~58%, camera offset); this column is the recto. */
  #platePage{position:absolute;top:var(--edge-top);right:var(--edge-x);bottom:96px;width:42%;z-index:6;
    display:flex;flex-direction:column;padding:0 24px 0 8px;pointer-events:none;}
  /* the column header rides the masthead line — the canonical .panel-head
     molecule (asterlogos.css); only pointer opt-ins live here */
  #pgEyebrow{flex:0 0 auto;padding:0 14px;margin-bottom:16px;background:var(--veil);
    -webkit-backdrop-filter:blur(7px);backdrop-filter:blur(7px);
    border:1px solid var(--rule);border-radius:var(--control-r);box-shadow:var(--shadow-hair);}
  #plate.pgfull #pgEyebrow{background:transparent;border:0;box-shadow:none;padding:0;
    -webkit-backdrop-filter:none;backdrop-filter:none;}
  #pgEyebrow .ph-acts,#pgEyebrow .icon-act,#pgClose{pointer-events:auto;}
  #pgWrap{flex:1;display:flex;flex-direction:column;justify-content:center;min-height:0;}
  #pgWrap.stack{justify-content:flex-start;}
  #pgWrap.stack #pgBody{max-height:none;flex:1;}
  #platePage .btn-ink{pointer-events:auto;}
  #pgBody{pointer-events:auto;max-width:50ch;max-height:58vh;overflow-y:auto;scrollbar-width:none;}
  #pgBody::-webkit-scrollbar{display:none;}
  /* the notes column: leaf cards clamp in the stack, open in full screen */
  #pgBody .leaf{margin-bottom:20px;}
  #pgBody .ltxt{display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
  #plate.pgfull #pgBody .ltxt{-webkit-line-clamp:unset;display:block;overflow:visible;}
  /* slide-mode stepping: bare glyphs and hairline dots — no carousel furniture */
  #pgNav{display:none;align-items:center;gap:10px;margin-top:26px;max-width:50ch;min-height:28px;}
  #pgNav button{pointer-events:auto;cursor:pointer;width:28px;height:28px;display:grid;place-items:center;
    background:transparent;border:1px solid var(--rule);border-radius:var(--control-r);color:var(--ink-soft);
    font:400 14px 'JetBrains Mono',monospace;transition:border-color .16s,color .16s,background .16s;}
  #pgNav button:hover{border-color:var(--ink);color:var(--ink);}
  #pgNav button:disabled{opacity:.25;cursor:default;border-color:var(--rule);color:var(--ink-soft);}
  #pgDash{display:flex;gap:6px;align-items:center;}
  #pgDash .dsh{width:14px;height:2px;background:var(--rule);transition:background .2s;}
  #pgDash .dsh.on{background:var(--ink);}
  #pgDash .dnt{width:3px;height:3px;border-radius:50%;background:var(--rule);transition:background .2s;}
  #pgDash .dnt.on{background:var(--ink);}
  /* the in-panel editor & leaf cards belong to the shared notes column
     (asterlogos.css) — nothing bespoke lives on the node page anymore */
  #pgBody .lvEdit{pointer-events:auto;}
  /* the writing act: one inverted square, one fine glyph (the canonical corner) */
  #plateNote{position:absolute;right:var(--edge-x);bottom:var(--edge-bottom);z-index:6;
    width:var(--control-h);height:var(--control-h);
    display:grid;place-items:center;cursor:pointer;background:var(--ink-soft);color:var(--paper-hi);
    border:1px solid var(--ink-soft);border-radius:var(--control-r);box-shadow:var(--shadow-hair);
    transition:background .18s,border-color .18s,box-shadow .2s,transform .2s;}
  #plateNote:hover{background:var(--ink);border-color:var(--ink);box-shadow:var(--shadow-sm);transform:translateY(-1px);}
  #plateNote:active{transform:scale(0.95);}

  /* ?embed=manifesto — the manifesto's live excerpt. The slice is READ-ONLY:
     the writing act and the leaf-editing acts retire; authored leaves render.
     Everything else is the instrument itself, untouched. */
  body.embedm #plateNote{display:none !important;}
  body.embedm #pgBody .lrow,body.embedm .lvActs{display:none !important;}

  /* the shell is writing on this knot: the reading column yields the recto */
  #plate.writing #platePage,#plate.writing #plateNote,#plate.writing #plateHint{visibility:hidden;}

  /* FULL PAGE — a focused view, the same as the book topology: the sculpture
     is gone and the plate's own furniture (back chip, title, cartouche) steps
     aside, so the panel head becomes the full-width chrome bar (title far
     left, acts far right) and the notes / writing centre on bare paper. */
  #plate.pgfull #plateMount{opacity:0;pointer-events:none;transition:opacity .4s ease;}
  #plate.pgfull #platePage{left:var(--edge-x);right:var(--edge-x);width:auto;
    top:var(--edge-top);bottom:48px;padding:0;}
  #plate.pgfull #pgWrap{justify-content:flex-start;}
  #plate.pgfull #pgBody,#plate.pgfull #pgNav{max-width:680px;width:100%;margin-left:auto;margin-right:auto;}
  #plate.pgfull #pgBody{max-height:none;flex:1;}
  #plate.pgfull #plateTopbar,#plate.pgfull #cartouche,#plate.pgfull #plateHint{opacity:0 !important;pointer-events:none;}

  /* locator cartouche — bottom-left, chart furniture */
  #cartouche{position:absolute;left:30px;bottom:28px;z-index:6;background:var(--paper);
    border:1px solid var(--ink);border-radius:3px;box-shadow:3px 4px 0 rgba(27,25,22,0.12);padding:11px 12px 9px;}
  #cartouche .cHead{font:var(--text-meta);letter-spacing:.24em;text-transform:uppercase;color:var(--ink-mid);margin-bottom:7px;}
  #cartCanvas{display:block;}

  #plateHint{position:absolute;left:29%;bottom:26px;transform:translateX(-50%);z-index:5;pointer-events:none;
    font:var(--text-label);letter-spacing:.28em;text-transform:uppercase;color:var(--ink-soft);
    opacity:.55;transition:opacity .8s;}

  @media (max-width:680px){
    #plateTopbar{left:20px;}
    #platePage{left:0;right:0;top:auto;bottom:0;width:auto;justify-content:flex-end;
      padding:14px 20px 16px;background:var(--paper);border-top:1px solid var(--rule);}
    #pgBody{max-height:34vh;}
    #plateHint,#cartouche,#plateNote{display:none !important;}
  }
  @media (prefers-reduced-motion: reduce){ #plate{transition:none;} }
</style>
</head>
<body>
<div id="stage">
  <div id="mount"></div>
  <svg id="svg">
    <line id="leadline" x1="0" y1="0" x2="0" y2="0" stroke="rgba(27,25,22,0.5)" stroke-width="1"></line>
  </svg>
  <div id="caps"></div>
  <div id="titlecard">
    <div class="t">The Odyssey</div>
    <div class="s">A logbook · touch any island</div>
  </div>
  <div id="hint">Drag to orbit · pinch to zoom · two fingers to pan · tap an island</div>
  <div id="registers">
    <div class="rg">the gods</div>
    <div class="rgl"></div>
    <div class="rg">the sea</div>
    <div class="rgl"></div>
    <div class="rg">the dead</div>
  </div>
  <div id="refresh"></div>
</div>

<!-- FULL-PAGE PLATE: one sculpture, isolated, with its own 3D view -->
<div id="plate" aria-hidden="true">
  <div id="plateMount"></div>
  <div id="plateTopbar">
    <button id="plateBack" type="button" class="btn btn--sheet" aria-label="Back to the atlas">
      <span class="arr">‹</span><span class="lbl">The wandering</span>
    </button>
    <div id="plateHead">
      <div id="plateTitle"></div>
    </div>
  </div>

  <!-- the reading page: points (it tells) · your notes · end (where next) -->
  <div id="platePage">
    <div id="pgEyebrow" class="panel-head"><span id="pgLabel" class="ph-label"></span><span id="pgCount" class="ph-count"></span><div id="pgHeadActs" class="ph-acts"></div>
      <button id="pgClose" type="button" class="icon-act ph-close" aria-label="Close the reading" title="Close">
        <svg viewBox="0 0 14 14" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"><path d="M3 3l8 8M11 3l-8 8"/></svg>
      </button></div>
    <div id="pgWrap">
      <div id="pgBody"></div>
      <div id="pgNav">
        <button id="pgPrev" type="button" aria-label="Previous point">‹</button>
        <div id="pgDash"></div>
        <button id="pgNext" type="button" aria-label="Next point">›</button>
      </div>
    </div>
  </div>

  <!-- the writing act — a new page in the stream, right where you stand -->
  <button id="plateNote" type="button" aria-label="Write a note here" title="Write">
    <svg width="17" height="17" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" aria-hidden="true"><path d="M8 2.5v11M2.5 8h11"/></svg>
  </button>

  <!-- locator cartouche: only when the perception is cartographic -->
  <div id="cartouche">
    <div class="cHead">The wandering · where</div>
    <canvas id="cartCanvas"></canvas>
  </div>

  <div id="plateHint">Drag to turn · pinch or scroll to zoom</div>
</div>

<div id="err"></div>

<script>
window.addEventListener('error', function(e){
  var d=document.getElementById('err'); d.style.display='block';
  d.textContent=(d.textContent?d.textContent+'\n':'')+'['+(e.message||e.type)+']';
});
(function(){
  var srcs=[
    'https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js',
    'https://unpkg.com/three@0.128.0/build/three.min.js'
  ];
  function load(i){
    if(i>=srcs.length){
      var d=document.getElementById('err'); d.style.display='block';
      d.textContent='Could not load the 3D library (THREE). Check your connection and reload.';
      var h=document.getElementById('hint'); if(h) h.textContent='3D library failed to load';
      return;
    }
    var s=document.createElement('script');
    s.src=srcs[i];
    s.onload=function(){ if(!window.THREE){ load(i+1); } };
    s.onerror=function(){ load(i+1); };
    document.head.appendChild(s);
  }
  load(0);
})();
</script>
<script>
// the shared cloud engine sits beside the prototypes; resolve it from the
// /prototypes/ segment so clean-URL servers (no trailing slash) still find it
(function(){
  var p=location.pathname, i=p.indexOf('/prototypes/');
  var base=(i>=0)?p.slice(0,i+12):'../';
  document.write('<script src="'+base+'_shared/cloud-engine.js"><\/script>');
  document.write('<script src="'+base+'_shared/odyssey-topology.js"><\/script>');
  document.write('<script src="'+base+'_shared/odyssey-sculptures.js"><\/script>');
})();
</script>

<script>
(function(){
  'use strict';

  /* ============================================================
     THE ODYSSEY — TOPOLOGY  (unchanged cartography)
     The sea is a PLANE; the y-axis is spent once, on the descent
     to the dead. Each knot carries a real lon/lat, projected to x/z.

     E-INK ADAPTATION
     ----------------
     There is no colour here. The eight thematic lenses are told
     apart by MARK — a dot-signature each: filled disc, hollow ring,
     fine stipple, dense cluster, small cross, double-ring, bar,
     open square. Meaning is carried by shape and ink-density, the
     way an engraving or a riso distinguishes fields without hue.
     Everything is dark ink on warm paper. Nothing glows.
     ============================================================ */

  // aspect = thematic lens. We keep the same indices, now mapped to
  // a MARK rather than a colour:
  //   0 xenia        -> open square
  //   1 metis        -> filled disc (the solid, the cunning core)
  //   2 lethe        -> fine stipple (dissolving, forgetting)
  //   3 nostos       -> double ring (the pull, concentric, homeward)
  //   4 recognition  -> small cross (the mark that identifies)
  //   5 embedded tale-> hollow ring (a frame around a void)
  //   6 monstrous    -> dense cluster / heavy blot
  //   7 kleos        -> short bar / stroke (what is inscribed)
  //   8 sea          -> faint pinprick
  //   9 route        -> mid dot (literal path)
  // A perception carries its editor: the reading is signed. Per-knot `by`
  // overrides for multi-voice editions. `reading` is string | string[] —
  // an array is a point sequence, turned one page at a time.
  const T = window.OdysseyTopology, S = window.OdysseySculptures;
  const READING_BY = T.READING_BY;

  // ---- the topology & the sculptures now come from the shared modules; the
  //      instrument only CONSUMES them (single source of truth). ----
  const KNOTS = T.NODES;               // all 33 nodes (episodes + figures), positions resolved
  const byId = T.byId;
  const ROUTE = T.ROUTE;
  const project = T.project;
  const NEKUIA_DEPTH = T.NEKUIA_DEPTH;
  const SKY_Y = T.SKY_Y, ISLE_Y = T.ISLE_Y, DEEP_Y = T.DEEP_Y, UNDER_Y = T.UNDER_Y;
  const baseYOf = T.baseYOf;
  const SCULPT = S.SCULPT, aspectInk = S.aspectInk;

  // the sea extent is measured from the EPISODES only (the mapped places), so
  // the off-map figures never widen the plane — the chart stays identical.
  const XS = T.KNOTS.map(k=>k.x), ZS = T.KNOTS.map(k=>k.z);
  const EXT = Math.max(
    Math.max(...XS)-Math.min(...XS),
    Math.max(...ZS)-Math.min(...ZS)
  );

  // ---- the perception's nature: cartographic perceptions carry a locator
  //      cartouche on their plates; other geometries will carry their own ----
  const CARTOGRAPHIC = true;

  // ---- concept memberships (drive the Kindred chips) ----
  const KCON = T.KCON;
  function kindredOf(k){
    const mine=KCON[k.id]||[];
    return KNOTS.map((o,i)=>{ const shared=(KCON[o.id]||[]).filter(c=>mine.indexOf(c)>=0);
        return {o,i,shared,s:shared.length}; })
      .filter(x=>x.o.id!==k.id && x.s>0)
      .sort((a,b)=>b.s-a.s||a.i-b.i).slice(0,3);
  }

  // ---- note objects: the surface's store is the single truth; the old
  //      odyssey_note_/odyssey_log strings are derived (thread + legacy) ----
  function loadObjs(){ try{ return JSON.parse(localStorage.getItem('ast_notes_v2')||'[]'); }catch(e){ return []; } }
  function saveObjs(a){ try{ localStorage.setItem('ast_notes_v2',JSON.stringify(a)); }catch(e){} }
  function syncDerived(){
    const objs=loadObjs();
    KNOTS.forEach(k=>{
      const txt=objs.filter(n=>n.node===k.id).sort((a,b)=>a.ts-b.ts).map(n=>n.text).join('\n\n');
      try{ txt?localStorage.setItem('odyssey_note_'+k.id,txt):localStorage.removeItem('odyssey_note_'+k.id); }catch(e){}
    });
    const order=KNOTS.filter(k=>objs.some(n=>n.node===k.id))
      .sort((a,b)=>Math.min.apply(null,objs.filter(n=>n.node===a.id).map(n=>n.ts))
                  -Math.min.apply(null,objs.filter(n=>n.node===b.id).map(n=>n.ts)))
      .map(k=>k.id);
    try{ localStorage.setItem('odyssey_log',JSON.stringify(order)); }catch(e){}
  }

  // ---- locator cartouche: simplified Mediterranean coastline (lon,lat) ----
  const COASTS = T.COASTS;
  function drawCartouche(cv,k){
    const dpr=Math.min(window.devicePixelRatio||1,2);
    const W=206,H=142; cv.width=W*dpr; cv.height=H*dpr; cv.style.width=W+'px'; cv.style.height=H+'px';
    const g=cv.getContext('2d'); g.setTransform(dpr,0,0,dpr,0,0); g.clearRect(0,0,W,H);
    let minX=1e9,maxX=-1e9,minZ=1e9,maxZ=-1e9;
    const acc=(x,z)=>{ if(x<minX)minX=x; if(x>maxX)maxX=x; if(z<minZ)minZ=z; if(z>maxZ)maxZ=z; };
    COASTS.forEach(l=>l.forEach(pt=>{ const q=project(pt[0],pt[1]); acc(q[0],q[1]); }));
    KNOTS.forEach(kk=>{ if(!kk.offMap) acc(kk.x,kk.z); });
    const pad=9, sc=Math.min((W-2*pad)/(maxX-minX),(H-2*pad)/(maxZ-minZ));
    const ox=(W-(maxX-minX)*sc)/2, oz=(H-(maxZ-minZ)*sc)/2;
    const X=x=>ox+(x-minX)*sc, Y=z=>oz+(z-minZ)*sc;
    g.fillStyle='rgba(27,25,22,0.36)';
    COASTS.forEach(line=>{ for(let i=0;i<line.length-1;i++){
      const a=project(line[i][0],line[i][1]), b=project(line[i+1][0],line[i+1][1]);
      const ax=X(a[0]),ay=Y(a[1]),bx=X(b[0]),by=Y(b[1]);
      const n=Math.max(1,Math.round(Math.hypot(bx-ax,by-ay)/2.4));
      for(let s=0;s<=n;s++){ const f=s/n;
        g.beginPath(); g.arc(ax+(bx-ax)*f+(Math.random()-0.5),ay+(by-ay)*f+(Math.random()-0.5),0.65,0,7); g.fill(); } } });
    g.fillStyle='rgba(27,25,22,0.28)';
    for(let i=0;i<ROUTE.length-1;i++){ const a=byId[ROUTE[i]], b=byId[ROUTE[i+1]];
      const ax=X(a.x),ay=Y(a.z),bx=X(b.x),by=Y(b.z);
      const n=Math.max(1,Math.round(Math.hypot(bx-ax,by-ay)/4.5));
      for(let s=0;s<=n;s++){ const f=s/n; g.beginPath(); g.arc(ax+(bx-ax)*f,ay+(by-ay)*f,0.55,0,7); g.fill(); } }
    g.fillStyle='rgba(27,25,22,0.5)';
    KNOTS.forEach(kk=>{ if(kk.offMap) return; g.beginPath(); g.arc(X(kk.x),Y(kk.z),1.1,0,7); g.fill(); });
    g.strokeStyle='#1b1916'; g.lineWidth=1.1; g.beginPath(); g.arc(X(k.x),Y(k.z),4.6,0,7); g.stroke();
    g.fillStyle='#1b1916'; g.beginPath(); g.arc(X(k.x),Y(k.z),1.9,0,7); g.fill();
  }

  // ============================================================
  //  LITERAL SCULPTURES — one volumetric metaphor per knot.
  //  Module-scope so BOTH the atlas map and the full-page plate can
  //  build them. Each builder receives (k, e) where
  //  e(dx,dy,dz,size,mark,colOverride) places a point in LOCAL space
  //  (origin-centred); the caller decides where that origin sits and
  //  at what scale. Figures of people are rendered by ATTRIBUTE.
  //  mark ids: 1 disc,2 stipple,3 dblring,4 cross,5 ring,6 blot,
  //            7 bar,8 square,9 routedot,0 pinprick
  // ============================================================
  // ---- geometry + stroke helpers — shared with every perception via
  //      the cloud engine (../_shared/cloud-engine.js). The treatment:
  //      many SMALL points tracing edges and surfaces, never fat fills;
  //      full-ink accents kept rare. Strokes are dense point-runs. ----
  const {R,gj,sdir,pRing,pDisc,pCone,pConeShell,pCol,pWall,pProfile,pProfileShell,
         pEll,stroke,strokeD,seg,segD,IFK}=window.CloudEngine;

  // SCULPT is consumed from ../_shared/odyssey-sculptures.js (see the top of this IIFE)




  /* ============================================================
     INK PALETTE
     A single ink, expressed at a few densities. No hue. The "value"
     of a dot is how dark it sits against the paper — full ink for the
     subject in focus, soft and ghost-gray for everything resting.
     ============================================================ */
  const {INK_FULL,INK_SOFT,INK_MID,GHOST,FAINT}=window.CloudEngine;

  // Per-aspect intrinsic ink value (some lenses read darker than others,
  // giving the resting "map" a quiet tonal variety like an old chart).
  // aspectInk is consumed from ../_shared/odyssey-sculptures.js (see the top of this IIFE)

  /* ============================================================
     CLOUD BUILDER
     We carry an extra per-point attribute: aMark (the dot-signature
     id), consumed by the fragment shader to stamp a shape into each
     point sprite instead of a soft glow.
     ============================================================ */
  function buildCloud(){
    const P=[],C=[],S=[],A=[],M=[]; const fil=[];
    function push(x,y,z,col,size,aspect,mark){
      P.push(x,y,z); C.push(col[0],col[1],col[2]); S.push(size);
      A.push(aspect); M.push(mark);
    }

    const half = EXT*0.62 + 1.6;

    // ---- the sea-plane: faint pinpricks of ink, like the dotted
    //      "open water" fill on an engraved chart ----
    const SEA_N = 2400;
    for(let i=0;i<SEA_N;i++){
      const r = Math.sqrt(Math.random())*half;
      const th = Math.random()*6.2831;
      const x = Math.cos(th)*r, z = Math.sin(th)*r;
      const y = (Math.random()-0.5)*0.12;
      const d = 1-Math.min(1,r/half);
      // darker toward the inhabited centre, fading to bare paper at the edge
      const v = 0.62 + 0.10*d;
      push(x,y,z,[v*0.92,v*0.9,v*0.84], 0.7+Math.random()*0.7, 8, 0); // mark 0 = pinprick
    }

    // ---- coastline hint: a denser stipple ringing the centre,
    //      like the hatched shoreline on an old map ----
    for(let i=0;i<620;i++){
      const r = half*(0.48+Math.random()*0.5);
      const th=Math.random()*6.2831;
      push(Math.cos(th)*r,(Math.random()-0.5)*0.1,Math.sin(th)*r,FAINT,0.7+Math.random()*0.6,8,0);
    }

    // On the ATLAS, sculptures are shrunk to ~half so the crowded
    // central geography reads as a clean chart of small marks; the full
    // sculpture is shown large on its own plate page.
    const MAP_SCALE = 0.5;
    KNOTS.forEach(k=>{
      const baseY = baseYOf(k);
      const col = aspectInk(k.aspect);
      let topY = 0.2;   // track each sculpture's crown so its caption can sit above it
      const emit = (dx,dy,dz,size,mark,colOverride)=>{
        if(dy>topY && Math.hypot(dx,dz)<0.55) topY=dy;
        push(k.x+dx*MAP_SCALE, baseY+dy*MAP_SCALE, k.z+dz*MAP_SCALE, colOverride||col, size*0.86, k.aspect, (mark==null?1:mark));
      };
      const fn = SCULPT[k.id];
      if(fn){ fn(k,emit); }
      else { for(let i=0;i<240;i++){ emit(gj(0.34),Math.abs(gj(0.34))*0.5,gj(0.34),1.1,1); } }
      k.capY = baseY + topY*MAP_SCALE + 0.16;   // world-space caption anchor
    });

    // ---- the descent shaft: a column of ink dots dropping to the dead ----
    {
      const nk = byId.nekuia;
      const steps = 190;
      for(let i=0;i<steps;i++){
        const f=i/steps; const y = UNDER_Y*f;
        const jit = 0.10*(1-0.4*f);
        // fades from soft ink at the surface to ghost in the depths
        const v = 0.22 + 0.36*f;
        push(nk.x+(Math.random()-0.5)*jit, y, nk.z+(Math.random()-0.5)*jit,
             [v,v*0.96,v*0.9], 1.0+Math.random()*0.6, 5, 5);
      }
    }

    // ---- THE ROUTE: a beaded wandering line of mid-ink dots ----
    function pt(id){ const k=byId[id]; return [k.x,baseYOf(k),k.z]; }
    const routePts = ROUTE.map(pt);
    function sample(p0,p1,p2,p3,t){
      const t2=t*t,t3=t2*t; const out=[0,0,0];
      for(let d=0;d<3;d++){
        out[d]=0.5*((2*p1[d])+(-p0[d]+p2[d])*t+(2*p0[d]-5*p1[d]+4*p2[d]-p3[d])*t2+(-p0[d]+3*p1[d]-3*p2[d]+p3[d])*t3);
      }
      return out;
    }
    const SEG = 86;
    for(let i=0;i<routePts.length-1;i++){
      const p0=routePts[Math.max(0,i-1)], p1=routePts[i], p2=routePts[i+1], p3=routePts[Math.min(routePts.length-1,i+2)];
      for(let s=0;s<SEG;s++){
        const t=s/SEG; const p=sample(p0,p1,p2,p3,t);
        const lift = Math.sin(t*Math.PI)*0.08;
        push(p[0]+(Math.random()-0.5)*0.04, p[1]+lift+(Math.random()-0.5)*0.03, p[2]+(Math.random()-0.5)*0.04,
             INK_MID, 1.15+Math.random()*0.5, 9, 9);   // mark 9 = route dot
        if(s%11===0){ fil.push(p[0],p[1]+lift,p[2]); }
      }
    }
    const filSeg=[];
    for(let i=0;i<fil.length-3;i+=3){ filSeg.push(fil[i],fil[i+1],fil[i+2], fil[i+3],fil[i+4],fil[i+5]); }

    // ---- embedded-tale threads: Scheria back to the narrated knots ----
    const told=['cyclops','aeolia','laistry','circe','nekuia','sirens','scylla','thrina','ogygia'];
    const sch=byId.scheria;
    told.forEach(id=>{
      const k=byId[id]; const y=(k.kind==='underworld')?NEKUIA_DEPTH:0;
      filSeg.push(sch.x,0.0,sch.z, k.x,y,k.z);
      const n=30;
      for(let s=0;s<n;s++){ const f=s/n;
        const x=sch.x+(k.x-sch.x)*f, yy=0.0+(y-0.0)*f + Math.sin(f*Math.PI)*0.5, z=sch.z+(k.z-sch.z)*f;
        push(x+(Math.random()-0.5)*0.07, yy, z+(Math.random()-0.5)*0.07, GHOST, 0.9+Math.random()*0.5, 5, 5);
      }
    });

    // ---- escaping wisps: kleos, the doors left open ----
    [['troy',1],['ithaca',-1]].forEach(([id,bend])=>{
      const a=byId[id]; const dir=Math.atan2(a.z,a.x);
      const out=[Math.cos(dir)*(half*1.05), 1.4, Math.sin(dir)*(half*1.05)];
      const px=-Math.sin(dir), pz=Math.cos(dir); const n=76;
      for(let s=0;s<n;s++){ const f=s/(n-1); const ease=f*f; const arc=Math.sin(f*Math.PI)*1.1*bend;
        const x=a.x+(out[0]-a.x)*ease+px*arc+(Math.random()-0.5)*0.08;
        const y=0+(out[1]-0)*ease+(Math.random()-0.5)*0.08;
        const z=a.z+(out[2]-a.z)*ease+pz*arc+(Math.random()-0.5)*0.08;
        const v=0.30+0.42*f; // fades toward paper as it leaves the map
        push(x,y,z,[v,v*0.97,v*0.92],(1.4-0.85*f)+Math.random()*0.25,7,7);
      }
    });

    return {
      positions:new Float32Array(P), colors:new Float32Array(C), sizes:new Float32Array(S),
      aspects:new Float32Array(A), marks:new Float32Array(M),
      filaments:new Float32Array(filSeg)
    };
  }

  /* ============================================================

  function init(){
    const THREE=window.THREE;
    const mount=document.getElementById('mount');
    const svg=document.getElementById('svg');
    const hint=document.getElementById('hint'), titlecard=document.getElementById('titlecard');
    const refresh=document.getElementById('refresh');
    // when embedded in the Asterlogos surface, the shell owns the chrome
    const EMBEDDED = (window.parent!==window);
    // ?embed=manifesto — the manifesto's live excerpt: the shell chrome stays away,
    // the notes are read-only, and the first orbit is reported to the parent (the gate).
    const EMBED_M = /(?:^|[?&])embed=manifesto(?:&|$)/.test(location.search);
    if(EMBED_M) document.body.classList.add('embedm');
    if(EMBEDDED){ titlecard.style.display='none'; }
    const registersEl=document.getElementById('registers');
    // the register guide serves the manifesto's beat-copy (gods above · sea · dead below)
    if((!EMBEDDED || EMBED_M) && registersEl) setTimeout(()=>registersEl.classList.add('show'),400);

    // e-ink refresh flash — a quick discrete invert, the panel "repainting"
    function inkRefresh(){
      refresh.style.transition='none'; refresh.style.opacity='0.9';
      // force reflow then fade
      void refresh.offsetWidth;
      refresh.style.transition='opacity .26s steps(3)';
      refresh.style.opacity='0';
    }

    const memStore={};
    let storeMode='memory';
    (function(){ try{ const k='__odyssey_probe'; localStorage.setItem(k,'1'); localStorage.removeItem(k); storeMode='local'; }catch(e){ storeMode='memory'; } })();
    function lsGet(k){ if(storeMode==='local'){ try{ return localStorage.getItem(k); }catch(e){} } return (k in memStore)?memStore[k]:null; }
    function lsSet(k,v){ if(storeMode==='local'){ try{ localStorage.setItem(k,v); return; }catch(e){} } memStore[k]=v; }
    function getNote(id){ return lsGet('odyssey_note_'+id)||''; }
    function setNote(id,v){ lsSet('odyssey_note_'+id, v); }
    function getLog(){ try{ return JSON.parse(lsGet('odyssey_log')||'[]'); }catch(e){ return []; } }
    function setLog(a){ lsSet('odyssey_log', JSON.stringify(a)); }
    function recordVisit(id){
      if(!getNote(id)) return;
      const log=getLog();
      if(log.indexOf(id)===-1){ log.push(id); setLog(log); }
    }

    let current=null;
    let keyHidden=false;

    // The plate (full-page single-sculpture view) is created once THREE is
    // ready; enterRoom hands it the knot. The atlas keeps `current` set so
    // its lens stays applied underneath (and so beforeunload saves the note).
    let plate=null;

    function enterRoom(k){
      current=k;
      keyHidden=true; if(keyEl) keyEl.style.opacity='0';
      hint.style.opacity='0';
      if(plate) plate.open(k);
      try{ if(window.parent!==window) window.parent.postMessage({type:'ast:plate',open:true,id:k.id},'*'); }catch(e){}
    }
    function leaveRoom(){
      if(current){ recordVisit(current.id); }
      current=null;
      if(plate) plate.close();
      keyHidden=false; if(keyEl && keyReady) keyEl.style.opacity='1';
      try{ if(window.parent!==window) window.parent.postMessage({type:'ast:plate',open:false},'*'); }catch(e){}
    }
    window.addEventListener('beforeunload', ()=>{ if(plate) plate.flush(); });

    const reduced = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
    renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
    renderer.setSize(mount.clientWidth,mount.clientHeight);
    renderer.setClearColor(0x000000,0);
    mount.appendChild(renderer.domElement);

    const scene=new THREE.Scene();
    const camera=new THREE.PerspectiveCamera(48, mount.clientWidth/mount.clientHeight, 0.1, 200);

    const nutate=new THREE.Group(); scene.add(nutate);

    geo.setAttribute('aAspect',new THREE.BufferAttribute(D.aspects,1));

    // each dot on its own small delay (the field's intro, made shared)

    let lastT=0;

    /* ============================================================

       ============================================================ */
    function createPlate(){
      const root=document.getElementById('plate');
      const pMount=document.getElementById('plateMount');
      const pTitle=document.getElementById('plateTitle'),
            pBack=document.getElementById('plateBack'), pHint=document.getElementById('plateHint'),
            pgEyebrow=document.getElementById('pgEyebrow'),
            pgLabel=document.getElementById('pgLabel'), pgCount=document.getElementById('pgCount'),

      // build one knot's sculpture at ORIGIN, full scale, return {points, height, radius}

      function frameTo(b){

      }

      /* -------- the stream: cover · points and your notes interleaved · end.

         (its order within the slot), so it sits IN the reading where it
         was written, and can be moved. -------- */
      let curK=null, slideIdx=0;
      let panelEdit=null;   // {id:noteId|null} — the in-panel editor; null id = a new note
      let plateMode=(function(){ try{ return localStorage.getItem('ast_plate_mode')||'slide'; }catch(e){ return 'slide'; } })();
      let plateFull=false;   // the note panel, full screen (the sculpture recedes)

      function iconAct(paths,on,label,fn){

        pgHeadActs.appendChild(iconAct(
          plateFull?'<path d="M5.5 2v3.5H2M8.5 12V8.5H12M2 8.5h3.5V12M12 5.5H8.5V2"/>'

          plateFull, plateFull?'Exit full screen':'Full screen', ()=>setPlateFull(!plateFull)));
      }
      function fmtD(ts){ try{ return new Date(ts).toLocaleDateString(undefined,{month:'short',day:'numeric'}); }catch(e){ return ''; } }
      function notifyShell(){ try{ if(window.parent!==window) window.parent.postMessage({type:'ast:notes'},'*'); }catch(e){} }
      // the two groups the topology column shows, scoped to this place:
      // your notes pinned here, and loose notes the suggester places here
      function placedHere(){ return loadObjs().filter(n=>n.node===curK.id).sort((a,b)=>b.ts-a.ts); }
      function looseHere(){ return loadObjs().filter(n=>!n.node && n.sug===curK.id).sort((a,b)=>b.ts-a.ts); }
      function mutate(fn){ const all=loadObjs(); fn(all); saveObjs(all); }

      function editable(){ return !document.body.classList.contains('embedm'); }
      function beginEdit(n){ if(!editable()) return; panelEdit={id:n.id}; renderPanel(); }
      function startNew(){ if(!curK||panelEdit||!editable()) return; panelEdit={id:null}; renderPanel(); }
      function cancelEdit(){ if(!panelEdit) return; panelEdit=null; renderPanel(); }
      /* ---- the canonical notes column — the exact pattern the book
             topology uses: a 'Notes · N' head with stack / one-at-a-time /
             full-screen / close, leaf cards grouped Loose · Placed, a note
             shown one-at-a-time in slide mode, and an in-panel editor.
             asterlogos.css owns every atom; this only assembles them. ---- */
      function showClose(v){ pgClose.style.display=v?'':'none'; }
      function actBtn(label,fn){ const b=document.createElement('button'); b.type='button'; b.className='act';
        b.textContent=label; b.addEventListener('click',e=>{ e.stopPropagation(); fn(); }); return b; }
      function group(label,count){ const h=document.createElement('div'); h.className='leafGroup';
        h.innerHTML='<span>'+label+'</span><span class="num">'+count+'</span>'; pgBody.appendChild(h); }
      function renderHead(total){
        pgEyebrow.classList.remove('editing');
        pgLabel.innerHTML='Notes · <span class="num">'+total+'</span>';
        pgCount.textContent=''; pgHeadActs.innerHTML=''; modeBtns(); showClose(true);
      }
      /* a property pill (the topology's card grammar): the pill shows the
         value; clicking opens its single-select menu — or fires its one act
         when given a function. Ghost = an unset property inviting a value. */
      const NOTE_TYPES=['thought','quote','essay','annotation'];
      function propPill(label,items,ghost){
        const wrap=document.createElement('span'); wrap.className='propWrap';
        const b=document.createElement('button'); b.type='button'; b.className='prop'+(ghost?' prop--ghost':'');
        b.textContent=label;
        wrap.appendChild(b);
        if(typeof items==='function'){
          b.addEventListener('click',e=>{ e.stopPropagation(); items(); });
          return wrap;
        }
        const m=document.createElement('div'); m.className='lmenu'; m.setAttribute('role','menu');
        items.forEach(([lb,fn])=>{
          const x=document.createElement('button'); x.type='button'; x.setAttribute('role','menuitem'); x.textContent=lb;
          x.addEventListener('click',e=>{ e.stopPropagation(); m.classList.remove('open'); fn(); });
          m.appendChild(x);
        });
        wrap.appendChild(m);
        b.setAttribute('aria-haspopup','menu');
        b.addEventListener('click',e=>{ e.stopPropagation();
          document.querySelectorAll('.lmenu.open').forEach(o=>{ if(o!==m) o.classList.remove('open'); });
          m.classList.toggle('open');
        });
        return wrap;
      }
      document.addEventListener('click',()=>document.querySelectorAll('.lmenu.open').forEach(m=>m.classList.remove('open')));
      function leafCard(n,loose){
        const d=document.createElement('div'); d.className='leaf leaf--slip is-note is-'+n.type;
        const when=document.createElement('span'); when.className='when'; when.textContent=fmtD(n.ts);
        const p=document.createElement('p'); p.className='ltxt'; p.textContent=n.text;
        const props=document.createElement('div'); props.className='lprops';
        props.appendChild(propPill(n.type,
          NOTE_TYPES.map(t=>[t,()=>{ mutate(all=>{ const x=all.find(y=>y.id===n.id); if(x) x.type=t; });
            syncDerived(); notifyShell(); renderPanel(); }])));
        if(loose) props.appendChild(propPill('pin here',()=>pinHere(n),true));
        else props.appendChild(propPill(curK.name,[['Unpin',()=>unpin(n)]]));
        d.appendChild(when); d.appendChild(p); d.appendChild(props);
        d.addEventListener('click',()=>{ beginEdit(n); });
        return d;
      }
      function renderPanelSlide(loose,placed){
        const list=loose.map(n=>({n,loose:true})).concat(placed.map(n=>({n,loose:false})));
        slideIdx=Math.max(0,Math.min(list.length-1,slideIdx));
        const cur=list[slideIdx], n=cur.n;
        pgWrap.classList.remove('stack'); pgBody.innerHTML='';
        const wrap=document.createElement('div'); wrap.className='lvWrap';
        const meta=document.createElement('div'); meta.className='lvMeta';
        meta.textContent=n.type+' · '+(cur.loose?'suggested here':curK.name)+' · '+fmtD(n.ts);
        wrap.appendChild(meta);
        const p=document.createElement('div'); p.className='lvTxt'+(n.type==='quote'?' is-quote':'');
        p.textContent=n.text; if(editable()) p.title='Edit this note';
        p.addEventListener('click',()=>{ beginEdit(n); });
        wrap.appendChild(p);
        if(n.src){ const s=document.createElement('div'); s.className='lvSrc'; s.textContent='— '+n.src; wrap.appendChild(s); }
        const acts=document.createElement('div'); acts.className='lvActs';
        acts.appendChild(actBtn('Edit',()=>{ panelEdit={id:n.id}; renderPanel(); }));
        if(cur.loose) acts.appendChild(actBtn('Pin here',()=>pinHere(n)));
        else acts.appendChild(actBtn('Unpin',()=>unpin(n)));
        acts.appendChild(actBtn('Discard',()=>discardNote(n)));
        wrap.appendChild(acts);
        pgBody.appendChild(wrap);
        pgNavEl.style.display='flex';
        pgPrev.disabled=slideIdx<=0; pgNext.disabled=slideIdx>=list.length-1;
        pgDash.innerHTML='';
        list.forEach((x,i)=>{ const dt=document.createElement('span'); dt.className='dnt'+(i===slideIdx?' on':''); pgDash.appendChild(dt); });
      }
      function renderPanelEdit(){
        const n=panelEdit.id?loadObjs().find(x=>x.id===panelEdit.id):null;
        if(panelEdit.id && !n){ panelEdit=null; renderPanel(); return; }
        // the head becomes the leaf's head: what it is on the left, acts on the right
        pgEyebrow.classList.add('editing');
        pgLabel.textContent = n ? (n.type+' · '+curK.name+' · '+fmtD(n.ts)) : 'A new note';
        pgCount.textContent=''; pgHeadActs.innerHTML=''; showClose(false);
        pgWrap.classList.remove('stack'); pgNavEl.style.display='none'; pgBody.innerHTML='';
        const wrap=document.createElement('div'); wrap.className='lvWrap';
        const ta=document.createElement('textarea'); ta.className='lvEdit';
        ta.value=n?n.text:''; ta.placeholder='Set something down…';
        const grow=()=>{ ta.style.height='auto'; ta.style.height=Math.max(120,ta.scrollHeight)+'px'; };
        const doSave=()=>{ const t=ta.value.trim(); if(!t){ panelEdit=null; renderPanel(); return; }
          if(n){ mutate(all=>{ const x=all.find(y=>y.id===n.id); if(x) x.text=t; }); }
          else { const id='n'+Date.now().toString(36)+Math.floor(Math.random()*1296).toString(36);
            mutate(all=>all.unshift({id,type:'thought',text:t,book:'odyssey',node:curK.id,ts:Date.now()})); }
          panelEdit=null; syncDerived(); notifyShell(); renderPanel(); };
        const cancel=()=>{ panelEdit=null; renderPanel(); };
        const sv=document.createElement('button'); sv.type='button'; sv.className='btn-ink';
        sv.textContent=n?'Update it':'Set it down'; sv.addEventListener('click',doSave);
        pgHeadActs.appendChild(sv); pgHeadActs.appendChild(actBtn('Cancel',cancel));
        if(n) pgHeadActs.appendChild(actBtn('Discard',()=>discardNote(n)));
        ta.addEventListener('input',grow);
        ta.addEventListener('keydown',e=>{ e.stopPropagation();
          if((e.metaKey||e.ctrlKey)&&e.key==='Enter'){ e.preventDefault(); doSave(); }
          else if(e.key==='Escape'){ e.preventDefault(); cancel(); } });
        wrap.appendChild(ta);
        const hint=document.createElement('div'); hint.className='sug'; hint.style.marginTop='12px';
        hint.textContent='⌘/Ctrl+Enter sets it down · Esc cancels';
        wrap.appendChild(hint);
        pgBody.appendChild(wrap);
        setTimeout(()=>{ grow(); ta.focus(); ta.selectionStart=ta.selectionEnd=ta.value.length; },60);
      }
      function renderPanel(){
        if(!curK) return;
        if(panelEdit){ renderPanelEdit(); return; }
        const loose=looseHere(), placed=placedHere();
        const total=loose.length+placed.length;
        renderHead(total);
        pgBody.innerHTML='';
        if(!total){ pgWrap.classList.remove('stack'); pgNavEl.style.display='none';
          const e=document.createElement('div'); e.className='leaves-empty'; e.textContent='No notes yet — write one.';
          pgBody.appendChild(e); return; }
        if(plateMode==='slide'){ renderPanelSlide(loose,placed); return; }
        pgWrap.classList.add('stack'); pgNavEl.style.display='none';
        /* no grouping headers — each card's pills carry its placement state */
        loose.forEach(n=>pgBody.appendChild(leafCard(n,true)));
        placed.forEach(n=>pgBody.appendChild(leafCard(n,false)));
        pgBody.scrollTop=0;
      }
      function step(d){
        if(!curK||panelEdit||plateMode!=='slide') return;
        const total=looseHere().length+placedHere().length;
        const nx=Math.max(0,Math.min(total-1,slideIdx+d));
        if(nx!==slideIdx){ slideIdx=nx; renderPanel(); }
      }
      function refresh(){ if(curK && root.classList.contains('open') && !panelEdit) renderPanel(); }
      function setText(k){
        pTitle.textContent=k.name;
        slideIdx=0; panelEdit=null; renderPanel();
        // locator cartouche — only for nodes that keep a real place on the map
        if(CARTOGRAPHIC && !k.offMap){ cart.style.display='block'; drawCartouche(cartCv,k); }
        else cart.style.display='none';
      }

      function open(k){
        curK=k; setText(k);
        if(pts){ grp.remove(pts); pts.geometry.dispose(); pts=null; }
        const b=buildSculpture(k);
        pts=new THREE.Points(b.geo,mat); grp.add(pts);
        frameTo(b);
        // the sculpture condenses radially out of loose ink as the plate opens
        pSettle = reduced ? null
          : window.CloudEngine.makeCoalescence(b.geo,{spread:Math.max(2.2,cam.frame*1.15),
              stagger:0.4,duration:1.15,center:[0,(b.minY+b.maxY)/2,0]});
        root.classList.add('open'); root.setAttribute('aria-hidden','false');
        onResize();
        pHint.style.opacity='.55';
        setTimeout(()=>{ pHint.style.opacity='0'; }, 3200);
      }
      function flush(){} // notes are set down explicitly now — objects, not a draft box
      function close(){
        flush();
        if(plateFull){ plateFull=false; root.classList.remove('pgfull'); }
        root.classList.remove('open'); root.setAttribute('aria-hidden','true');
      }

      pBack.addEventListener('click',()=>{ leaveRoom(); });
      pgClose.addEventListener('click',()=>{ if(panelEdit){ cancelEdit(); return; } leaveRoom(); });
      pgPrev.addEventListener('click',()=>step(-1));
      pgNext.addEventListener('click',()=>step(1));
      // writing: embedded, the shell owns the act (the write page, this
      // sculpture as its verso); standalone, a note page joins the stream
      plateNote.addEventListener('click',function(){
        if(EMBEDDED){ try{ window.parent.postMessage({type:'ast:write',node:curK?curK.id:null},'*'); }catch(e){} }
        else startNew();
      });

      // --- gestures on the plate canvas ---
      const dom=rnd.domElement;
      let gesture=null, lastX=0,lastY=0, pinchD0=0;
      function pDown(x,y){ gesture='orbit'; lastX=x; lastY=y; pHint.style.opacity='0'; }
      function pMove(x,y){ if(gesture!=='orbit')return; const dx=x-lastX,dy=y-lastY; lastX=x; lastY=y;
        cam.vAz+=-dx*0.006; cam.vEl+=dy*0.006; }
      function pUp(){ gesture=null; }
      dom.addEventListener('mousedown',e=>{ pDown(e.clientX,e.clientY); e.preventDefault(); });
      window.addEventListener('mousemove',e=>{ if(root.classList.contains('open')) pMove(e.clientX,e.clientY); });
      window.addEventListener('mouseup',()=>pUp());
      dom.addEventListener('wheel',e=>{ e.preventDefault(); cam.vDist+=e.deltaY*0.006; },{passive:false});
      dom.addEventListener('touchstart',e=>{
        if(e.touches.length===1){ pDown(e.touches[0].clientX,e.touches[0].clientY); }
        else if(e.touches.length===2){ gesture='pinch'; pinchD0=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY); }
      },{passive:true});
      dom.addEventListener('touchmove',e=>{
        if(e.touches.length===1 && gesture==='orbit'){ pMove(e.touches[0].clientX,e.touches[0].clientY); }
        else if(e.touches.length===2){ const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
          if(pinchD0>0){ cam.vDist+=(1-d/pinchD0)*2.0; pinchD0=d; } }
        e.preventDefault();
      },{passive:false});
      dom.addEventListener('touchend',e=>{ if(e.touches.length===0) pUp(); });

      function onResize(){
        const w=pMount.clientWidth||1, h=pMount.clientHeight||1;
        cm.aspect=w/h;
        // the spread: centre the figure in the left ~58% (the verso);
        // a positive view offset shifts the render left of true centre.
        // full screen: the faded figure sits centred behind the reading.
        if(!plateFull && w>680) cm.setViewOffset(w,h,w*0.21,0,w,h); else cm.clearViewOffset();
        cm.updateProjectionMatrix(); rnd.setSize(w,h);
      }
      window.addEventListener('resize',onResize);
      if(window.ResizeObserver){ new ResizeObserver(onResize).observe(pMount); }

      const _v=new THREE.Vector3();
      function tick(t){
        if(!root.classList.contains('open')) return;
        mat.uniforms.uTime.value=t; mat.uniforms.uSizeScale.value=Math.min(window.devicePixelRatio,2);
        const dtS=Math.min(0.05,t-pLastT); pLastT=t;
        if(pSettle && !pSettle.update(dtS)) pSettle=null;
        cam.az+=cam.vAz; cam.vAz*=0.88;
        cam.el+=cam.vEl; cam.vEl*=0.88;
        cam.dist+=cam.vDist; cam.vDist*=0.85;
        cam.el=Math.max(-0.35,Math.min(1.35,cam.el));
        cam.dist=Math.max(cam.frame*0.6,Math.min(cam.frame*4.5,cam.dist));
        if(!reduced && !gesture && Math.abs(cam.vAz)<0.0002){ cam.az+=0.0016; } // slow idle turn
        const ce=Math.cos(cam.el),se=Math.sin(cam.el),ca=Math.cos(cam.az),sa=Math.sin(cam.az);
        _v.set(ca*ce,se,sa*ce).multiplyScalar(cam.dist);
        cm.position.set(_v.x, cam.cy+_v.y, _v.z);
        cm.lookAt(0,cam.cy,0); cm.updateMatrixWorld();
        rnd.render(scn,cm);
      }
      return { open, close, flush, tick, step, refresh,
               isEditing:()=>!!panelEdit, cancelEdit };
    }
    plate = createPlate();

    // faint connective filaments — thin ink hairlines (multiply-like via low alpha)
    const filGeo=new THREE.BufferGeometry(); filGeo.setAttribute('position',new THREE.BufferAttribute(D.filaments,3));
    const filMat=new THREE.LineBasicMaterial({color:0x39352e,transparent:true,opacity:0.10,depthWrite:false,blending:THREE.NormalBlending});
    cloud.add(new THREE.LineSegments(filGeo,filMat));

    // the descent axis hairline
    const nk=byId.nekuia;
    const axisMat=new THREE.LineBasicMaterial({color:0x39352e,transparent:true,opacity:0.14,depthWrite:false,blending:THREE.NormalBlending});
    cloud.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(nk.x,0.1,nk.z),new THREE.Vector3(nk.x,UNDER_Y-0.3,nk.z)]),axisMat));

    // the marks key is gone: a legend the map can't honour at map-scale
    // teaches distrust — the concepts live in the readings instead
    let keyEl=null, keyReady=false;

    const clock=new THREE.Clock();

    /* ============================================================
       FREE-FLIGHT CAMERA — a spherical orbit controller.
       The camera orbits a movable TARGET point at DIST, by AZIMUTH
       (around Y) and ELEVATION (up/down). Gestures drive these with
       momentum and damping, so the whole map behaves like one solid
       3D object you can turn over, fly into, and pan across.
         · one finger / mouse drag .... orbit
         · two-finger pinch / wheel ... zoom (dolly)
         · two-finger drag / shift-drag / right-drag ... pan target
       A short tap still opens a knot (option B: tap never moves the
       camera — you keep full control).
       ============================================================ */
    const cam = {
      target:new THREE.Vector3(0,0.2,0),
      az: 0.32,            // azimuth (radians)
      el: 0.60,           // elevation: a 3/4 view, so the registers stack (gods high, dead low)
      dist: 16.5,
      // velocities for momentum
      vAz:0, vEl:0, vDist:0,
      vTarget:new THREE.Vector3()
    };
    const CAM_LIMITS = {
      elMin: 0.12,          // near-horizon (don't go under the sea)
      elMax: 1.52,          // near-straight-down
      distMin: 1.4,
      distMax: 30
    };
    // a gentle home pose (used by Escape / "to the sea")
    const HOME = { target:new THREE.Vector3(0,0.2,0), az:0.32, el:0.60, dist:16.5 };
    function goHome(){
      // set velocities toward home over the next frames via a soft tween flag
      homeTween = 1.0;
    }
    let homeTween = 0;

    // knot anchors (static world positions — the cloud no longer rotates)
    const capsWrap=document.getElementById('caps');
    const islandMeta = KNOTS.map(k=>{
      const cap=document.createElement('div'); cap.className='cap'; cap.textContent=k.name;
      capsWrap.appendChild(cap);
      return { k,
        world:new THREE.Vector3(k.x,baseYOf(k),k.z),
        capWorld:new THREE.Vector3(k.x,k.capY,k.z),
        cap, sx:0, sy:0, onScreen:false };
    });

    while(svg.firstChild) svg.removeChild(svg.firstChild);
    const SVGNS='http://www.w3.org/2000/svg';
    const threadPath=document.createElementNS(SVGNS,'path');
    threadPath.setAttribute('fill','none');
    threadPath.setAttribute('stroke','rgba(27,25,22,0.55)');
    threadPath.setAttribute('stroke-width','1');
    threadPath.setAttribute('stroke-dasharray','1 4');
    threadPath.setAttribute('stroke-linecap','round');
    svg.appendChild(threadPath);
    const ringLayer=document.createElementNS(SVGNS,'g');
    svg.appendChild(ringLayer);
    svg.style.opacity='1';

    function drawLogbook(){
      const log=getLog();
      const pts=[];
      log.forEach(id=>{ const m=islandMeta.find(o=>o.k.id===id); if(m && m.onScreen) pts.push(m); });
      if(pts.length>=2){
        let d='M '+pts[0].sx.toFixed(1)+' '+pts[0].sy.toFixed(1);
        for(let i=1;i<pts.length;i++) d+=' L '+pts[i].sx.toFixed(1)+' '+pts[i].sy.toFixed(1);
        threadPath.setAttribute('d',d);
      } else { threadPath.setAttribute('d',''); }
      while(ringLayer.firstChild) ringLayer.removeChild(ringLayer.firstChild);
      log.forEach(id=>{
        const m=islandMeta.find(o=>o.k.id===id); if(!m||!m.onScreen) return;
        // a hand-drawn-looking ink ring marking "you were here"
        const c=document.createElementNS(SVGNS,'circle');
        c.setAttribute('cx',m.sx.toFixed(1)); c.setAttribute('cy',m.sy.toFixed(1));
        c.setAttribute('r','10'); c.setAttribute('fill','none');
        c.setAttribute('stroke','rgba(27,25,22,0.6)'); c.setAttribute('stroke-width','1.1');
        ringLayer.appendChild(c);
      });
    }

    const dom=renderer.domElement; dom.style.touchAction='none';

    function pickAt(px,py){
      let best=null,bestD=30;
      islandMeta.forEach(m=>{ if(!m.onScreen) return; const dx=m.sx-px,dy=m.sy-py; const d=Math.hypot(dx,dy); if(d<bestD){ bestD=d; best=m; } });
      return best;
    }

    // ---- gesture state ----
    let gesture=null;            // 'orbit' | 'pan' | null
    let downX=0,downY=0,downT=0, lastX=0,lastY=0, moved=0;
    let orbAcc=0, orbSent=false; // embedded: the first real orbit is reported once (the manifesto's gate)
    // in the manifesto embed the PAGE owns the wheel until the gate opens —
    // a reader scrolling straight through must never be trapped by the zoom
    let wheelOwn = !EMBED_M;
    let pinchD0=0, pinchMidX=0, pinchMidY=0;
    let panMode=false;           // shift / right-button pan on desktop

    function clampEl(){ cam.el=Math.max(CAM_LIMITS.elMin,Math.min(CAM_LIMITS.elMax,cam.el)); }
    function clampDist(){ cam.dist=Math.max(CAM_LIMITS.distMin,Math.min(CAM_LIMITS.distMax,cam.dist)); }

    // pan moves the target across the camera's right/forward plane,
    // scaled by distance so it feels 1:1 with the dragged content
    const _right=new THREE.Vector3(), _fwd=new THREE.Vector3(), _up=new THREE.Vector3(0,1,0), _tmp=new THREE.Vector3();
    function panTarget(dxPx,dyPx){
      // camera basis
      _fwd.copy(cam.target).sub(camera.position); _fwd.y=0; _fwd.normalize();
      _right.crossVectors(_fwd,_up).normalize();
      const k = cam.dist * 0.0016;
      cam.target.addScaledVector(_right, -dxPx*k);
      cam.target.addScaledVector(_fwd,   dyPx*k);
      // clamp target to a sane region above the sea
      cam.target.x=Math.max(-14,Math.min(14,cam.target.x));
      cam.target.z=Math.max(-14,Math.min(14,cam.target.z));
    }

    // ---- pointer (mouse) ----
    function pDown(x,y,opts){
      downX=x; downY=y; lastX=x; lastY=y; downT=performance.now(); moved=0;
      gesture = (opts&&opts.pan)?'pan':'orbit';
      homeTween=0; // any interaction cancels the home tween
      titlecard.style.opacity='0'; hint.style.opacity='0';
    }
    function pMove(x,y){
      if(!gesture) return;
      const dx=x-lastX, dy=y-lastY; lastX=x; lastY=y;
      moved += Math.abs(dx)+Math.abs(dy);
      if(gesture==='orbit'){
        cam.vAz += -dx*0.005;
        cam.vEl +=  dy*0.005;
        orbAcc += Math.abs(dx)+Math.abs(dy);
        if(EMBEDDED && !orbSent && orbAcc>60){ orbSent=true; wheelOwn=true;
          try{ window.parent.postMessage({type:'ast:orbited'},'*'); }catch(e){} }
      } else if(gesture==='pan'){
        panTarget(dx,dy);
      }
    }
    function pUp(x,y){
      const dt=performance.now()-downT;
      const wasTap = dt<450 && moved<8;
      gesture=null;
      if(wasTap){
        const hit=pickAt(x,y);
        if(hit){ if(!(current && current.id===hit.k.id)){ enterRoom(hit.k); } }
        else if(current){ leaveRoom(); }      // tap empty sea = close panel (camera stays — option B)
      }
    }

    dom.addEventListener('mousedown',e=>{
      const pan = e.button===2 || e.shiftKey;
      pDown(e.clientX,e.clientY,{pan});
      e.preventDefault();
    });
    window.addEventListener('mousemove',e=>pMove(e.clientX,e.clientY));
    window.addEventListener('mouseup',e=>pUp(e.clientX,e.clientY));
    dom.addEventListener('contextmenu',e=>e.preventDefault()); // allow right-drag pan
    dom.addEventListener('wheel',e=>{
      if(!wheelOwn) return;          // pre-gate: the wheel chains to the manifesto's scroll
      e.preventDefault();
      homeTween=0;
      titlecard.style.opacity='0'; hint.style.opacity='0';
      cam.vDist += e.deltaY*0.012;   // wheel zoom (momentum)
    },{passive:false});

    // hover cursor affordance
    dom.addEventListener('mousemove',e=>{ if(gesture) return; dom.style.cursor = pickAt(e.clientX,e.clientY)?'pointer':(panMode?'grab':'default'); });
    window.addEventListener('keydown',e=>{
      if(e.target && (e.target.tagName==='TEXTAREA'||e.target.tagName==='INPUT')) return;
      if(e.key==='Shift') panMode=true;
      if(e.key==='Escape'){
        if(current && plate && plate.isEditing()){ plate.cancelEdit(); return; }
        if(current) leaveRoom(); goHome();
      }
      if(current && plate){
        if(e.key==='ArrowRight'){ e.preventDefault(); plate.step(1); }
        else if(e.key==='ArrowLeft'){ e.preventDefault(); plate.step(-1); }
      }
    });
    window.addEventListener('keyup',e=>{ if(e.key==='Shift') panMode=false; });

    // ---- touch ----
    function midpoint(t0,t1){ return [(t0.clientX+t1.clientX)/2,(t0.clientY+t1.clientY)/2]; }
    function dist2(t0,t1){ return Math.hypot(t0.clientX-t1.clientX,t0.clientY-t1.clientY); }

    dom.addEventListener('touchstart',e=>{
      if(e.touches.length===1){
        pDown(e.touches[0].clientX,e.touches[0].clientY);
      } else if(e.touches.length===2){
        gesture='pinch';
        pinchD0=dist2(e.touches[0],e.touches[1]);
        const m=midpoint(e.touches[0],e.touches[1]); pinchMidX=m[0]; pinchMidY=m[1];
        homeTween=0; moved=99; // a two-finger gesture is never a tap
        titlecard.style.opacity='0'; hint.style.opacity='0';
      }
    },{passive:true});

    dom.addEventListener('touchmove',e=>{
      if(e.touches.length===1 && gesture!=='pinch'){
        pMove(e.touches[0].clientX,e.touches[0].clientY);
      } else if(e.touches.length===2){
        const d=dist2(e.touches[0],e.touches[1]);
        const m=midpoint(e.touches[0],e.touches[1]);
        // pinch -> zoom
        if(pinchD0>0){ const ratio=d/pinchD0; cam.vDist += (1-ratio)*4.2; pinchD0=d; }
        // two-finger drag -> pan
        const dmx=m[0]-pinchMidX, dmy=m[1]-pinchMidY; pinchMidX=m[0]; pinchMidY=m[1];
        panTarget(dmx,dmy);
      }
      e.preventDefault();
    },{passive:false});

    dom.addEventListener('touchend',e=>{
      if(e.touches.length===0){
        if(gesture!=='pinch'){
          const tch=(e.changedTouches&&e.changedTouches[0])||{clientX:lastX,clientY:lastY};
          pUp(tch.clientX,tch.clientY);
        } else { gesture=null; }
      } else if(e.touches.length===1){
        // lifted one finger of a pinch -> resume single-finger orbit cleanly
        gesture='orbit'; lastX=e.touches[0].clientX; lastY=e.touches[0].clientY; moved=99;
      }
    });

    // when the shell opens its leaves column, the atlas recedes left —
    // the same spread the plate uses (figure verso, text recto)
    let SHIFTED=false;
    function onResize(){ const w=mount.clientWidth||1,h=mount.clientHeight||1; camera.aspect=w/h;
      if(SHIFTED && w>680) camera.setViewOffset(w,h,w*0.21,0,w,h); else camera.clearViewOffset();
      camera.updateProjectionMatrix(); renderer.setSize(w,h); }
    window.addEventListener('resize',onResize); onResize();
    if(window.ResizeObserver){ new ResizeObserver(onResize).observe(mount); }

    const _v=new THREE.Vector3();
    function animate(){
      requestAnimationFrame(animate);
      const t=clock.getElapsedTime();
      ptMat.uniforms.uTime.value=t;
      ptMat.uniforms.uSizeScale.value=Math.min(window.devicePixelRatio,2);

      // the settle: dust easing into the chart, then it stops touching the buffer
      const dtS=Math.min(0.05,t-lastT); lastT=t;
      if(settle && !settle.update(dtS)) settle=null;

      // --- integrate camera velocities with damping ---
      cam.az  += cam.vAz;   cam.vAz  *= 0.86;
      cam.el  += cam.vEl;   cam.vEl  *= 0.86;
      cam.dist+= cam.vDist; cam.vDist*= 0.84;
      clampEl(); clampDist();

      // soft auto-return to home when requested (Escape / back-to-sea)
      if(homeTween>0){
        const s=0.06;
        cam.target.lerp(HOME.target, s);
        cam.az += (HOME.az-cam.az)*s;
        cam.el += (HOME.el-cam.el)*s;
        cam.dist += (HOME.dist-cam.dist)*s;
        homeTween-=0.016; if(homeTween<0) homeTween=0;
      }

      // a near-imperceptible idle drift only when fully at rest & untouched
      if(!reduced && !gesture && homeTween===0 &&
         Math.abs(cam.vAz)<0.0002 && Math.abs(cam.vEl)<0.0002 && Math.abs(cam.vDist)<0.0002 && !current){
        cam.az += 0.0004;
      }

      // --- place camera from spherical coords around target ---
      const ce=Math.cos(cam.el), se=Math.sin(cam.el);
      const ca=Math.cos(cam.az), sa=Math.sin(cam.az);
      // el measured from horizon: y = dist*sin(el); ground radius = dist*cos(el)
      _v.set(ca*ce, se, sa*ce).multiplyScalar(cam.dist);
      camera.position.copy(cam.target).add(_v);
      camera.lookAt(cam.target); camera.updateMatrixWorld();

      // --- lens emphasis when a knot's panel is open ---
      const wantLens = current ? current.aspect : -1;
      const ls = ptMat.uniforms.uLensStrength;
      ptMat.uniforms.uLens.value = wantLens;
      ls.value += ((current?0.9:0) - ls.value)*0.08;
      filMat.opacity = 0.10 + (current && current.aspect===5 ? 0.22:0.0)*ls.value;
      axisMat.opacity = 0.14 + (current && current.kind==='underworld' ? 0.4:0)*ls.value;

      // --- project knot anchors to screen (cloud is static at origin) ---
      const W=mount.clientWidth, Hh=mount.clientHeight;
      const capFade = Math.max(0, Math.min(1, (26-cam.dist)/14));   // captions retire as you pull far out
      islandMeta.forEach(m=>{
        _v.copy(m.world).project(camera);
        m.onScreen = _v.z<1;
        m.sx=(_v.x*0.5+0.5)*W; m.sy=(-_v.y*0.5+0.5)*Hh;
        // caption above the sculpture's crown, dimming when its knot is off the lens
        _v.copy(m.capWorld).project(camera);
        const on = _v.z<1;
        if(on){
          m.cap.style.transform='translate(-50%,-100%) translate('+((_v.x*0.5+0.5)*W).toFixed(1)+'px,'+((-_v.y*0.5+0.5)*Hh).toFixed(1)+'px)';
          const dimmed = current && current.id!==m.k.id;
          m.cap.style.opacity = (0.4+0.45*capFade) * (dimmed?0.35:1);
        } else m.cap.style.opacity='0';
      });
      drawLogbook();

      renderer.render(scene,camera);
      if(plate) plate.tick(t);
    }
    animate();

    // deep link: #plate=<knotId> opens straight onto that plate
    (function(){
      const m=(location.hash||'').match(/plate=([a-z]+)/);
      if(m && byId[m[1]]) setTimeout(()=>enterRoom(byId[m[1]]),80);
    })();

    // ---- Asterlogos surface bridge (when embedded as a folio) ----
    window.addEventListener('message', function(ev){
      var d=ev.data||{}; if(!d.type) return;
      if(d.type==='ast:posQuery'){
        var m=islandMeta.find(function(o){ return o.k.id===d.id; });
        if(m) window.parent.postMessage({type:'ast:pos',id:d.id,sx:m.sx,sy:m.sy,ok:m.onScreen},'*');
      } else if(d.type==='ast:sown'){
        drawLogbook(); var k=byId[d.id]; if(k) enterRoom(k);
      } else if(d.type==='ast:focus'){
        var k2=byId[d.id]; if(k2) enterRoom(k2);
      } else if(d.type==='ast:home'){
        if(current) leaveRoom(); goHome();
      } else if(d.type==='ast:notes'){
        if(plate) plate.refresh(); drawLogbook();
      } else if(d.type==='ast:shift'){
        SHIFTED=!!d.on; onResize();
      } else if(d.type==='ast:writing'){
        document.getElementById('plate').classList.toggle('writing',!!d.on);
      } else if(d.type==='ast:unlock'){
        wheelOwn=true;               // the manifesto's gate has opened (orbit or keyboard)
      }
    });
    window.addEventListener('storage', function(ev){
      if(!ev.key) return;
      if(ev.key==='odyssey_log' || ev.key.indexOf('odyssey_note_')===0){ drawLogbook(); }
    });
  }

  var _waited=0;
  function boot(){
    if(!window.THREE){
      _waited+=60;
      if(_waited>8000) return;
      setTimeout(boot,60); return;
    }
    init();
  }
  boot();
})();
</script>
</body></html>
