<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Field — the library seen through its ideas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;1,6..72,300;1,6..72,400&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<script>
// the design system sits beside the prototypes; resolve it from the
// /prototypes/ segment so clean-URL servers (no trailing slash) still find it
(function(){
  var p=location.pathname, i=p.indexOf('/prototypes/');
  var base=(i>=0)?p.slice(0,i+12):'../';
  document.write('<link rel="stylesheet" href="'+base+'_shared/asterlogos.css">');
})();
</script>
<style>
  html,body{margin:0;padding:0;background:var(--paper);height:100%;overflow:hidden;}
  *{box-sizing:border-box;}
  #stage{position:fixed;inset:0;background:var(--paper);overflow:hidden;font-family:'Newsreader',Georgia,serif;}
  #mount{position:absolute;inset:0;}
  #stage::before{content:"";position:absolute;inset:0;z-index:1;pointer-events:none;opacity:0.5;
    background-image:radial-gradient(var(--rule) 0.5px,transparent 0.5px);background-size:3px 3px;mix-blend-mode:multiply;}
  #stage::after{content:"";position:absolute;inset:0;z-index:2;pointer-events:none;
    box-shadow:inset 0 0 120px rgba(70,64,54,0.16);}

  /* captions — italic chart-names above wells and books */
  #caps{position:absolute;inset:0;z-index:6;pointer-events:none;overflow:hidden;}
  .cap{position:absolute;transform:translate(-50%,-100%);white-space:nowrap;
    font:var(--text-caption);font-style:italic;letter-spacing:.04em;color:rgba(57,53,46,0.9);
    text-shadow:0 0 5px var(--paper),0 0 3px var(--paper),0 0 2px var(--paper);
    transition:opacity .3s ease;}
  .cap.well{font:var(--text-title);font-style:italic;font-size:15px;color:rgba(27,25,22,0.9);}
  .cap.dead{color:rgba(154,149,138,0.85);}

  /* the key — how to read this perception */
  #keying{position:absolute;left:24px;bottom:24px;z-index:7;pointer-events:none;opacity:0;transition:opacity .6s;
    background:var(--paper);border:1px solid var(--rule);border-radius:2px;padding:13px 15px 12px;
    display:grid;grid-template-columns:auto;gap:7px;align-content:end;box-shadow:4px 5px 0 rgba(27,25,22,0.1);}
  #keying .khead{font:var(--text-meta);letter-spacing:.3em;color:var(--ink-mid);text-transform:uppercase;margin-bottom:3px;}
  #keying .k{display:flex;align-items:center;gap:9px;}
  #keying .sw{width:16px;text-align:center;font:500 12px var(--mono);color:var(--ink);flex:0 0 auto;}
  #keying .lb{font:var(--text-meta);letter-spacing:.08em;color:var(--ink-soft);text-transform:uppercase;white-space:nowrap;}

  #hint{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);z-index:7;pointer-events:none;
    font:var(--text-label);letter-spacing:.3em;color:var(--ink-soft);text-transform:uppercase;transition:opacity .8s;}

  /* the idea panel — a well, opened */
  #ideaPanel{position:absolute;right:26px;bottom:26px;z-index:8;width:340px;max-width:84vw;
    background:var(--paper);border:1px solid var(--ink);border-radius:3px;padding:20px 22px 16px;
    box-shadow:5px 6px 0 rgba(27,25,22,0.12);max-height:70vh;overflow-y:auto;
    opacity:0;visibility:hidden;transition:opacity .3s ease;}
  #ideaPanel.open{opacity:1;visibility:visible;}
  #ideaClose{position:absolute;top:10px;right:12px;cursor:pointer;background:none;border:0;color:var(--ghost);
    width:28px;height:28px;font:400 15px 'JetBrains Mono',monospace;}
  #ideaClose:hover{color:var(--ink);}
  #ideaName{font:var(--text-title);font-style:italic;color:var(--ink);margin-bottom:3px;}
  #ideaMeta{font:var(--text-meta);letter-spacing:.18em;color:var(--ink-mid);text-transform:uppercase;
    padding-bottom:12px;border-bottom:1px solid var(--rule);margin-bottom:12px;}
  .ideaNote{padding:10px 2px 11px;border-bottom:1px solid var(--rule);cursor:pointer;transition:padding-left .2s ease;}
  .ideaNote:hover{padding-left:9px;}
  .ideaNote .t{font:var(--text-caption);color:var(--ink);
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .ideaNote.q .t{font-style:italic;}
  .ideaNote .s{font:var(--text-meta);letter-spacing:.14em;color:var(--ink-mid);text-transform:uppercase;margin-top:5px;}
  #ideaRes{margin-top:12px;padding:10px 12px;border:1px dashed var(--rule);border-radius:2px;
    font:var(--text-caption);font-style:italic;color:var(--ink-mid);}
  #ideaRes.live{border-color:var(--ink-soft);color:var(--ink-soft);}

  #err{position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#e7e4db;color:#7a2318;padding:10px 14px;border-radius:2px;border:1px solid #7a2318;z-index:99999;white-space:pre-wrap;display:none;}
</style>
</head>
<body>
<div id="stage">
  <div id="mount"></div>
  <div id="caps"></div>
  <div id="keying"></div>
  <div id="hint">Drag to orbit · pinch to zoom · tap a well or a book</div>
</div>

<div id="ideaPanel">
  <button id="ideaClose" aria-label="Close">✕</button>
  <div id="ideaName"></div>
  <div id="ideaMeta"></div>
  <div id="ideaList"></div>
  <div id="ideaRes"></div>
</div>

<div id="err"></div>

<script>
window.addEventListener('error', function(e){
  var d=document.getElementById('err'); d.style.display='block';
  d.textContent=(d.textContent?d.textContent+'\n':'')+'['+(e.message||e.type)+']';
});
(function(){
  var srcs=[
    'https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js',
    'https://unpkg.com/three@0.128.0/build/three.min.js'
  ];
  function load(i){
    if(i>=srcs.length){ var d=document.getElementById('err'); d.style.display='block';
      d.textContent='Could not load the 3D library (THREE).'; return; }
    var s=document.createElement('script'); s.src=srcs[i];
    s.onload=function(){ if(!window.THREE){ load(i+1); } };
    s.onerror=function(){ load(i+1); };
    document.head.appendChild(s);
  }
  load(0);
})();
</script>
<script>
// the shared cloud engine sits beside the prototypes; resolve it from the
// /prototypes/ segment so clean-URL servers (no trailing slash) still find it
(function(){
  var p=location.pathname, i=p.indexOf('/prototypes/');
  var base=(i>=0)?p.slice(0,i+12):'../';
  document.write('<script src="'+base+'_shared/cloud-engine.js"><\/script>');
})();
</script>

<script>
(function(){
  'use strict';

  /* ============================================================
     THE FIELD — the library seen through its ideas.
     Concepts are gravity wells on a ring. Books are bodies that
     drift toward the ideas YOUR notes engage — an unwritten book
     waits on the outer ring; the field is a portrait of your
     reading, not of the canon. Notes are satellites: placed ones
     orbit their book, loose ones drift near their suggested idea.
     ============================================================ */

  const CONCEPTS=[
    {id:'nostos',n:'Nostos'},{id:'metis',n:'Metis'},{id:'xenia',n:'Xenia'},{id:'oblivion',n:'Oblivion'},
    {id:'recognition',n:'Recognition'},{id:'kleos',n:'Kleos'},{id:'hybris',n:'Hybris'},{id:'margin',n:'The Margin'}
  ];
  const BOOKS=[
    {id:'odyssey',title:'The Odyssey',live:true,form:'plane'},
    {id:'mill',title:'Hamlet’s Mill',live:false,form:'wheel'},
    {id:'liturgies',title:'Liturgies of the Wild',live:false,form:'rosary'},
    {id:'wrangel',title:'Always with Honour',live:false,form:'front'},
  ];
  // knot → concepts (the Odyssey's vocabulary; other books add theirs when built)
  const KCON={troy:['kleos'],ismarus:['xenia','hybris'],malea:['nostos'],lotus:['oblivion','nostos'],
    cyclops:['metis','xenia','hybris','margin'],aeolia:['nostos','xenia'],laistry:['margin','xenia'],
    circe:['oblivion','metis'],nekuia:['nostos','recognition'],sirens:['kleos','oblivion'],
    scylla:['margin'],thrina:['hybris','xenia'],ogygia:['oblivion','nostos'],
    scheria:['xenia','recognition'],ithaca:['nostos','recognition']};
  const KNAME={troy:'Troy',ismarus:'Ismarus',malea:'Cape Malea',lotus:'The Lotus-Eaters',cyclops:'The Cyclops',
    aeolia:'Aeolia',laistry:'The Laestrygonians',circe:'Circe',nekuia:'The House of the Dead',sirens:'The Sirens',
    scylla:'Scylla & Charybdis',thrina:'Thrinacia',ogygia:'Ogygia',scheria:'Scheria',ithaca:'Ithaca'};
  function bookTitle(id){ const b=BOOKS.find(b=>b.id===id); return b?b.title:'?'; }

  function loadNotes(){ try{ return JSON.parse(localStorage.getItem('ast_notes_v2')||'[]'); }catch(e){ return []; } }

  /* ---------- layout: wells → books → satellites ---------- */
  const WELL_R=5.2, OUTER_R=7.4;
  function computeLayout(){
    const notes=loadNotes();
    const wells={};
    CONCEPTS.forEach((c,i)=>{ const a=-Math.PI/2 + i/CONCEPTS.length*2*Math.PI;
      wells[c.id]={x:Math.cos(a)*WELL_R, z:Math.sin(a)*WELL_R, n:c.n, id:c.id}; });
    // per-book concept weights from YOUR notes
    const bookPos={};
    BOOKS.forEach((b,bi)=>{
      const w={}; let tot=0;
      notes.filter(n=>n.book===b.id).forEach(n=>{
        const kid=n.node||n.sug; const cs=kid?(KCON[kid]||[]):[];
        cs.forEach(c=>{ w[c]=(w[c]||0)+1; tot++; });
      });
      if(tot>0){
        let sx=0,sz=0; Object.keys(w).forEach(c=>{ sx+=wells[c].x*w[c]; sz+=wells[c].z*w[c]; });
        // pulled toward its ideas, kept off the exact centre
        const px=sx/tot*0.55, pz=sz/tot*0.55;
        const jitterA=bi*2.1;
        bookPos[b.id]={x:px+Math.cos(jitterA)*0.35, z:pz+Math.sin(jitterA)*0.35, y:0, written:true, weights:w};
      } else {
        const a=-Math.PI/2 + (bi+0.5)/BOOKS.length*2*Math.PI + 0.35;   // the unwritten ring
        bookPos[b.id]={x:Math.cos(a)*OUTER_R, z:Math.sin(a)*OUTER_R, y:0, written:false, weights:{}};
      }
    });
    // satellites
    const sats=[];
    notes.forEach(n=>{
      if(n.book && bookPos[n.book]){
        const bp=bookPos[n.book];
        const kid=n.node||n.sug; const cs=kid?(KCON[kid]||[]):[];
        let dx=0,dz=0;
        if(cs.length){ cs.forEach(c=>{ dx+=wells[c].x-bp.x; dz+=wells[c].z-bp.z; });
          const L=Math.hypot(dx,dz)||1; dx/=L; dz/=L; }
        else { const a=Math.random()*6.283; dx=Math.cos(a); dz=Math.sin(a); }
        const h=(hash(n.id)%100)/100;
        const rad=0.55+h*0.35;
        const perp=((hash(n.id)>>4)%100)/100-0.5;
        sats.push({n, x:bp.x+dx*rad+(-dz)*perp*0.5, y:0.16+h*0.22, z:bp.z+dz*rad+dx*perp*0.5, loose:false});
      } else {
        const kid=n.sug; const cs=kid?(KCON[kid]||[]):[];
        let px=0,pz=0;
        if(cs.length){ cs.forEach(c=>{ px+=wells[c].x; pz+=wells[c].z; }); px/=cs.length; pz/=cs.length;
          px*=0.78; pz*=0.78; }
        else { const h=hash(n.id); px=((h%100)/100-0.5)*3; pz=(((h>>5)%100)/100-0.5)*3; }
        const h2=hash(n.id+'x');
        sats.push({n, x:px+((h2%100)/100-0.5)*0.8, y:0.3+((h2>>3)%100)/1000*2, z:pz+(((h2>>6)%100)/100-0.5)*0.8, loose:true});
      }
    });
    return {wells, bookPos, sats, notes};
  }
  function hash(s){ let h=0; for(let i=0;i<s.length;i++) h=(h*31+s.charCodeAt(i))>>>0; return h; }

  /* ---------- ink + chance — shared via the cloud engine ---------- */
  const {INK_FULL,INK_SOFT,INK_MID,GHOST,FAINT,R,gj}=window.CloudEngine;

  /* ---------- cloud builder ---------- */
  // marks: 0 pinprick · 1 disc · 3 dblring · 5 ring · 7 bar
  function buildCloud(L){
    const P=[],C=[],S=[],M=[];
    function push(x,y,z,col,size,mark){ P.push(x,y,z); C.push(col[0],col[1],col[2]); S.push(size); M.push(mark); }

    // dust plane
    for(let i=0;i<1600;i++){ const r=Math.sqrt(R())*(OUTER_R+1.6), t=R()*6.2831;
      const v=0.64+0.08*(1-r/(OUTER_R+1.6));
      push(Math.cos(t)*r,(R()-0.5)*0.1,Math.sin(t)*r,[v*0.92,v*0.9,v*0.84],0.7+R()*0.6,0); }

    // wells: concentric stipple rings sinking to a dense eye
    Object.values(L.wells).forEach(w=>{
      for(let ring=0;ring<4;ring++){ const rr=0.28+ring*0.24, n=26+ring*10, dip=-0.16*(1-ring/4);
        for(let i=0;i<n;i++){ const t=R()*6.2831;
          push(w.x+Math.cos(t)*(rr+gj(0.02)), dip+gj(0.015), w.z+Math.sin(t)*(rr+gj(0.02)),
               ring<2?INK_SOFT:GHOST, 1.6-ring*0.16, 5); } }
      push(w.x,-0.2,w.z,INK_FULL,3.4,1);   // the eye of the well
    });

    // book bodies
    BOOKS.forEach(b=>{
      const p=L.bookPos[b.id]; const ink=p.written?INK_FULL:GHOST;
      if(b.form==='plane'){         // the Odyssey: a small sea-plane with a route bead
        for(let i=0;i<110;i++){ const r=Math.sqrt(R())*0.42, t=R()*6.2831;
          push(p.x+Math.cos(t)*r, p.y+gj(0.02), p.z+Math.sin(t)*r, p.written?INK_SOFT:GHOST, 1.7, 0); }
        for(let i=0;i<26;i++){ const f=i/26; const t=f*4.4;
          push(p.x+Math.cos(t)*0.3*(1-f*0.4), p.y+0.03, p.z+Math.sin(t)*0.3*(1-f*0.4), ink, 1.6, 1); }
      } else if(b.form==='wheel'){  // the Mill: a wheel on an axis
        for(let i=0;i<52;i++){ const t=R()*6.2831;
          push(p.x+Math.cos(t)*0.36, p.y+0.3+Math.sin(t)*0.36, p.z+gj(0.02), ink, 1.7, 5); }
        for(let i=0;i<14;i++){ push(p.x+gj(0.012), p.y+i/14*0.72, p.z+gj(0.012), ink, 1.7, 7); }
      } else if(b.form==='rosary'){ // Liturgies: a ring of beads
        for(let bd=0;bd<13;bd++){ const a=bd/13*6.2831;
          for(let i=0;i<5;i++){ push(p.x+Math.cos(a)*0.34+gj(0.02), p.y+0.16+gj(0.02), p.z+Math.sin(a)*0.34+gj(0.02), ink, 1.9, 1); } }
      } else {                      // Wrangel: three receding fronts
        for(let arc=0;arc<3;arc++){ const rr=0.42-arc*0.12;
          for(let i=0;i<16;i++){ const t=-0.9+i/16*1.8;
            push(p.x+Math.cos(t)*rr, p.y+0.06+arc*0.1, p.z+Math.sin(t)*rr, arc===2?ink:GHOST, 1.6, 7); } }
      }
    });

    // satellites — your notes
    L.sats.forEach(s=>{
      const mark=s.n.type==='quote'?5:(s.n.type==='essay'?7:1);
      const col=s.loose?GHOST:INK_SOFT;
      push(s.x,s.y,s.z,col,2.6,mark);
      if(!s.loose){ // a whisker to its book
        const bp=L.bookPos[s.n.book];
        for(let i=1;i<4;i++){ const f=i/4;
          push(bp.x+(s.x-bp.x)*f, bp.y+(s.y-bp.y)*f, bp.z+(s.z-bp.z)*f, FAINT, 0.9, 0); }
      }
    });

    return { positions:new Float32Array(P), colors:new Float32Array(C),
             sizes:new Float32Array(S), marks:new Float32Array(M) };
  }

  /* ============================================================ */
  function init(){
    const THREE=window.THREE;
    const mount=document.getElementById('mount');
    const capsWrap=document.getElementById('caps');
    const hint=document.getElementById('hint');
    const EMBEDDED=(window.parent!==window);

    const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
    renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
    renderer.setSize(mount.clientWidth,mount.clientHeight);
    renderer.setClearColor(0x000000,0);
    mount.appendChild(renderer.domElement);
    const scene=new THREE.Scene();
    const camera=new THREE.PerspectiveCamera(48, mount.clientWidth/mount.clientHeight, 0.1, 200);
    const cloudGrp=new THREE.Group(); scene.add(cloudGrp);

    // the shared e-ink point material (cloud engine) — same marks, same ink
    const mat=window.CloudEngine.makePointMaterial(THREE,{alpha:0.92});

    /* ---- build + coalescence intro (the engine's staggered settle) ---- */
    let L=null, pts=null, geo=null, settle=null;
    function rebuild(withIntro){
      L=computeLayout();
      const D=buildCloud(L);
      if(pts){ cloudGrp.remove(pts); geo.dispose(); }
      geo=new THREE.BufferGeometry();
      geo.setAttribute('position',new THREE.BufferAttribute(D.positions,3));
      geo.setAttribute('aColor',new THREE.BufferAttribute(D.colors,3));
      geo.setAttribute('aSize',new THREE.BufferAttribute(D.sizes,1));
      geo.setAttribute('aAspect',new THREE.BufferAttribute(new Float32Array(D.sizes.length),1));
      geo.setAttribute('aMark',new THREE.BufferAttribute(D.marks,1));
      pts=new THREE.Points(geo,mat); cloudGrp.add(pts);
      settle=withIntro?window.CloudEngine.makeCoalescence(geo,{spread:10,stagger:0.45,duration:1.5}):null;
      buildCaps();
    }

    /* ---- captions ---- */
    let capMeta=[];
    function buildCaps(){
      capsWrap.innerHTML=''; capMeta=[];
      Object.values(L.wells).forEach(w=>{
        const el=document.createElement('div'); el.className='cap well'; el.textContent=w.n;
        capsWrap.appendChild(el);
        capMeta.push({el, x:w.x, y:0.34, z:w.z, kind:'well', id:w.id});
      });
      BOOKS.forEach(b=>{
        const p=L.bookPos[b.id];
        const el=document.createElement('div'); el.className='cap'+(p.written?'':' dead'); el.textContent=b.title;
        capsWrap.appendChild(el);
        capMeta.push({el, x:p.x, y:(b.form==='wheel'?0.95:0.6), z:p.z, kind:'book', id:b.id, live:b.live});
      });
    }

    /* ---- key ---- */
    (function(){
      const wrap=document.getElementById('keying');
      wrap.innerHTML='<div class="khead">The field</div>';
      [['◎','an idea · its well'],['▣','a book · drawn to its ideas'],['·','thought'],['❝','quote'],['¶','essay'],['○','loose · drifting near its idea']]
        .forEach(([g,l])=>{ const row=document.createElement('div'); row.className='k';
          row.innerHTML='<span class="sw">'+g+'</span><span class="lb">'+l+'</span>'; wrap.appendChild(row); });
      setTimeout(()=>{ wrap.style.opacity='1'; },700);
    })();

    /* ---- idea panel ---- */
    const ideaPanel=document.getElementById('ideaPanel');
    function openIdea(cid){
      const c=CONCEPTS.find(c=>c.id===cid); if(!c) return;
      const notes=L.notes.filter(n=>{ const kid=n.node||n.sug; return kid && (KCON[kid]||[]).includes(cid); });
      document.getElementById('ideaName').textContent=c.n;
      const books=[...new Set(notes.filter(n=>n.node).map(n=>n.book||'odyssey'))];
      document.getElementById('ideaMeta').textContent=notes.length+' note'+(notes.length!==1?'s':'')+' · '+books.length+' book'+(books.length!==1?'s':'');
      const list=document.getElementById('ideaList'); list.innerHTML='';
      if(!notes.length){ list.innerHTML='<div class="ideaNote" style="cursor:default"><div class="t" style="font-style:italic;color:var(--ghost)">Nothing here yet.</div></div>'; }
      notes.forEach(n=>{
        const d=document.createElement('div'); d.className='ideaNote'+(n.type==='quote'?' q':'');
        const t=document.createElement('div'); t.className='t'; t.textContent=n.text;
        const s=document.createElement('div'); s.className='s';
        s.textContent=(n.node?KNAME[n.node]+' · ':'○ loose · ')+(n.book?bookTitle(n.book):'suggested '+(KNAME[n.sug]||''));
        d.appendChild(t); d.appendChild(s);
        if(n.node){ d.addEventListener('click',()=>{ post({type:'fld:focus',node:n.node}); }); }
        list.appendChild(d);
      });
      const res=document.getElementById('ideaRes');
      res.className=books.length>1?'live':''; res.id='ideaRes';
      res.textContent=books.length>1
        ? '✳ '+c.n+' now spans '+books.map(bookTitle).join(' + ')+' — the meeting is the point.'
        : 'Awaiting a second book to touch '+c.n+'.';
      ideaPanel.classList.add('open');
    }
    document.getElementById('ideaClose').addEventListener('click',()=>ideaPanel.classList.remove('open'));
    function post(m){ try{ if(EMBEDDED) window.parent.postMessage(m,'*'); }catch(e){} }

    /* ---- free-orbit camera (the instrument gesture engine) ---- */
    const cam={ target:new THREE.Vector3(0,0.2,0), az:0.5, el:0.95, dist:15.5, vAz:0,vEl:0,vDist:0 };
    const LIM={elMin:0.2,elMax:1.5,distMin:3,distMax:30};
    const dom=renderer.domElement; dom.style.touchAction='none';
    let gesture=null,downT=0,lastX=0,lastY=0,moved=0,pinchD0=0,pinchMX=0,pinchMY=0;
    function pDown(x,y,pan){ gesture=pan?'pan':'orbit'; lastX=x;lastY=y; downT=performance.now(); moved=0; hint.style.opacity='0'; }
    function pMove(x,y){ if(!gesture)return; const dx=x-lastX,dy=y-lastY; lastX=x;lastY=y; moved+=Math.abs(dx)+Math.abs(dy);
      if(gesture==='orbit'){ cam.vAz+=-dx*0.005; cam.vEl+=dy*0.005; }
      else { panTarget(dx,dy); } }
    const _f=new THREE.Vector3(),_r=new THREE.Vector3(),_up=new THREE.Vector3(0,1,0);
    function panTarget(dx,dy){ _f.copy(cam.target).sub(camera.position); _f.y=0; _f.normalize();
      _r.crossVectors(_f,_up).normalize(); const k=cam.dist*0.0016;
      cam.target.addScaledVector(_r,-dx*k); cam.target.addScaledVector(_f,dy*k);
      cam.target.x=Math.max(-12,Math.min(12,cam.target.x)); cam.target.z=Math.max(-12,Math.min(12,cam.target.z)); }
    function pUp(x,y){ const wasTap=(performance.now()-downT)<450 && moved<8; gesture=null;
      if(wasTap) tapAt(x,y); }
    dom.addEventListener('mousedown',e=>{ pDown(e.clientX,e.clientY, e.button===2||e.shiftKey); e.preventDefault(); });
    window.addEventListener('mousemove',e=>pMove(e.clientX,e.clientY));
    window.addEventListener('mouseup',e=>pUp(e.clientX,e.clientY));
    dom.addEventListener('contextmenu',e=>e.preventDefault());
    dom.addEventListener('wheel',e=>{ e.preventDefault(); cam.vDist+=e.deltaY*0.012; },{passive:false});
    dom.addEventListener('touchstart',e=>{
      if(e.touches.length===1) pDown(e.touches[0].clientX,e.touches[0].clientY,false);
      else if(e.touches.length===2){ gesture='pinch';
        pinchD0=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
        pinchMX=(e.touches[0].clientX+e.touches[1].clientX)/2; pinchMY=(e.touches[0].clientY+e.touches[1].clientY)/2; moved=99; }
    },{passive:true});
    dom.addEventListener('touchmove',e=>{
      if(e.touches.length===1&&gesture!=='pinch') pMove(e.touches[0].clientX,e.touches[0].clientY);
      else if(e.touches.length===2){ const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
        if(pinchD0>0){ cam.vDist+=(1-d/pinchD0)*4.2; pinchD0=d; }
        const mx=(e.touches[0].clientX+e.touches[1].clientX)/2,my=(e.touches[0].clientY+e.touches[1].clientY)/2;
        panTarget(mx-pinchMX,my-pinchMY); pinchMX=mx; pinchMY=my; }
      e.preventDefault();
    },{passive:false});
    dom.addEventListener('touchend',e=>{ if(e.touches.length===0){ if(gesture!=='pinch'){ const t=(e.changedTouches&&e.changedTouches[0])||{clientX:lastX,clientY:lastY}; pUp(t.clientX,t.clientY); } else gesture=null; }
      else if(e.touches.length===1){ gesture='orbit'; lastX=e.touches[0].clientX; lastY=e.touches[0].clientY; moved=99; } });

    function tapAt(px,py){
      let best=null,bd=44;
      capMeta.forEach(m=>{ if(!m.onScreen)return; const d=Math.hypot(m.sx-px,m.sy-py); if(d<bd){ bd=d; best=m; } });
      if(!best){ ideaPanel.classList.remove('open'); return; }
      if(best.kind==='well') openIdea(best.id);
      else if(best.kind==='book'){ if(best.live) post({type:'fld:enterBook',book:best.id}); }
    }

    /* ---- bridge ---- */
    window.addEventListener('message',ev=>{
      const d=ev.data||{}; if(!d.type) return;
      if(d.type==='ast:fieldIntro'){ onResize(); rebuild(true); cam.az=0.5; cam.el=0.95; cam.dist=15.5; cam.target.set(0,0.2,0); }
      else if(d.type==='ast:notes'){ rebuild(false); if(ideaPanel.classList.contains('open')){ ideaPanel.classList.remove('open'); } }
    });

    function onResize(){ const w=mount.clientWidth||1,h=mount.clientHeight||1;
      camera.aspect=w/h; camera.updateProjectionMatrix(); renderer.setSize(w,h); }
    window.addEventListener('resize',onResize); onResize();
    if(window.ResizeObserver){ new ResizeObserver(onResize).observe(mount); }
    // hidden-at-boot guard: if the iframe had no size when we initialised,
    // keep re-measuring until it does (becoming visible fires no resize event)
    (function ensureSized(n){
      if(n>60) return;
      if((mount.clientWidth||0)<3){ setTimeout(()=>{ onResize(); ensureSized(n+1); },250); }
    })(0);

    const _v=new THREE.Vector3();
    const clock=new THREE.Clock();
    function animate(){
      requestAnimationFrame(animate);
      const dt=Math.min(0.05,clock.getDelta());
      cam.az+=cam.vAz; cam.vAz*=0.86;
      cam.el+=cam.vEl; cam.vEl*=0.86;
      cam.dist+=cam.vDist; cam.vDist*=0.84;
      cam.el=Math.max(LIM.elMin,Math.min(LIM.elMax,cam.el));
      cam.dist=Math.max(LIM.distMin,Math.min(LIM.distMax,cam.dist));
      if(!gesture&&Math.abs(cam.vAz)<0.0002) cam.az+=0.00035;
      const ce=Math.cos(cam.el),se=Math.sin(cam.el),ca=Math.cos(cam.az),sa=Math.sin(cam.az);
      _v.set(ca*ce,se,sa*ce).multiplyScalar(cam.dist);
      camera.position.copy(cam.target).add(_v);
      camera.lookAt(cam.target); camera.updateMatrixWorld();

      // coalescence: scatter → target, each point on its own small delay
      if(settle && !settle.update(dt)) settle=null;

      // captions
      const W=mount.clientWidth,H=mount.clientHeight;
      capMeta.forEach(m=>{
        _v.set(m.x,m.y,m.z).project(camera);
        m.onScreen=_v.z<1;
        if(m.onScreen){
          m.sx=(_v.x*0.5+0.5)*W; m.sy=(-_v.y*0.5+0.5)*H;
          m.el.style.transform='translate(-50%,-100%) translate('+m.sx.toFixed(1)+'px,'+m.sy.toFixed(1)+'px)';
          m.el.style.opacity= String(0.85*(settle?settle.progress():1));
        } else m.el.style.opacity='0';
      });

      renderer.render(scene,camera);
    }
    rebuild(true);
    animate();
  }

  var _w=0;
  (function boot(){ if(!window.THREE){ _w+=60; if(_w>8000) return; setTimeout(boot,60); return; } init(); })();
})();
</script>
</body></html>
