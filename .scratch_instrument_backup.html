  /* ============================================================
     INK PALETTE
     A single ink, expressed at a few densities. No hue. The "value"
     of a dot is how dark it sits against the paper — full ink for the
     subject in focus, soft and ghost-gray for everything resting.
     ============================================================ */
  const {INK_FULL,INK_SOFT,INK_MID,GHOST,FAINT}=window.CloudEngine;

  // Per-aspect intrinsic ink value (some lenses read darker than others,
  // giving the resting "map" a quiet tonal variety like an old chart).
  function aspectInk(a){
    switch(a){
      case 0: return INK_SOFT;  // xenia
      case 1: return INK_FULL;  // metis — the darkest, most solid
      case 2: return GHOST;     // lethe — faint, forgetting
      case 3: return INK_SOFT;  // nostos
      case 4: return INK_FULL;  // recognition — sharp
      case 5: return INK_MID;   // embedded tale
      case 6: return INK_FULL;  // monstrous — heavy
      case 7: return INK_SOFT;  // kleos
      default: return GHOST;
    }
  }

  /* ============================================================
     CLOUD BUILDER
     We carry an extra per-point attribute: aMark (the dot-signature
     id), consumed by the fragment shader to stamp a shape into each
     point sprite instead of a soft glow.
     ============================================================ */
  function buildCloud(){
    const P=[],C=[],S=[],A=[],M=[]; const fil=[];
    function push(x,y,z,col,size,aspect,mark){
      P.push(x,y,z); C.push(col[0],col[1],col[2]); S.push(size);
      A.push(aspect); M.push(mark);
    }

    const half = EXT*0.62 + 1.6;

    // ---- the sea-plane: faint pinpricks of ink, like the dotted
    //      "open water" fill on an engraved chart ----
    const SEA_N = 2400;
    for(let i=0;i<SEA_N;i++){
      const r = Math.sqrt(Math.random())*half;
      const th = Math.random()*6.2831;
      const x = Math.cos(th)*r, z = Math.sin(th)*r;
      const y = (Math.random()-0.5)*0.12;
      const d = 1-Math.min(1,r/half);
      // darker toward the inhabited centre, fading to bare paper at the edge
      const v = 0.62 + 0.10*d;
      push(x,y,z,[v*0.92,v*0.9,v*0.84], 0.7+Math.random()*0.7, 8, 0); // mark 0 = pinprick
    }

    // ---- coastline hint: a denser stipple ringing the centre,
    //      like the hatched shoreline on an old map ----
    for(let i=0;i<620;i++){
      const r = half*(0.48+Math.random()*0.5);
      const th=Math.random()*6.2831;
      push(Math.cos(th)*r,(Math.random()-0.5)*0.1,Math.sin(th)*r,FAINT,0.7+Math.random()*0.6,8,0);
    }

    // On the ATLAS, sculptures are shrunk to ~half so the crowded
    // central geography reads as a clean chart of small marks; the full
    // sculpture is shown large on its own plate page.
    const MAP_SCALE = 0.5;
    KNOTS.forEach(k=>{
      const baseY = baseYOf(k);
      const col = aspectInk(k.aspect);
      let topY = 0.2;   // track each sculpture's crown so its caption can sit above it
      const emit = (dx,dy,dz,size,mark,colOverride)=>{
        if(dy>topY && Math.hypot(dx,dz)<0.55) topY=dy;
        push(k.x+dx*MAP_SCALE, baseY+dy*MAP_SCALE, k.z+dz*MAP_SCALE, colOverride||col, size*0.86, k.aspect, (mark==null?1:mark));
      };
      const fn = SCULPT[k.id];
      if(fn){ fn(k,emit); }
      else { for(let i=0;i<240;i++){ emit(gj(0.34),Math.abs(gj(0.34))*0.5,gj(0.34),1.1,1); } }
      k.capY = baseY + topY*MAP_SCALE + 0.16;   // world-space caption anchor
    });

    // ---- the descent shaft: a column of ink dots dropping to the dead ----
    {
      const nk = byId.nekuia;
      const steps = 190;
      for(let i=0;i<steps;i++){
        const f=i/steps; const y = UNDER_Y*f;
        const jit = 0.10*(1-0.4*f);
        // fades from soft ink at the surface to ghost in the depths
        const v = 0.22 + 0.36*f;
        push(nk.x+(Math.random()-0.5)*jit, y, nk.z+(Math.random()-0.5)*jit,
             [v,v*0.96,v*0.9], 1.0+Math.random()*0.6, 5, 5);
      }
    }

    // ---- THE ROUTE: a beaded wandering line of mid-ink dots ----
    function pt(id){ const k=byId[id]; return [k.x,baseYOf(k),k.z]; }
    const routePts = ROUTE.map(pt);
    function sample(p0,p1,p2,p3,t){
      const t2=t*t,t3=t2*t; const out=[0,0,0];
      for(let d=0;d<3;d++){
        out[d]=0.5*((2*p1[d])+(-p0[d]+p2[d])*t+(2*p0[d]-5*p1[d]+4*p2[d]-p3[d])*t2+(-p0[d]+3*p1[d]-3*p2[d]+p3[d])*t3);
      }
      return out;
    }
    const SEG = 86;
    for(let i=0;i<routePts.length-1;i++){
      const p0=routePts[Math.max(0,i-1)], p1=routePts[i], p2=routePts[i+1], p3=routePts[Math.min(routePts.length-1,i+2)];
      for(let s=0;s<SEG;s++){
        const t=s/SEG; const p=sample(p0,p1,p2,p3,t);
        const lift = Math.sin(t*Math.PI)*0.08;
        push(p[0]+(Math.random()-0.5)*0.04, p[1]+lift+(Math.random()-0.5)*0.03, p[2]+(Math.random()-0.5)*0.04,
             INK_MID, 1.15+Math.random()*0.5, 9, 9);   // mark 9 = route dot
        if(s%11===0){ fil.push(p[0],p[1]+lift,p[2]); }
      }
    }
    const filSeg=[];
    for(let i=0;i<fil.length-3;i+=3){ filSeg.push(fil[i],fil[i+1],fil[i+2], fil[i+3],fil[i+4],fil[i+5]); }

    // ---- embedded-tale threads: Scheria back to the narrated knots ----
    const told=['cyclops','aeolia','laistry','circe','nekuia','sirens','scylla','thrina','ogygia'];
    const sch=byId.scheria;
    told.forEach(id=>{
      const k=byId[id]; const y=(k.kind==='underworld')?NEKUIA_DEPTH:0;
      filSeg.push(sch.x,0.0,sch.z, k.x,y,k.z);
      const n=30;
      for(let s=0;s<n;s++){ const f=s/n;
        const x=sch.x+(k.x-sch.x)*f, yy=0.0+(y-0.0)*f + Math.sin(f*Math.PI)*0.5, z=sch.z+(k.z-sch.z)*f;
        push(x+(Math.random()-0.5)*0.07, yy, z+(Math.random()-0.5)*0.07, GHOST, 0.9+Math.random()*0.5, 5, 5);
      }
    });

    // ---- escaping wisps: kleos, the doors left open ----
    [['troy',1],['ithaca',-1]].forEach(([id,bend])=>{
      const a=byId[id]; const dir=Math.atan2(a.z,a.x);
      const out=[Math.cos(dir)*(half*1.05), 1.4, Math.sin(dir)*(half*1.05)];
      const px=-Math.sin(dir), pz=Math.cos(dir); const n=76;
      for(let s=0;s<n;s++){ const f=s/(n-1); const ease=f*f; const arc=Math.sin(f*Math.PI)*1.1*bend;
        const x=a.x+(out[0]-a.x)*ease+px*arc+(Math.random()-0.5)*0.08;
        const y=0+(out[1]-0)*ease+(Math.random()-0.5)*0.08;
        const z=a.z+(out[2]-a.z)*ease+pz*arc+(Math.random()-0.5)*0.08;
        const v=0.30+0.42*f; // fades toward paper as it leaves the map
        push(x,y,z,[v,v*0.97,v*0.92],(1.4-0.85*f)+Math.random()*0.25,7,7);
      }
    });

    return {
      positions:new Float32Array(P), colors:new Float32Array(C), sizes:new Float32Array(S),
      aspects:new Float32Array(A), marks:new Float32Array(M),
      filaments:new Float32Array(filSeg)
    };
  }

  /* ============================================================
     RENDER ENGINE
     ============================================================ */
  function init(){
    const THREE=window.THREE;
    const mount=document.getElementById('mount');
    const svg=document.getElementById('svg');
    const hint=document.getElementById('hint'), titlecard=document.getElementById('titlecard');
    const refresh=document.getElementById('refresh');
    // when embedded in the Asterlogos surface, the shell owns the chrome
    const EMBEDDED = (window.parent!==window);
    if(EMBEDDED){ titlecard.style.display='none'; }
    const registersEl=document.getElementById('registers');
    if(!EMBEDDED && registersEl) setTimeout(()=>registersEl.classList.add('show'),400);

    // e-ink refresh flash — a quick discrete invert, the panel "repainting"
    function inkRefresh(){
      refresh.style.transition='none'; refresh.style.opacity='0.9';
      // force reflow then fade
      void refresh.offsetWidth;
      refresh.style.transition='opacity .26s steps(3)';
      refresh.style.opacity='0';
    }

    const memStore={};
    let storeMode='memory';
    (function(){ try{ const k='__odyssey_probe'; localStorage.setItem(k,'1'); localStorage.removeItem(k); storeMode='local'; }catch(e){ storeMode='memory'; } })();
    function lsGet(k){ if(storeMode==='local'){ try{ return localStorage.getItem(k); }catch(e){} } return (k in memStore)?memStore[k]:null; }
    function lsSet(k,v){ if(storeMode==='local'){ try{ localStorage.setItem(k,v); return; }catch(e){} } memStore[k]=v; }
    function getNote(id){ return lsGet('odyssey_note_'+id)||''; }
    function setNote(id,v){ lsSet('odyssey_note_'+id, v); }
    function getLog(){ try{ return JSON.parse(lsGet('odyssey_log')||'[]'); }catch(e){ return []; } }
    function setLog(a){ lsSet('odyssey_log', JSON.stringify(a)); }
    function recordVisit(id){
      if(!getNote(id)) return;
      const log=getLog();
      if(log.indexOf(id)===-1){ log.push(id); setLog(log); }
    }

    let current=null;
    let keyHidden=false;

    // The plate (full-page single-sculpture view) is created once THREE is
    // ready; enterRoom hands it the knot. The atlas keeps `current` set so
    // its lens stays applied underneath (and so beforeunload saves the note).
    let plate=null;

    function enterRoom(k){
      current=k;
      keyHidden=true; if(keyEl) keyEl.style.opacity='0';
      hint.style.opacity='0';
      if(plate) plate.open(k);
      try{ if(window.parent!==window) window.parent.postMessage({type:'ast:plate',open:true,id:k.id},'*'); }catch(e){}
    }
    function leaveRoom(){
      if(current){ recordVisit(current.id); }
      current=null;
      if(plate) plate.close();
      keyHidden=false; if(keyEl && keyReady) keyEl.style.opacity='1';
      try{ if(window.parent!==window) window.parent.postMessage({type:'ast:plate',open:false},'*'); }catch(e){}
    }
    window.addEventListener('beforeunload', ()=>{ if(plate) plate.flush(); });

    const reduced = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
    renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
    renderer.setSize(mount.clientWidth,mount.clientHeight);
    renderer.setClearColor(0x000000,0);
    mount.appendChild(renderer.domElement);

    const scene=new THREE.Scene();
    const camera=new THREE.PerspectiveCamera(48, mount.clientWidth/mount.clientHeight, 0.1, 200);

    const nutate=new THREE.Group(); scene.add(nutate);
    const tilt=new THREE.Group(); tilt.rotation.z=0.0; nutate.add(tilt);
    const cloud=new THREE.Group(); tilt.add(cloud);

    const D=buildCloud();

    const geo=new THREE.BufferGeometry();
    geo.setAttribute('position',new THREE.BufferAttribute(D.positions,3));
    geo.setAttribute('aColor',new THREE.BufferAttribute(D.colors,3));
    geo.setAttribute('aSize',new THREE.BufferAttribute(D.sizes,1));
    geo.setAttribute('aAspect',new THREE.BufferAttribute(D.aspects,1));
    geo.setAttribute('aMark',new THREE.BufferAttribute(D.marks,1));

    // ---- shaders: the shared e-ink point material (cloud engine) ----
    // Lens emphasis and the mark signatures live in the engine now, with
    // one addition: marks too small to resolve collapse to clean dots.
    const ptMat=window.CloudEngine.makePointMaterial(THREE);
    cloud.add(new THREE.Points(geo,ptMat));

    // the gravitational settle — the whole chart condenses out of scatter,
    // each dot on its own small delay (the field's intro, made shared)
    let settle = reduced ? null
      : window.CloudEngine.makeCoalescence(geo,{spread:6.5,stagger:0.45,duration:1.7});
    let lastT=0;

    /* ============================================================
       THE PLATE — a full-page view of ONE sculpture, isolated and
       centred on bare paper, with its own orbit/zoom controller.
       Built lazily on first open; reuses the same e-ink shaders.
       ============================================================ */
    function createPlate(){
      const root=document.getElementById('plate');
      const pMount=document.getElementById('plateMount');
      const pTitle=document.getElementById('plateTitle'), pPlace=document.getElementById('platePlace'),
            pBack=document.getElementById('plateBack'), pHint=document.getElementById('plateHint'),
            pgEyebrow=document.getElementById('pgEyebrow'),
            pgLabel=document.getElementById('pgLabel'), pgCount=document.getElementById('pgCount'),
            pgHeadActs=document.getElementById('pgHeadActs'), pgClose=document.getElementById('pgClose'),
            pgBody=document.getElementById('pgBody'), pgNavEl=document.getElementById('pgNav'),
            pgPrev=document.getElementById('pgPrev'), pgNext=document.getElementById('pgNext'),
            pgDash=document.getElementById('pgDash'), plateNote=document.getElementById('plateNote'),
            pgWrap=document.getElementById('pgWrap'),
            cart=document.getElementById('cartouche'), cartCv=document.getElementById('cartCanvas');

      const rnd=new THREE.WebGLRenderer({antialias:true,alpha:true});
      rnd.setPixelRatio(Math.min(window.devicePixelRatio,2));
      rnd.setClearColor(0x000000,0);
      pMount.appendChild(rnd.domElement);
      rnd.domElement.style.touchAction='none';

      const scn=new THREE.Scene();
      const cm=new THREE.PerspectiveCamera(46,1,0.05,200);
      const grp=new THREE.Group(); scn.add(grp);   // holds the current sculpture
      let pts=null;                                  // current THREE.Points
      let pSettle=null, pLastT=0;                    // per-plate condensation

      const mat=window.CloudEngine.makePointMaterial(THREE);

      // build one knot's sculpture at ORIGIN, full scale, return {points, height, radius}
      function buildSculpture(k){
        const P=[],C=[],S=[],A=[],M=[];
        const col=aspectInk(k.aspect);
        let minY=1e9,maxY=-1e9,maxR=0;
        const emit=(dx,dy,dz,size,mark,colOverride)=>{
          const c=colOverride||col;
          P.push(dx,dy,dz); C.push(c[0],c[1],c[2]); S.push(size*1.25); // a touch larger than map, not doubled
          A.push(k.aspect); M.push(mark==null?1:mark);
          if(dy<minY)minY=dy; if(dy>maxY)maxY=dy; const rr=Math.hypot(dx,dz); if(rr>maxR)maxR=rr;
        };
        const fn=SCULPT[k.id];
        if(fn){ fn(k,emit); } else { for(let i=0;i<420;i++){ emit(gj(0.34),Math.abs(gj(0.34))*0.5,gj(0.34),1.1,1); } }
        const g=new THREE.BufferGeometry();
        g.setAttribute('position',new THREE.BufferAttribute(new Float32Array(P),3));
        g.setAttribute('aColor',new THREE.BufferAttribute(new Float32Array(C),3));
        g.setAttribute('aSize',new THREE.BufferAttribute(new Float32Array(S),1));
        g.setAttribute('aAspect',new THREE.BufferAttribute(new Float32Array(A),1));
        g.setAttribute('aMark',new THREE.BufferAttribute(new Float32Array(M),1));
        return { geo:g, minY, maxY, maxR };
      }

      // --- plate camera: spherical orbit around the sculpture's centre ---
      const cam={ cy:0, az:0.6, el:0.42, dist:5, vAz:0, vEl:0, vDist:0, frame:5 };
      function frameTo(b){
        // centre on the form, but lift the look-point a touch so tall/deep
        // sculptures clear the title bar and sit in the lower stage
        cam.cy=(b.minY+b.maxY)/2 + (b.maxY-b.minY)*0.10;
        const span=Math.max(b.maxY-b.minY, b.maxR*2, 1.0);
        cam.frame=span; cam.dist=span*1.95; cam.az=0.6; cam.el=0.42; cam.vAz=cam.vEl=cam.vDist=0;
      }

      /* -------- the stream: cover · points and your notes interleaved · end.
         A note carries slot (how many editor points precede it) and ord
         (its order within the slot), so it sits IN the reading where it
         was written, and can be moved. -------- */
      let curK=null, slideIdx=0;
      let panelEdit=null;   // {id:noteId|null} — the in-panel editor; null id = a new note
      let plateMode=(function(){ try{ return localStorage.getItem('ast_plate_mode')||'slide'; }catch(e){ return 'slide'; } })();
      let plateFull=false;   // the note panel, full screen (the sculpture recedes)
      function setPlateFull(v){
        plateFull=v; root.classList.toggle('pgfull',v);
        onResize();       // the mount's live area changed → reframe the camera
        renderPanel();
      }
      function iconAct(paths,on,label,fn){
        const b=document.createElement('button'); b.type='button';
        b.className='icon-act'+(on?' on':''); b.title=label; b.setAttribute('aria-label',label);
        b.innerHTML='<svg width="13" height="13" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round">'+paths+'</svg>';
        b.addEventListener('click',fn); return b;
      }
      function modeBtns(){
        [['stack','<path d="M2 3.5h10M2 7h10M2 10.5h10"/>','Stacked'],
         ['slide','<rect x="2.5" y="3" width="9" height="8" rx="1"/>','One at a time']].forEach(function(mm){
          const m=mm[0], path=mm[1], label=mm[2];
          pgHeadActs.appendChild(iconAct(path, plateMode===m, label, ()=>{ plateMode=m;
            try{ localStorage.setItem('ast_plate_mode',m); }catch(e){}
            renderPanel(); }));
        });
        // full screen: the sculpture recedes, the reading takes the page
        pgHeadActs.appendChild(iconAct(
          plateFull?'<path d="M5.5 2v3.5H2M8.5 12V8.5H12M2 8.5h3.5V12M12 5.5H8.5V2"/>'
                   :'<path d="M8.5 2H12v3.5M5.5 12H2V8.5M12 8.5V12H8.5M2 5.5V2h3.5"/>',
          plateFull, plateFull?'Exit full screen':'Full screen', ()=>setPlateFull(!plateFull)));
      }
      function fmtD(ts){ try{ return new Date(ts).toLocaleDateString(undefined,{month:'short',day:'numeric'}); }catch(e){ return ''; } }
      function notifyShell(){ try{ if(window.parent!==window) window.parent.postMessage({type:'ast:notes'},'*'); }catch(e){} }
      // the two groups the topology column shows, scoped to this place:
      // your notes pinned here, and loose notes the suggester places here
      function placedHere(){ return loadObjs().filter(n=>n.node===curK.id).sort((a,b)=>b.ts-a.ts); }
      function looseHere(){ return loadObjs().filter(n=>!n.node && n.sug===curK.id).sort((a,b)=>b.ts-a.ts); }
      function mutate(fn){ const all=loadObjs(); fn(all); saveObjs(all); }
      function pinHere(n){ mutate(all=>{ const x=all.find(y=>y.id===n.id); if(x){ x.node=curK.id; x.book='odyssey'; } });
        syncDerived(); notifyShell(); renderPanel(); }
      function unpin(n){ mutate(all=>{ const x=all.find(y=>y.id===n.id); if(x) x.node=null; });
        syncDerived(); notifyShell(); renderPanel(); }
      function discardNote(n){ mutate(all=>{ const i=all.findIndex(y=>y.id===n.id); if(i>=0) all.splice(i,1); });
        syncDerived(); notifyShell(); renderPanel(); }
      function beginEdit(n){ panelEdit={id:n.id}; renderPanel(); }
      function startNew(){ if(!curK||panelEdit) return; panelEdit={id:null}; renderPanel(); }
      function cancelEdit(){ if(!panelEdit) return; panelEdit=null; renderPanel(); }
      /* ---- the canonical notes column — the exact pattern the book
             topology uses: a 'Notes · N' head with stack / one-at-a-time /
             full-screen / close, leaf cards grouped Loose · Placed, a note
             shown one-at-a-time in slide mode, and an in-panel editor.
             asterlogos.css owns every atom; this only assembles them. ---- */
      function showClose(v){ pgClose.style.display=v?'':'none'; }
      function actBtn(label,fn){ const b=document.createElement('button'); b.type='button'; b.className='act';
        b.textContent=label; b.addEventListener('click',e=>{ e.stopPropagation(); fn(); }); return b; }
      function group(label,count){ const h=document.createElement('div'); h.className='leafGroup';
        h.innerHTML='<span>'+label+'</span><span class="num">'+count+'</span>'; pgBody.appendChild(h); }
      function renderHead(total){
        pgEyebrow.classList.remove('editing');
        pgLabel.innerHTML='Notes · <span class="num">'+total+'</span>';
        pgCount.textContent=''; pgHeadActs.innerHTML=''; modeBtns(); showClose(true);
      }
      function leafCard(n,loose){
        const d=document.createElement('div'); d.className='leaf is-note is-'+n.type;
        const meta=document.createElement('div'); meta.className='lmeta';
        const st=document.createElement('span'); st.textContent=loose?'○':'●'; st.style.color='var(--ink-soft)';
        const mt=document.createElement('span'); mt.textContent=n.type+' · '+fmtD(n.ts);
        meta.appendChild(st); meta.appendChild(mt);
        const p=document.createElement('p'); p.className='ltxt'; p.textContent=n.text;
        const row=document.createElement('div'); row.className='lrow';
        if(loose){
          const lbl=document.createElement('span'); lbl.className='sug'; lbl.textContent='suggested here';
          row.appendChild(lbl);
          const pin=document.createElement('button'); pin.className='mono-btn'; pin.textContent='Pin here';
          pin.addEventListener('click',e=>{ e.stopPropagation(); pinHere(n); });
          row.appendChild(pin);
        } else {
          row.appendChild(actBtn('Unpin',()=>unpin(n)));
        }
        const del=actBtn('Discard',()=>discardNote(n)); del.classList.add('right');
        row.appendChild(del);
        d.appendChild(meta); d.appendChild(p); d.appendChild(row);
        d.addEventListener('click',()=>{ panelEdit={id:n.id}; renderPanel(); });
        return d;
      }
      function renderPanelSlide(loose,placed){
        const list=loose.map(n=>({n,loose:true})).concat(placed.map(n=>({n,loose:false})));
        slideIdx=Math.max(0,Math.min(list.length-1,slideIdx));
        const cur=list[slideIdx], n=cur.n;
        pgWrap.classList.remove('stack'); pgBody.innerHTML='';
        const wrap=document.createElement('div'); wrap.className='lvWrap';
        const meta=document.createElement('div'); meta.className='lvMeta';
        meta.textContent=n.type+' · '+(cur.loose?'suggested here':curK.name)+' · '+fmtD(n.ts);
        wrap.appendChild(meta);
        const p=document.createElement('div'); p.className='lvTxt'+(n.type==='quote'?' is-quote':'');
        p.textContent=n.text; p.title='Edit this note';
        p.addEventListener('click',()=>{ panelEdit={id:n.id}; renderPanel(); });
        wrap.appendChild(p);
        if(n.src){ const s=document.createElement('div'); s.className='lvSrc'; s.textContent='— '+n.src; wrap.appendChild(s); }
        const acts=document.createElement('div'); acts.className='lvActs';
        acts.appendChild(actBtn('Edit',()=>{ panelEdit={id:n.id}; renderPanel(); }));
        if(cur.loose) acts.appendChild(actBtn('Pin here',()=>pinHere(n)));
        else acts.appendChild(actBtn('Unpin',()=>unpin(n)));
        acts.appendChild(actBtn('Discard',()=>discardNote(n)));
        wrap.appendChild(acts);
        pgBody.appendChild(wrap);
        pgNavEl.style.display='flex';
        pgPrev.disabled=slideIdx<=0; pgNext.disabled=slideIdx>=list.length-1;
        pgDash.innerHTML='';
        list.forEach((x,i)=>{ const dt=document.createElement('span'); dt.className='dnt'+(i===slideIdx?' on':''); pgDash.appendChild(dt); });
      }
      function renderPanelEdit(){
        const n=panelEdit.id?loadObjs().find(x=>x.id===panelEdit.id):null;
        if(panelEdit.id && !n){ panelEdit=null; renderPanel(); return; }
        // the head becomes the leaf's head: what it is on the left, acts on the right
        pgEyebrow.classList.add('editing');
        pgLabel.textContent = n ? (n.type+' · '+curK.name+' · '+fmtD(n.ts)) : 'A new note';
        pgCount.textContent=''; pgHeadActs.innerHTML=''; showClose(false);
        pgWrap.classList.remove('stack'); pgNavEl.style.display='none'; pgBody.innerHTML='';
        const wrap=document.createElement('div'); wrap.className='lvWrap';
        const ta=document.createElement('textarea'); ta.className='lvEdit';
        ta.value=n?n.text:''; ta.placeholder='Set something down…';
        const grow=()=>{ ta.style.height='auto'; ta.style.height=Math.max(120,ta.scrollHeight)+'px'; };
        const doSave=()=>{ const t=ta.value.trim(); if(!t){ panelEdit=null; renderPanel(); return; }
          if(n){ mutate(all=>{ const x=all.find(y=>y.id===n.id); if(x) x.text=t; }); }
          else { const id='n'+Date.now().toString(36)+Math.floor(Math.random()*1296).toString(36);
            mutate(all=>all.unshift({id,type:'thought',text:t,book:'odyssey',node:curK.id,ts:Date.now()})); }
          panelEdit=null; syncDerived(); notifyShell(); renderPanel(); };
        const cancel=()=>{ panelEdit=null; renderPanel(); };
        const sv=document.createElement('button'); sv.type='button'; sv.className='btn-ink';
        sv.textContent=n?'Update it':'Set it down'; sv.addEventListener('click',doSave);
        pgHeadActs.appendChild(sv); pgHeadActs.appendChild(actBtn('Cancel',cancel));
        ta.addEventListener('input',grow);
        ta.addEventListener('keydown',e=>{ e.stopPropagation();
          if((e.metaKey||e.ctrlKey)&&e.key==='Enter'){ e.preventDefault(); doSave(); }
          else if(e.key==='Escape'){ e.preventDefault(); cancel(); } });
        wrap.appendChild(ta);
        const hint=document.createElement('div'); hint.className='sug'; hint.style.marginTop='12px';
        hint.textContent='⌘/Ctrl+Enter sets it down · Esc cancels';
        wrap.appendChild(hint);
        pgBody.appendChild(wrap);
        setTimeout(()=>{ grow(); ta.focus(); ta.selectionStart=ta.selectionEnd=ta.value.length; },60);
      }
      function renderPanel(){
        if(!curK) return;
        if(panelEdit){ renderPanelEdit(); return; }
        const loose=looseHere(), placed=placedHere();
        const total=loose.length+placed.length;
        renderHead(total);
        pgBody.innerHTML='';
        if(!total){ pgWrap.classList.remove('stack'); pgNavEl.style.display='none';
          const e=document.createElement('div'); e.className='leaves-empty'; e.textContent='No notes yet — write one.';
          pgBody.appendChild(e); return; }
        if(plateMode==='slide'){ renderPanelSlide(loose,placed); return; }
        pgWrap.classList.add('stack'); pgNavEl.style.display='none';
        if(loose.length){ group('Loose',loose.length); loose.forEach(n=>pgBody.appendChild(leafCard(n,true))); }
        if(placed.length){ group('Placed',placed.length); placed.forEach(n=>pgBody.appendChild(leafCard(n,false))); }
        pgBody.scrollTop=0;
      }
      function step(d){
        if(!curK||panelEdit||plateMode!=='slide') return;
        const total=looseHere().length+placedHere().length;
        const nx=Math.max(0,Math.min(total-1,slideIdx+d));
        if(nx!==slideIdx){ slideIdx=nx; renderPanel(); }
      }
      function refresh(){ if(curK && root.classList.contains('open') && !panelEdit) renderPanel(); }
      function setText(k){
        pTitle.textContent=k.name;
        const ctx = k.reg==='sky'?'Among the gods' : k.reg==='deep'?'Beneath the sea'
          : k.reg==='isle'?'An island power' : k.reg==='under'?'Among the dead'
          : k.kind==='underworld'?'The descent' : 'A place on the sea';
        pPlace.textContent=ctx+' · '+k.place;
        slideIdx=0; panelEdit=null; renderPanel();
        // locator cartouche — only for nodes that keep a real place on the map
        if(CARTOGRAPHIC && !k.offMap){ cart.style.display='block'; drawCartouche(cartCv,k); }
        else cart.style.display='none';
      }

      function open(k){
        curK=k; setText(k);
        if(pts){ grp.remove(pts); pts.geometry.dispose(); pts=null; }
        const b=buildSculpture(k);
        pts=new THREE.Points(b.geo,mat); grp.add(pts);
        frameTo(b);
        // the sculpture condenses radially out of loose ink as the plate opens
        pSettle = reduced ? null
          : window.CloudEngine.makeCoalescence(b.geo,{spread:Math.max(2.2,cam.frame*1.15),
              stagger:0.4,duration:1.15,center:[0,(b.minY+b.maxY)/2,0]});
        root.classList.add('open'); root.setAttribute('aria-hidden','false');
        onResize();
        pHint.style.opacity='.55';
        setTimeout(()=>{ pHint.style.opacity='0'; }, 3200);
      }
      function flush(){} // notes are set down explicitly now — objects, not a draft box
      function close(){
        flush();
        if(plateFull){ plateFull=false; root.classList.remove('pgfull'); }
        root.classList.remove('open'); root.setAttribute('aria-hidden','true');
      }

      pBack.addEventListener('click',()=>{ leaveRoom(); });
      pgClose.addEventListener('click',()=>{ if(panelEdit){ cancelEdit(); return; } leaveRoom(); });
      pgPrev.addEventListener('click',()=>step(-1));
      pgNext.addEventListener('click',()=>step(1));
      // writing: embedded, the shell owns the act (the write page, this
      // sculpture as its verso); standalone, a note page joins the stream
      plateNote.addEventListener('click',function(){
        if(EMBEDDED){ try{ window.parent.postMessage({type:'ast:write',node:curK?curK.id:null},'*'); }catch(e){} }
        else startNew();
      });

      // --- gestures on the plate canvas ---
      const dom=rnd.domElement;
      let gesture=null, lastX=0,lastY=0, pinchD0=0;
      function pDown(x,y){ gesture='orbit'; lastX=x; lastY=y; pHint.style.opacity='0'; }
      function pMove(x,y){ if(gesture!=='orbit')return; const dx=x-lastX,dy=y-lastY; lastX=x; lastY=y;
        cam.vAz+=-dx*0.006; cam.vEl+=dy*0.006; }
      function pUp(){ gesture=null; }
      dom.addEventListener('mousedown',e=>{ pDown(e.clientX,e.clientY); e.preventDefault(); });
      window.addEventListener('mousemove',e=>{ if(root.classList.contains('open')) pMove(e.clientX,e.clientY); });
      window.addEventListener('mouseup',()=>pUp());
      dom.addEventListener('wheel',e=>{ e.preventDefault(); cam.vDist+=e.deltaY*0.006; },{passive:false});
      dom.addEventListener('touchstart',e=>{
        if(e.touches.length===1){ pDown(e.touches[0].clientX,e.touches[0].clientY); }
        else if(e.touches.length===2){ gesture='pinch'; pinchD0=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY); }
      },{passive:true});
      dom.addEventListener('touchmove',e=>{
        if(e.touches.length===1 && gesture==='orbit'){ pMove(e.touches[0].clientX,e.touches[0].clientY); }
        else if(e.touches.length===2){ const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
          if(pinchD0>0){ cam.vDist+=(1-d/pinchD0)*2.0; pinchD0=d; } }
        e.preventDefault();
      },{passive:false});
      dom.addEventListener('touchend',e=>{ if(e.touches.length===0) pUp(); });

      function onResize(){
        const w=pMount.clientWidth||1, h=pMount.clientHeight||1;
        cm.aspect=w/h;
        // the spread: centre the figure in the left ~58% (the verso);
        // a positive view offset shifts the render left of true centre.
        // full screen: the faded figure sits centred behind the reading.
        if(!plateFull && w>680) cm.setViewOffset(w,h,w*0.21,0,w,h); else cm.clearViewOffset();
        cm.updateProjectionMatrix(); rnd.setSize(w,h);
      }
      window.addEventListener('resize',onResize);
      if(window.ResizeObserver){ new ResizeObserver(onResize).observe(pMount); }

      const _v=new THREE.Vector3();
      function tick(t){
        if(!root.classList.contains('open')) return;
        mat.uniforms.uTime.value=t; mat.uniforms.uSizeScale.value=Math.min(window.devicePixelRatio,2);
        const dtS=Math.min(0.05,t-pLastT); pLastT=t;
        if(pSettle && !pSettle.update(dtS)) pSettle=null;
        cam.az+=cam.vAz; cam.vAz*=0.88;
        cam.el+=cam.vEl; cam.vEl*=0.88;
        cam.dist+=cam.vDist; cam.vDist*=0.85;
        cam.el=Math.max(-0.35,Math.min(1.35,cam.el));
        cam.dist=Math.max(cam.frame*0.6,Math.min(cam.frame*4.5,cam.dist));
        if(!reduced && !gesture && Math.abs(cam.vAz)<0.0002){ cam.az+=0.0016; } // slow idle turn
        const ce=Math.cos(cam.el),se=Math.sin(cam.el),ca=Math.cos(cam.az),sa=Math.sin(cam.az);
        _v.set(ca*ce,se,sa*ce).multiplyScalar(cam.dist);
        cm.position.set(_v.x, cam.cy+_v.y, _v.z);
        cm.lookAt(0,cam.cy,0); cm.updateMatrixWorld();
        rnd.render(scn,cm);
      }
      return { open, close, flush, tick, step, refresh,
               isEditing:()=>!!panelEdit, cancelEdit };
    }
    plate = createPlate();

    // faint connective filaments — thin ink hairlines (multiply-like via low alpha)
    const filGeo=new THREE.BufferGeometry(); filGeo.setAttribute('position',new THREE.BufferAttribute(D.filaments,3));
    const filMat=new THREE.LineBasicMaterial({color:0x39352e,transparent:true,opacity:0.10,depthWrite:false,blending:THREE.NormalBlending});
    cloud.add(new THREE.LineSegments(filGeo,filMat));

    // the descent axis hairline
    const nk=byId.nekuia;
    const axisMat=new THREE.LineBasicMaterial({color:0x39352e,transparent:true,opacity:0.14,depthWrite:false,blending:THREE.NormalBlending});
    cloud.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(nk.x,0.1,nk.z),new THREE.Vector3(nk.x,UNDER_Y-0.3,nk.z)]),axisMat));

    // the marks key is gone: a legend the map can't honour at map-scale
    // teaches distrust — the concepts live in the readings instead
    let keyEl=null, keyReady=false;

    const clock=new THREE.Clock();

    /* ============================================================
       FREE-FLIGHT CAMERA — a spherical orbit controller.
       The camera orbits a movable TARGET point at DIST, by AZIMUTH
       (around Y) and ELEVATION (up/down). Gestures drive these with
       momentum and damping, so the whole map behaves like one solid
       3D object you can turn over, fly into, and pan across.
         · one finger / mouse drag .... orbit
         · two-finger pinch / wheel ... zoom (dolly)
         · two-finger drag / shift-drag / right-drag ... pan target
       A short tap still opens a knot (option B: tap never moves the
       camera — you keep full control).
       ============================================================ */
    const cam = {
      target:new THREE.Vector3(0,0.2,0),
      az: 0.32,            // azimuth (radians)
      el: 0.60,           // elevation: a 3/4 view, so the registers stack (gods high, dead low)
      dist: 16.5,
      // velocities for momentum
      vAz:0, vEl:0, vDist:0,
      vTarget:new THREE.Vector3()
    };
    const CAM_LIMITS = {
      elMin: 0.12,          // near-horizon (don't go under the sea)
      elMax: 1.52,          // near-straight-down
      distMin: 1.4,
      distMax: 30
    };
    // a gentle home pose (used by Escape / "to the sea")
    const HOME = { target:new THREE.Vector3(0,0.2,0), az:0.32, el:0.60, dist:16.5 };
    function goHome(){
      // set velocities toward home over the next frames via a soft tween flag
      homeTween = 1.0;
    }
    let homeTween = 0;

    // knot anchors (static world positions — the cloud no longer rotates)
    const capsWrap=document.getElementById('caps');
    const islandMeta = KNOTS.map(k=>{
      const cap=document.createElement('div'); cap.className='cap'; cap.textContent=k.name;
      capsWrap.appendChild(cap);
      return { k,
        world:new THREE.Vector3(k.x,baseYOf(k),k.z),
        capWorld:new THREE.Vector3(k.x,k.capY,k.z),
        cap, sx:0, sy:0, onScreen:false };
    });

    while(svg.firstChild) svg.removeChild(svg.firstChild);
    const SVGNS='http://www.w3.org/2000/svg';
    const threadPath=document.createElementNS(SVGNS,'path');
    threadPath.setAttribute('fill','none');
    threadPath.setAttribute('stroke','rgba(27,25,22,0.55)');
    threadPath.setAttribute('stroke-width','1');
    threadPath.setAttribute('stroke-dasharray','1 4');
    threadPath.setAttribute('stroke-linecap','round');
    svg.appendChild(threadPath);
    const ringLayer=document.createElementNS(SVGNS,'g');
    svg.appendChild(ringLayer);
    svg.style.opacity='1';

    function drawLogbook(){
      const log=getLog();
      const pts=[];
      log.forEach(id=>{ const m=islandMeta.find(o=>o.k.id===id); if(m && m.onScreen) pts.push(m); });
      if(pts.length>=2){
        let d='M '+pts[0].sx.toFixed(1)+' '+pts[0].sy.toFixed(1);
        for(let i=1;i<pts.length;i++) d+=' L '+pts[i].sx.toFixed(1)+' '+pts[i].sy.toFixed(1);
        threadPath.setAttribute('d',d);
      } else { threadPath.setAttribute('d',''); }
      while(ringLayer.firstChild) ringLayer.removeChild(ringLayer.firstChild);
      log.forEach(id=>{
        const m=islandMeta.find(o=>o.k.id===id); if(!m||!m.onScreen) return;
        // a hand-drawn-looking ink ring marking "you were here"
        const c=document.createElementNS(SVGNS,'circle');
        c.setAttribute('cx',m.sx.toFixed(1)); c.setAttribute('cy',m.sy.toFixed(1));
        c.setAttribute('r','10'); c.setAttribute('fill','none');
        c.setAttribute('stroke','rgba(27,25,22,0.6)'); c.setAttribute('stroke-width','1.1');
        ringLayer.appendChild(c);
      });
    }

    const dom=renderer.domElement; dom.style.touchAction='none';

    function pickAt(px,py){
      let best=null,bestD=30;
      islandMeta.forEach(m=>{ if(!m.onScreen) return; const dx=m.sx-px,dy=m.sy-py; const d=Math.hypot(dx,dy); if(d<bestD){ bestD=d; best=m; } });
      return best;
    }

    // ---- gesture state ----
    let gesture=null;            // 'orbit' | 'pan' | null
    let downX=0,downY=0,downT=0, lastX=0,lastY=0, moved=0;
    let pinchD0=0, pinchMidX=0, pinchMidY=0;
    let panMode=false;           // shift / right-button pan on desktop

    function clampEl(){ cam.el=Math.max(CAM_LIMITS.elMin,Math.min(CAM_LIMITS.elMax,cam.el)); }
    function clampDist(){ cam.dist=Math.max(CAM_LIMITS.distMin,Math.min(CAM_LIMITS.distMax,cam.dist)); }

    // pan moves the target across the camera's right/forward plane,
    // scaled by distance so it feels 1:1 with the dragged content
    const _right=new THREE.Vector3(), _fwd=new THREE.Vector3(), _up=new THREE.Vector3(0,1,0), _tmp=new THREE.Vector3();
    function panTarget(dxPx,dyPx){
      // camera basis
      _fwd.copy(cam.target).sub(camera.position); _fwd.y=0; _fwd.normalize();
      _right.crossVectors(_fwd,_up).normalize();
      const k = cam.dist * 0.0016;
      cam.target.addScaledVector(_right, -dxPx*k);
      cam.target.addScaledVector(_fwd,   dyPx*k);
      // clamp target to a sane region above the sea
      cam.target.x=Math.max(-14,Math.min(14,cam.target.x));
      cam.target.z=Math.max(-14,Math.min(14,cam.target.z));
    }

    // ---- pointer (mouse) ----
    function pDown(x,y,opts){
      downX=x; downY=y; lastX=x; lastY=y; downT=performance.now(); moved=0;
      gesture = (opts&&opts.pan)?'pan':'orbit';
      homeTween=0; // any interaction cancels the home tween
      titlecard.style.opacity='0'; hint.style.opacity='0';
    }
    function pMove(x,y){
      if(!gesture) return;
      const dx=x-lastX, dy=y-lastY; lastX=x; lastY=y;
      moved += Math.abs(dx)+Math.abs(dy);
      if(gesture==='orbit'){
        cam.vAz += -dx*0.005;
        cam.vEl +=  dy*0.005;
      } else if(gesture==='pan'){
        panTarget(dx,dy);
      }
    }
    function pUp(x,y){
      const dt=performance.now()-downT;
      const wasTap = dt<450 && moved<8;
      gesture=null;
      if(wasTap){
        const hit=pickAt(x,y);
        if(hit){ if(!(current && current.id===hit.k.id)){ enterRoom(hit.k); } }
        else if(current){ leaveRoom(); }      // tap empty sea = close panel (camera stays — option B)
      }
    }

    dom.addEventListener('mousedown',e=>{
      const pan = e.button===2 || e.shiftKey;
      pDown(e.clientX,e.clientY,{pan});
      e.preventDefault();
    });
    window.addEventListener('mousemove',e=>pMove(e.clientX,e.clientY));
    window.addEventListener('mouseup',e=>pUp(e.clientX,e.clientY));
    dom.addEventListener('contextmenu',e=>e.preventDefault()); // allow right-drag pan
    dom.addEventListener('wheel',e=>{
      e.preventDefault();
      homeTween=0;
      titlecard.style.opacity='0'; hint.style.opacity='0';
      cam.vDist += e.deltaY*0.012;   // wheel zoom (momentum)
    },{passive:false});

    // hover cursor affordance
    dom.addEventListener('mousemove',e=>{ if(gesture) return; dom.style.cursor = pickAt(e.clientX,e.clientY)?'pointer':(panMode?'grab':'default'); });
    window.addEventListener('keydown',e=>{
      if(e.target && (e.target.tagName==='TEXTAREA'||e.target.tagName==='INPUT')) return;
      if(e.key==='Shift') panMode=true;
      if(e.key==='Escape'){
        if(current && plate && plate.isEditing()){ plate.cancelEdit(); return; }
        if(current) leaveRoom(); goHome();
      }
      if(current && plate){
        if(e.key==='ArrowRight'){ e.preventDefault(); plate.step(1); }
        else if(e.key==='ArrowLeft'){ e.preventDefault(); plate.step(-1); }
      }
    });
    window.addEventListener('keyup',e=>{ if(e.key==='Shift') panMode=false; });

    // ---- touch ----
    function midpoint(t0,t1){ return [(t0.clientX+t1.clientX)/2,(t0.clientY+t1.clientY)/2]; }
    function dist2(t0,t1){ return Math.hypot(t0.clientX-t1.clientX,t0.clientY-t1.clientY); }

    dom.addEventListener('touchstart',e=>{
      if(e.touches.length===1){
        pDown(e.touches[0].clientX,e.touches[0].clientY);
      } else if(e.touches.length===2){
        gesture='pinch';
        pinchD0=dist2(e.touches[0],e.touches[1]);
        const m=midpoint(e.touches[0],e.touches[1]); pinchMidX=m[0]; pinchMidY=m[1];
        homeTween=0; moved=99; // a two-finger gesture is never a tap
        titlecard.style.opacity='0'; hint.style.opacity='0';
      }
    },{passive:true});

    dom.addEventListener('touchmove',e=>{
      if(e.touches.length===1 && gesture!=='pinch'){
        pMove(e.touches[0].clientX,e.touches[0].clientY);
      } else if(e.touches.length===2){
        const d=dist2(e.touches[0],e.touches[1]);
        const m=midpoint(e.touches[0],e.touches[1]);
        // pinch -> zoom
        if(pinchD0>0){ const ratio=d/pinchD0; cam.vDist += (1-ratio)*4.2; pinchD0=d; }
        // two-finger drag -> pan
        const dmx=m[0]-pinchMidX, dmy=m[1]-pinchMidY; pinchMidX=m[0]; pinchMidY=m[1];
        panTarget(dmx,dmy);
      }
      e.preventDefault();
    },{passive:false});

    dom.addEventListener('touchend',e=>{
      if(e.touches.length===0){
        if(gesture!=='pinch'){
          const tch=(e.changedTouches&&e.changedTouches[0])||{clientX:lastX,clientY:lastY};
          pUp(tch.clientX,tch.clientY);
        } else { gesture=null; }
      } else if(e.touches.length===1){
        // lifted one finger of a pinch -> resume single-finger orbit cleanly
        gesture='orbit'; lastX=e.touches[0].clientX; lastY=e.touches[0].clientY; moved=99;
      }
    });

    // when the shell opens its leaves column, the atlas recedes left —
    // the same spread the plate uses (figure verso, text recto)
    let SHIFTED=false;
    function onResize(){ const w=mount.clientWidth||1,h=mount.clientHeight||1; camera.aspect=w/h;
      if(SHIFTED && w>680) camera.setViewOffset(w,h,w*0.21,0,w,h); else camera.clearViewOffset();
      camera.updateProjectionMatrix(); renderer.setSize(w,h); }
    window.addEventListener('resize',onResize); onResize();
    if(window.ResizeObserver){ new ResizeObserver(onResize).observe(mount); }

    const _v=new THREE.Vector3();
    function animate(){
      requestAnimationFrame(animate);
      const t=clock.getElapsedTime();
      ptMat.uniforms.uTime.value=t;
      ptMat.uniforms.uSizeScale.value=Math.min(window.devicePixelRatio,2);

      // the settle: dust easing into the chart, then it stops touching the buffer
      const dtS=Math.min(0.05,t-lastT); lastT=t;
      if(settle && !settle.update(dtS)) settle=null;

      // --- integrate camera velocities with damping ---
      cam.az  += cam.vAz;   cam.vAz  *= 0.86;
      cam.el  += cam.vEl;   cam.vEl  *= 0.86;
      cam.dist+= cam.vDist; cam.vDist*= 0.84;
      clampEl(); clampDist();

      // soft auto-return to home when requested (Escape / back-to-sea)
      if(homeTween>0){
        const s=0.06;
        cam.target.lerp(HOME.target, s);
        cam.az += (HOME.az-cam.az)*s;
        cam.el += (HOME.el-cam.el)*s;
        cam.dist += (HOME.dist-cam.dist)*s;
        homeTween-=0.016; if(homeTween<0) homeTween=0;
      }

      // a near-imperceptible idle drift only when fully at rest & untouched
      if(!reduced && !gesture && homeTween===0 &&
         Math.abs(cam.vAz)<0.0002 && Math.abs(cam.vEl)<0.0002 && Math.abs(cam.vDist)<0.0002 && !current){
        cam.az += 0.0004;
      }

      // --- place camera from spherical coords around target ---
      const ce=Math.cos(cam.el), se=Math.sin(cam.el);
      const ca=Math.cos(cam.az), sa=Math.sin(cam.az);
      // el measured from horizon: y = dist*sin(el); ground radius = dist*cos(el)
      _v.set(ca*ce, se, sa*ce).multiplyScalar(cam.dist);
      camera.position.copy(cam.target).add(_v);
      camera.lookAt(cam.target); camera.updateMatrixWorld();

      // --- lens emphasis when a knot's panel is open ---
      const wantLens = current ? current.aspect : -1;
      const ls = ptMat.uniforms.uLensStrength;
      ptMat.uniforms.uLens.value = wantLens;
      ls.value += ((current?0.9:0) - ls.value)*0.08;
      filMat.opacity = 0.10 + (current && current.aspect===5 ? 0.22:0.0)*ls.value;
      axisMat.opacity = 0.14 + (current && current.kind==='underworld' ? 0.4:0)*ls.value;

      // --- project knot anchors to screen (cloud is static at origin) ---
      const W=mount.clientWidth, Hh=mount.clientHeight;
      const capFade = Math.max(0, Math.min(1, (26-cam.dist)/14));   // captions retire as you pull far out
      islandMeta.forEach(m=>{
        _v.copy(m.world).project(camera);
        m.onScreen = _v.z<1;
        m.sx=(_v.x*0.5+0.5)*W; m.sy=(-_v.y*0.5+0.5)*Hh;
        // caption above the sculpture's crown, dimming when its knot is off the lens
        _v.copy(m.capWorld).project(camera);
        const on = _v.z<1;
        if(on){
          m.cap.style.transform='translate(-50%,-100%) translate('+((_v.x*0.5+0.5)*W).toFixed(1)+'px,'+((-_v.y*0.5+0.5)*Hh).toFixed(1)+'px)';
          const dimmed = current && current.id!==m.k.id;
          m.cap.style.opacity = (0.4+0.45*capFade) * (dimmed?0.35:1);
        } else m.cap.style.opacity='0';
      });
      drawLogbook();

      renderer.render(scene,camera);
      if(plate) plate.tick(t);
    }
    animate();

    // deep link: #plate=<knotId> opens straight onto that plate
    (function(){
      const m=(location.hash||'').match(/plate=([a-z]+)/);
      if(m && byId[m[1]]) setTimeout(()=>enterRoom(byId[m[1]]),80);
    })();

    // ---- Asterlogos surface bridge (when embedded as a folio) ----
    window.addEventListener('message', function(ev){
      var d=ev.data||{}; if(!d.type) return;
      if(d.type==='ast:posQuery'){
        var m=islandMeta.find(function(o){ return o.k.id===d.id; });
        if(m) window.parent.postMessage({type:'ast:pos',id:d.id,sx:m.sx,sy:m.sy,ok:m.onScreen},'*');
      } else if(d.type==='ast:sown'){
        drawLogbook(); var k=byId[d.id]; if(k) enterRoom(k);
      } else if(d.type==='ast:focus'){
        var k2=byId[d.id]; if(k2) enterRoom(k2);
      } else if(d.type==='ast:home'){
        if(current) leaveRoom(); goHome();
      } else if(d.type==='ast:notes'){
        if(plate) plate.refresh(); drawLogbook();
      } else if(d.type==='ast:shift'){
        SHIFTED=!!d.on; onResize();
      } else if(d.type==='ast:writing'){
        document.getElementById('plate').classList.toggle('writing',!!d.on);
      }
    });
    window.addEventListener('storage', function(ev){
      if(!ev.key) return;
      if(ev.key==='odyssey_log' || ev.key.indexOf('odyssey_note_')===0){ drawLogbook(); }
    });
  }

  var _waited=0;
  function boot(){
    if(!window.THREE){
      _waited+=60;
      if(_waited>8000) return;
      setTimeout(boot,60); return;
    }
    init();
  }
  boot();
})();
</script>
</body></html>
