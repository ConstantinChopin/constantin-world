<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Odyssey — A Wandering</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Newsreader:opsz,wght@6..72,300;6..72,400&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<script>
// the design system sits beside the prototypes; resolve it from the
// /prototypes/ segment so clean-URL servers (no trailing slash) still find it
(function(){
  var p=location.pathname, i=p.indexOf('/prototypes/');
  var base=(i>=0)?p.slice(0,i+12):'../';
  document.write('<link rel="stylesheet" href="'+base+'_shared/asterlogos.css">');
})();
</script>
<style>
  html,body{margin:0;padding:0;background:var(--paper);height:100%;overflow:hidden;}
  *{box-sizing:border-box;}
  #stage{position:fixed;inset:0;background:var(--paper);overflow:hidden;font-family:'Newsreader',Georgia,serif;}
  #mount{position:absolute;inset:0;}
  /* faint paper tooth — a barely-there stipple so the "page" isn't flat digital flat */
  #stage::before{content:"";position:absolute;inset:0;z-index:1;pointer-events:none;opacity:0.5;
    background-image:radial-gradient(var(--rule) 0.5px,transparent 0.5px);background-size:3px 3px;mix-blend-mode:multiply;}
  /* vignette like the bezel shadow of an e-ink panel */
  #stage::after{content:"";position:absolute;inset:0;z-index:2;pointer-events:none;
    box-shadow:inset 0 0 120px rgba(70,64,54,0.16);}

  #svg{position:absolute;inset:0;z-index:5;pointer-events:none;width:100%;height:100%;}

  /* node captions — italic place-names floating above each form, old-chart style */
  #caps{position:absolute;inset:0;z-index:6;pointer-events:none;overflow:hidden;}
  .cap{position:absolute;transform:translate(-50%,-100%);white-space:nowrap;
    font:var(--text-caption);font-style:italic;letter-spacing:.04em;color:rgba(57,53,46,0.9);
    text-shadow:0 0 5px var(--paper),0 0 3px var(--paper),0 0 2px var(--paper);
    transition:opacity .3s ease;}

  #legend{position:absolute;left:28px;bottom:28px;z-index:8;pointer-events:none;will-change:opacity;opacity:0;
    width:344px;max-width:86vw;padding:22px 24px 20px;border-radius:3px;
    transition:opacity .35s ease;
    background:var(--paper);
    border:1px solid var(--ink);
    box-shadow:5px 6px 0 rgba(27,25,22,0.14);
    max-height:84vh;overflow-y:auto;}
  #legend.show{pointer-events:auto;}
  #legNum{font:400 9px 'JetBrains Mono',monospace;letter-spacing:.32em;color:var(--ink-soft);text-transform:uppercase;margin-bottom:10px;
    border-bottom:1px solid var(--rule);padding-bottom:9px;}
  #legTitle{font:500 30px 'Cormorant Garamond',Georgia,serif;color:var(--ink);letter-spacing:.01em;margin-bottom:6px;line-height:1.0;}
  #legPlace{font:400 9.5px 'JetBrains Mono',monospace;letter-spacing:.16em;color:var(--ink-soft);text-transform:uppercase;margin-bottom:13px;}
  .reflHead{font:400 8.5px 'JetBrains Mono',monospace;letter-spacing:.3em;color:var(--ghost);text-transform:uppercase;margin-bottom:7px;}
  #legOrient{font:300 14px/1.66 'Newsreader',Georgia,serif;color:var(--ink-soft);margin-bottom:18px;}
  .reflHead2{margin-top:0;}
  #compareBtn,#backBtn{pointer-events:auto;cursor:pointer;background:transparent;
    border:1px solid var(--ink);color:var(--ink);border-radius:2px;padding:8px 14px;
    font:400 9px 'JetBrains Mono',monospace;letter-spacing:.16em;text-transform:uppercase;transition:all .18s;}
  #compareBtn{margin-top:4px;}
  #compareBtn:hover,#backBtn:hover{background:var(--ink);color:var(--paper);}
  #backBtn{margin-top:18px;border-color:var(--rule);color:var(--ink-soft);}
  #backBtn:hover{background:var(--ink-soft);color:var(--paper);border-color:var(--ink-soft);}
  #readingWrap{display:none;margin-top:16px;border-top:1px solid var(--rule);padding-top:15px;}
  #noteBox{pointer-events:auto;width:100%;min-height:74px;resize:vertical;box-sizing:border-box;
    background:var(--paper-deep);border:1px solid var(--rule);border-radius:2px;padding:9px 11px;
    font:300 13.5px/1.55 'Newsreader',Georgia,serif;color:var(--ink);outline:none;transition:border-color .18s;}
  #noteBox:focus{border-color:var(--ink);}
  #noteBox::placeholder{color:var(--ghost);font-style:italic;}
  #legReading{font:300 13.5px/1.66 'Newsreader',Georgia,serif;color:var(--ink-soft);}
  #storeNote{font:400 8px 'JetBrains Mono',monospace;letter-spacing:.1em;color:var(--ghost);text-transform:uppercase;margin-top:14px;}

  #hint{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);z-index:7;pointer-events:none;
    font:var(--text-label);letter-spacing:.3em;color:var(--ink-soft);text-transform:uppercase;transition:opacity .8s;}

  /* the three registers named down the right edge — the poem's vertical axis:
     gods above, the sea between, the dead below. A quiet chart legend. */
  #registers{position:absolute;right:26px;top:50%;transform:translateY(-50%);z-index:6;pointer-events:none;
    display:flex;flex-direction:column;align-items:flex-end;opacity:0;transition:opacity 1.1s;}
  #registers.show{opacity:1;}
  #registers .rg{font:var(--text-label);letter-spacing:.22em;text-transform:uppercase;color:var(--ink-soft);}
  #registers .rgl{width:1px;height:52px;margin:8px 3px;
    background:linear-gradient(rgba(27,25,22,0),rgba(27,25,22,0.3),rgba(27,25,22,0));}
  @media (max-width:680px){ #registers{display:none;} }

  #titlecard{position:absolute;top:26px;left:28px;z-index:7;pointer-events:none;transition:opacity 1.0s;}
  #titlecard .t{font:var(--text-title);color:var(--ink);letter-spacing:.02em;font-style:italic;}
  #titlecard .s{font:var(--text-label);letter-spacing:.34em;color:var(--ink-soft);text-transform:uppercase;margin-top:5px;}

  /* the e-ink refresh flash: a brief full-panel invert on transitions */
  #refresh{position:fixed;inset:0;z-index:40;pointer-events:none;background:var(--ink);opacity:0;}

  #err{position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#e7e4db;color:#7a2318;padding:10px 14px;border-radius:2px;border:1px solid #7a2318;z-index:99999;white-space:pre-wrap;display:none;}

  /* ---------- FULL-PAGE PLATE ---------- */
  #plate{position:fixed;inset:0;z-index:30;background:var(--paper);
    opacity:0;visibility:hidden;transition:opacity .42s ease;
    font-family:'Newsreader',Georgia,serif;}
  #plate.open{opacity:1;visibility:visible;}
  #plate::before{content:"";position:absolute;inset:0;z-index:1;pointer-events:none;opacity:0.5;
    background-image:radial-gradient(var(--rule) 0.5px,transparent 0.5px);background-size:3px 3px;mix-blend-mode:multiply;}
  #plate::after{content:"";position:absolute;inset:0;z-index:2;pointer-events:none;
    box-shadow:inset 0 0 130px rgba(70,64,54,0.18);}
  #plateMount{position:absolute;inset:0;z-index:3;}

  /* plate header — same grammar as the book header, one level deeper:
     [‹ parent chip] [Title, Cormorant italic 21px / mono context line].
     Left-aligned; the centre belongs to the sculpture. Right slot reserved. */
  #plateTopbar{position:absolute;top:var(--edge-top);left:var(--edge-x);z-index:6;display:flex;align-items:center;
    gap:14px;pointer-events:none;}
  #plateBack{pointer-events:auto;flex:0 0 auto;}
  #plateHead{text-align:left;}
  #plateTitle{font:var(--text-title);font-style:italic;color:var(--ink);letter-spacing:.02em;}
  #platePlace{font:var(--text-meta);letter-spacing:.16em;text-transform:uppercase;color:var(--ink-soft);margin-top:4px;}

  /* ---------- the reading page — letterpress facing the engraving.
     No card, no border: floating text on the paper. The sculpture is
     the verso (left ~58%, camera offset); this column is the recto. */
  #platePage{position:absolute;top:var(--edge-top);right:var(--edge-x);bottom:96px;width:42%;z-index:6;
    display:flex;flex-direction:column;padding:0 24px 0 8px;pointer-events:none;}
  /* the column header rides the masthead line — the canonical .panel-head
     molecule (asterlogos.css); only pointer opt-ins live here */
  #pgEyebrow{flex:0 0 auto;}
  #pgEyebrow .ph-acts,#pgEyebrow .icon-act,#pgClose{pointer-events:auto;}
  #pgWrap{flex:1;display:flex;flex-direction:column;justify-content:center;min-height:0;}
  #pgWrap.stack{justify-content:flex-start;}
  #pgWrap.stack #pgBody{max-height:none;flex:1;}
  #platePage .btn-ink{pointer-events:auto;}
  #pgBody{pointer-events:auto;max-width:50ch;max-height:58vh;overflow-y:auto;scrollbar-width:none;}
  #pgBody::-webkit-scrollbar{display:none;}
  /* the notes column: leaf cards clamp in the stack, open in full screen */
  #pgBody .leaf{margin-bottom:20px;}
  #pgBody .ltxt{display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
  #plate.pgfull #pgBody .ltxt{-webkit-line-clamp:unset;display:block;overflow:visible;}
  /* slide-mode stepping: bare glyphs and hairline dots — no carousel furniture */
  #pgNav{display:none;align-items:center;gap:10px;margin-top:26px;max-width:50ch;min-height:28px;}
  #pgNav button{pointer-events:auto;cursor:pointer;width:28px;height:28px;display:grid;place-items:center;
    background:transparent;border:1px solid var(--rule);border-radius:2px;color:var(--ink-soft);
    font:400 14px 'JetBrains Mono',monospace;transition:border-color .16s,color .16s,background .16s;}
  #pgNav button:hover{border-color:var(--ink);color:var(--ink);}
  #pgNav button:disabled{opacity:.25;cursor:default;border-color:var(--rule);color:var(--ink-soft);}
  #pgDash{display:flex;gap:6px;align-items:center;}
  #pgDash .dsh{width:14px;height:2px;background:var(--rule);transition:background .2s;}
  #pgDash .dsh.on{background:var(--ink);}
  #pgDash .dnt{width:3px;height:3px;border-radius:50%;background:var(--rule);transition:background .2s;}
  #pgDash .dnt.on{background:var(--ink);}
  /* the in-panel editor & leaf cards belong to the shared notes column
     (asterlogos.css) — nothing bespoke lives on the node page anymore */
  #pgBody .lvEdit{pointer-events:auto;}
  /* the writing act: one inverted square, one fine glyph (the canonical corner) */
  #plateNote{position:absolute;right:var(--edge-x);bottom:var(--edge-bottom);z-index:6;
    width:var(--control-h);height:var(--control-h);
    display:grid;place-items:center;cursor:pointer;background:var(--ink);color:var(--paper);
    border:1px solid var(--ink);border-radius:var(--control-r);box-shadow:var(--shadow-sm);
    transition:background .18s,box-shadow .2s,transform .2s;}
  #plateNote:hover{background:#000;box-shadow:var(--lift);transform:translateY(-1px);}
  #plateNote:active{transform:scale(0.95);}

  /* the shell is writing on this knot: the reading column yields the recto */
  #plate.writing #platePage,#plate.writing #plateNote,#plate.writing #plateHint{visibility:hidden;}

  /* FULL PAGE — a focused view, the same as the book topology: the sculpture
     is gone and the plate's own furniture (back chip, title, cartouche) steps
     aside, so the panel head becomes the full-width chrome bar (title far
     left, acts far right) and the notes / writing centre on bare paper. */
  #plate.pgfull #plateMount{opacity:0;pointer-events:none;transition:opacity .4s ease;}
  #plate.pgfull #platePage{left:var(--edge-x);right:var(--edge-x);width:auto;
    top:var(--edge-top);bottom:48px;padding:0;}
  #plate.pgfull #pgWrap{justify-content:flex-start;}
  #plate.pgfull #pgBody,#plate.pgfull #pgNav{max-width:680px;width:100%;margin-left:auto;margin-right:auto;}
  #plate.pgfull #pgBody{max-height:none;flex:1;}
  #plate.pgfull #plateTopbar,#plate.pgfull #cartouche,#plate.pgfull #plateHint{opacity:0 !important;pointer-events:none;}

  /* locator cartouche — bottom-left, chart furniture */
  #cartouche{position:absolute;left:30px;bottom:28px;z-index:6;background:var(--paper);
    border:1px solid var(--ink);border-radius:3px;box-shadow:3px 4px 0 rgba(27,25,22,0.12);padding:11px 12px 9px;}
  #cartouche .cHead{font:var(--text-meta);letter-spacing:.24em;text-transform:uppercase;color:var(--ink-mid);margin-bottom:7px;}
  #cartCanvas{display:block;}

  #plateHint{position:absolute;left:29%;bottom:26px;transform:translateX(-50%);z-index:5;pointer-events:none;
    font:var(--text-label);letter-spacing:.28em;text-transform:uppercase;color:var(--ink-soft);
    opacity:.55;transition:opacity .8s;}

  @media (max-width:680px){
    #plateTopbar{left:20px;}
    #platePage{left:0;right:0;top:auto;bottom:0;width:auto;justify-content:flex-end;
      padding:14px 20px 16px;background:var(--paper);border-top:1px solid var(--rule);}
    #pgBody{max-height:34vh;}
    #plateHint,#cartouche,#plateNote{display:none !important;}
  }
  @media (prefers-reduced-motion: reduce){ #plate{transition:none;} }
</style>
</head>
<body>
<div id="stage">
  <div id="mount"></div>
  <svg id="svg">
    <line id="leadline" x1="0" y1="0" x2="0" y2="0" stroke="rgba(27,25,22,0.5)" stroke-width="1"></line>
  </svg>
  <div id="caps"></div>
  <div id="titlecard">
    <div class="t">The Odyssey</div>
    <div class="s">A logbook · touch any island</div>
  </div>
  <div id="hint">Drag to orbit · pinch to zoom · two fingers to pan · tap an island</div>
  <div id="registers">
    <div class="rg">the gods</div>
    <div class="rgl"></div>
    <div class="rg">the sea</div>
    <div class="rgl"></div>
    <div class="rg">the dead</div>
  </div>
  <div id="refresh"></div>
</div>

<!-- FULL-PAGE PLATE: one sculpture, isolated, with its own 3D view -->
<div id="plate" aria-hidden="true">
  <div id="plateMount"></div>
  <div id="plateTopbar">
    <button id="plateBack" type="button" class="btn btn--sheet" aria-label="Back to the atlas">
      <span class="arr">‹</span><span class="lbl">The wandering</span>
    </button>
    <div id="plateHead">
      <div id="plateTitle"></div>
      <div id="platePlace"></div>
    </div>
  </div>

  <!-- the reading page: points (it tells) · your notes · end (where next) -->
  <div id="platePage">
    <div id="pgEyebrow" class="panel-head"><span id="pgLabel" class="ph-label"></span><span id="pgCount" class="ph-count"></span><div id="pgHeadActs" class="ph-acts"></div>
      <button id="pgClose" type="button" class="icon-act ph-close" aria-label="Close the reading" title="Close">
        <svg viewBox="0 0 14 14" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"><path d="M3 3l8 8M11 3l-8 8"/></svg>
      </button></div>
    <div id="pgWrap">
      <div id="pgBody"></div>
      <div id="pgNav">
        <button id="pgPrev" type="button" aria-label="Previous point">‹</button>
        <div id="pgDash"></div>
        <button id="pgNext" type="button" aria-label="Next point">›</button>
      </div>
    </div>
  </div>

  <!-- the writing act — a new page in the stream, right where you stand -->
  <button id="plateNote" type="button" aria-label="Write a note here" title="Write">
    <svg width="17" height="17" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" aria-hidden="true"><path d="M8 2.5v11M2.5 8h11"/></svg>
  </button>

  <!-- locator cartouche: only when the perception is cartographic -->
  <div id="cartouche">
    <div class="cHead">The wandering · where</div>
    <canvas id="cartCanvas"></canvas>
  </div>

  <div id="plateHint">Drag to turn · pinch or scroll to zoom</div>
</div>

<div id="err"></div>

<script>
window.addEventListener('error', function(e){
  var d=document.getElementById('err'); d.style.display='block';
  d.textContent=(d.textContent?d.textContent+'\n':'')+'['+(e.message||e.type)+']';
});
(function(){
  var srcs=[
    'https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js',
    'https://unpkg.com/three@0.128.0/build/three.min.js'
  ];
  function load(i){
    if(i>=srcs.length){
      var d=document.getElementById('err'); d.style.display='block';
      d.textContent='Could not load the 3D library (THREE). Check your connection and reload.';
      var h=document.getElementById('hint'); if(h) h.textContent='3D library failed to load';
      return;
    }
    var s=document.createElement('script');
    s.src=srcs[i];
    s.onload=function(){ if(!window.THREE){ load(i+1); } };
    s.onerror=function(){ load(i+1); };
    document.head.appendChild(s);
  }
  load(0);
})();
</script>
<script>
// the shared cloud engine sits beside the prototypes; resolve it from the
// /prototypes/ segment so clean-URL servers (no trailing slash) still find it
(function(){
  var p=location.pathname, i=p.indexOf('/prototypes/');
  var base=(i>=0)?p.slice(0,i+12):'../';
  document.write('<script src="'+base+'_shared/cloud-engine.js"><\/script>');
})();
</script>

<script>
(function(){
  'use strict';

  /* ============================================================
     THE ODYSSEY — TOPOLOGY  (unchanged cartography)
     The sea is a PLANE; the y-axis is spent once, on the descent
     to the dead. Each knot carries a real lon/lat, projected to x/z.

     E-INK ADAPTATION
     ----------------
     There is no colour here. The eight thematic lenses are told
     apart by MARK — a dot-signature each: filled disc, hollow ring,
     fine stipple, dense cluster, small cross, double-ring, bar,
     open square. Meaning is carried by shape and ink-density, the
     way an engraving or a riso distinguishes fields without hue.
     Everything is dark ink on warm paper. Nothing glows.
     ============================================================ */

  // aspect = thematic lens. We keep the same indices, now mapped to
  // a MARK rather than a colour:
  //   0 xenia        -> open square
  //   1 metis        -> filled disc (the solid, the cunning core)
  //   2 lethe        -> fine stipple (dissolving, forgetting)
  //   3 nostos       -> double ring (the pull, concentric, homeward)
  //   4 recognition  -> small cross (the mark that identifies)
  //   5 embedded tale-> hollow ring (a frame around a void)
  //   6 monstrous    -> dense cluster / heavy blot
  //   7 kleos        -> short bar / stroke (what is inscribed)
  //   8 sea          -> faint pinprick
  //   9 route        -> mid dot (literal path)
  // A perception carries its editor: the reading is signed. Per-knot `by`
  // overrides for multi-voice editions. `reading` is string | string[] —
  // an array is a point sequence, turned one page at a time.
  const READING_BY = 'Constantin Chopin';

  const KNOTS = [
    { id:'troy',    name:'Troy',                 place:'Hisarlık · 39.96°N 26.24°E',   lon:26.24, lat:39.96, aspect:7, kind:'port',
      orient:'The departure. The war is over; the wandering has not yet begun. Everything that follows is measured from here.',
      reading:'Troy is one of the two fixed pins the whole poem hangs between. It is not part of the wandering — it is the thing the wandering is trying to get away from, and the distance back home from here is short on the map and ten years long in the living.' },
    { id:'ismarus', name:'Ismarus',              place:'Cicones · Maroneia, Thrace',   lon:25.52, lat:40.87, aspect:0, kind:'raid',
      orient:'The first landfall, and the first mistake. Still in the known world, still acting like men at war.',
      reading:'The raid on the Cicones is the hinge between the Iliad and the Odyssey: Odysseus behaves as a sacker of cities, and is punished for it. The poem quietly announces that the rules have changed — what worked at Troy will now get his men killed.' },
    { id:'malea',   name:'Cape Malea',           place:'The pivot · storm westward',   lon:23.19, lat:36.43, aspect:3, kind:'pivot',
      orient:'The last familiar water. Round this cape and the map turns strange.',
      reading:'He almost goes straight home. Rounding the southern cape of Greece, a storm seizes the fleet and throws it west, out of the known Aegean into the strange central Mediterranean. One gust converts a short voyage into an odyssey.' },
    { id:'lotus',   name:'The Lotus-Eaters',     place:'Djerba · 33.80°N 10.85°E',     lon:10.85, lat:33.80, aspect:2, kind:'isle',
      orient:'The first temptation. No violence here — only a flower that makes you forget you were going anywhere.',
      reading:'The lotus is the poem’s first taste of its real antagonist: not a monster but amnesia. The danger is not being killed; it is forgetting you wanted to go home at all. Home becomes abstract, a word with no pull.' },
    { id:'cyclops', name:'The Cyclops',          place:'Sicily · Aci Trezza, Etna',    lon:15.16, lat:37.56, aspect:1, kind:'isle',
      orient:'The cave of the one-eyed giant, where strength fails and only cunning gets out.',
      reading:[
        'Against brute force, metis — the turning intelligence that names the hero. Strength fails in the cave; only cunning gets out.',
        'He gives his name as "Nobody," blinds Polyphemus, and escapes beneath a ram. The trick works because he is willing, for one night, to be no one at all.',
        'But pride makes him shout his true name from the ship, and that boast buys him Poseidon’s ten-year grudge. He weaponises identity, and is billed for it.'
      ] },
    { id:'aeolia',  name:'Aeolia',               place:'Stromboli · bag of winds',     lon:15.21, lat:38.79, aspect:3, kind:'isle',
      orient:'The island of the wind-king, and the cruellest near-miss in the poem.',
      reading:'Aeolus bags every contrary wind and gives Odysseus a clear run home; Ithaca rises on the horizon — and the crew, suspecting hidden gold, open the bag. The winds burst out and blow them all the way back. Home reached and home lost, in a single loop.' },
    { id:'laistry', name:'The Laestrygonians',   place:'Bonifacio · the fleet lost',   lon:9.16,  lat:41.39, aspect:6, kind:'isle',
      orient:'The far north of the wandering, where hospitality turns to slaughter and the fleet is destroyed.',
      reading:'The cannibal giants sink eleven of his twelve ships. This is the threshold past which the world stops being human — the point where xenia, guest-friendship, curdles entirely into predation, and Odysseus is left with a single crew.' },
    { id:'circe',   name:'Circe',                place:'Monte Circeo · Aeaea',         lon:13.09, lat:41.24, aspect:2, kind:'isle',
      orient:'The enchantress’s island — a year of ease, and the doorway to the dead.',
      reading:'Circe turns men to swine, then becomes a guide. Her island holds two faces of the same lure: the year of comfortable forgetting, and the instruction that sends him to the underworld. To go home he must first be told to go down.' },
    { id:'nekuia',  name:'The House of the Dead', place:'Avernus · the one descent',   lon:14.07, lat:40.84, aspect:5, kind:'underworld',
      orient:'You leave the surface of the world. The one place the poem’s plane is broken — the thread goes down.',
      reading:'Here, and only here, the poem leaves the surface. He goes down for directions home — to Teiresias, to the shade of his mother, to Achilles, who would rather be a slave alive than a king among the dead. The single vertical move in a horizontal poem is the one that teaches him what living is worth.' },
    { id:'sirens',  name:'The Sirens',           place:'Li Galli · the bound mast',    lon:14.43, lat:40.58, aspect:6, kind:'reef',
      orient:'The singing rocks, where the danger is knowledge itself — and the only safety is being bound.',
      reading:'The Sirens offer not pleasure but total knowing; their song is that they know everything that happened at Troy. Odysseus has himself lashed to the mast so he can hear it and survive. It is the one temptation he chooses to face directly, by making himself unable to act on it.' },
    { id:'scylla',  name:'Scylla & Charybdis',   place:'Strait of Messina',            lon:15.63, lat:38.25, aspect:6, kind:'strait',
      orient:'The strait with no clean passage, where the only choice is which loss to accept.',
      reading:'Between the six-headed Scylla and the whirlpool Charybdis there is no route that costs nothing. He is told in advance: steer for Scylla and lose six men, rather than the ship. At the margins of the world, the only victory is the smaller loss, chosen with open eyes.' },
    { id:'thrina',  name:'Thrinacia',            place:'Sicily · cattle of the Sun',   lon:14.27, lat:37.08, aspect:0, kind:'isle',
      orient:'The Sun’s island, where one act of hunger ends the last of the crew.',
      reading:'Forbidden the cattle of Helios and warned plainly, the starving crew eat them anyway. Every man but Odysseus drowns for it. This is where he becomes truly alone — the last companion gone, the rest of the way home to be made by himself.' },
    { id:'ogygia',  name:'Ogygia',               place:'Gozo · Calypso, seven years',  lon:14.24, lat:36.05, aspect:2, kind:'isle',
      orient:'The far southwest, the end of the wandering — seven years held by a goddess who offers to make him immortal.',
      reading:'Calypso offers the ultimate version of the lure: not a year of forgetting but eternity, deathlessness, oblivion as a gift. He refuses it. He chooses mortal Penelope and a home that can be lost over an immortality without meaning — which is the poem’s deepest answer to what a human life is for.' },
    { id:'scheria', name:'Scheria',              place:'Corfu · the Phaeacians',       lon:19.92, lat:39.62, aspect:5, kind:'court',

      reading:'The wildest stretch — the Cyclops, Circe, the dead, the Sirens — you never hear from Homer. You hear it from Odysseus, telling his story to the Phaeacian court. The teller is inside the telling, and the only witness to the marvels is the man they make a hero.' },

      reading:'Homecoming is not arrival; it is being known. He must be recognised — by his dog, his scar, his bow, and last by Penelope, who tests him with the secret of their immovable bed. The journey ends not at a place but at a moment of being seen. Completion, for this poem, is recognition.' },
  ];

  const ROUTE = [
    'troy','ismarus','malea','lotus','cyclops','aeolia',
    'aeolia','laistry','circe','nekuia','circe',
    'sirens','scylla','thrina','ogygia','scheria','ithaca'
  ];

  const lons = KNOTS.map(k=>k.lon), lats = KNOTS.map(k=>k.lat);
  const lon0 = (Math.min(...lons)+Math.max(...lons))/2;
  const lat0 = (Math.min(...lats)+Math.max(...lats))/2;
  const latRad = lat0*Math.PI/180;
  const SCALE = 0.62;
  function project(lon,lat){
    const x = (lon-lon0)*Math.cos(latRad)*SCALE;
    const z = -(lat-lat0)*SCALE;
    return [x, z];
  }
  KNOTS.forEach(k=>{ const p=project(k.lon,k.lat); k.x=p[0]; k.z=p[1]; });
  let byId = Object.fromEntries(KNOTS.map(k=>[k.id,k]));

  const XS = KNOTS.map(k=>k.x), ZS = KNOTS.map(k=>k.z);
  const EXT = Math.max(
    Math.max(...XS)-Math.min(...XS),
    Math.max(...ZS)-Math.min(...ZS)
  );
  const NEKUIA_DEPTH = -2.7;

  /* ============================================================
     THE THREE REGISTERS
     The sea is the middle plane. Ported from the cosmos topology:
     the gods ride ABOVE the waters they govern, the island-powers
     rest on their own isles just off the surface, Poseidon lies in
     the DEEP beneath his sea, and the dead lie BELOW, under the one
     gate at Avernus. Concepts keep no place — they are readings.
     ============================================================ */
  const SKY_Y=4.6, ISLE_Y=0.5, DEEP_Y=-1.1, UNDER_Y=-3.7;
  const REGY={sky:SKY_Y,isle:ISLE_Y,deep:DEEP_Y,under:UNDER_Y,gate:NEKUIA_DEPTH,sea:0};
  KNOTS.forEach(k=>{ k.reg=(k.kind==='underworld')?'gate':'sea'; });  // episodes: the sea, save the one gate
  function baseYOf(k){ return ((k.reg in REGY)?REGY[k.reg]:0) + (k.lift||0); }

  // a deterministic small offset so co-located figures don't stack (from the cosmos)
  function doff(i,amp){ return [Math.cos(i*2.39996)*amp, Math.sin(i*2.39996*1.7)*amp]; }
  // centroid of a set of episodes, in already-projected x/z
  function epc(ids){ let x=0,z=0; ids.forEach(id=>{ const b=byId[id]; x+=b.x; z+=b.z; }); return [x/ids.length,z/ids.length]; }

  /* ---- THE FIGURES — gods, the dead, and the living. Each is placed by
     GOVERNANCE (a god rides above the waters it touches), never by a real
     coordinate: they carry no lon/lat, so they wear no locator cartouche.
     `at` is ['at',episodeId] or ['cen',[episodeIds]]; `lift` nudges the
     register height; `spread` fans figures that share one anchor. ---- */
  const FIGURES=[
    // — the sky: the Olympians, lifted above the region they govern —
    {id:'zeus',    name:'Zeus',               place:'The scales · justice and the storm',  reg:'sky',  kind:'god',    aspect:0, at:['cen',['ismarus','malea','thrina']], lift:1.1, c:['xenia','hybris']},
    {id:'athena',  name:'Athena',             place:'Grey-eyed · cunning made divine',     reg:'sky',  kind:'god',    aspect:1, at:['cen',['ithaca','scheria']],        lift:0.2, c:['metis','recognition']},
    {id:'hermes',  name:'Hermes',             place:'The messenger · the timely gift',     reg:'sky',  kind:'god',    aspect:1, at:['cen',['circe','ogygia']],          lift:0.6, c:['metis']},
    {id:'helios',  name:'Helios',             place:'The Sun · the inviolable cattle',     reg:'sky',  kind:'god',    aspect:4, at:['at','thrina'],                    lift:0.9, c:['hybris','xenia']},
    {id:'aeolus',  name:'Aeolus',             place:'Keeper of the winds',                 reg:'sky',  kind:'god',    aspect:3, at:['at','aeolia'],                    lift:0.35,c:['nostos']},
    // — the deep: Poseidon, beneath his own waters —
    {id:'poseidon',name:'Poseidon',           place:'Earth-shaker · the wrath that delays',reg:'deep', kind:'power',  aspect:6, at:['cen',['malea','cyclops','scheria']],       c:['margin','hybris']},
    // — the isles: island-powers on their own islands —
    {id:'calypso', name:'Calypso',            place:'The nymph · deathless oblivion',      reg:'isle', kind:'god',    aspect:2, at:['at','ogygia'],                             c:['oblivion','nostos']},
    {id:'kirke',   name:'Circe (the goddess)',place:'Witch and guide',                     reg:'isle', kind:'god',    aspect:2, at:['at','circe'],                              c:['oblivion','metis']},
    // — the dead: below the one gate —
    {id:'hades',   name:'The Dead',           place:'The house of Hades',                  reg:'under',kind:'dead',   aspect:5, at:['at','nekuia'],                             c:['nostos']},
    {id:'anticleia',name:'Anticleia',         place:'His mother, among the dead',          reg:'under',kind:'dead',   aspect:5, at:['at','nekuia'], spread:1, lift:-0.2,        c:['oblivion','nostos']},
    {id:'achilles',name:'Achilles',           place:'The shade who recants',               reg:'under',kind:'dead',   aspect:7, at:['at','nekuia'], spread:2, lift:-0.5,        c:['kleos']},
    {id:'teiresias',name:'Teiresias',         place:'The prophet below',                   reg:'under',kind:'dead',   aspect:3, at:['at','nekuia'], spread:3, lift:-0.3,        c:['nostos','metis']},
    // — the sea: the living, near their principal place —
    {id:'odysseus',name:'Odysseus',           place:'The man of many turns',               reg:'sea',  kind:'person', aspect:1, at:['cen',['troy','cyclops','circe','ithaca']],   c:['metis','nostos']},
    {id:'penelope',name:'Penelope',           place:'The one who waits and tests',         reg:'sea',  kind:'person', aspect:4, at:['at','ithaca'], spread:4,                  c:['recognition','nostos']},
    {id:'telemachus',name:'Telemachus',       place:'The son coming of age',               reg:'sea',  kind:'person', aspect:7, at:['at','ithaca'], spread:5,                  c:['recognition','kleos']},
    {id:'suitors', name:'The Suitors',        place:'The devourers of the house',          reg:'sea',  kind:'person', aspect:6, at:['at','ithaca'], spread:6,                  c:['xenia','hybris']},
    {id:'nausicaa',name:'Nausicaa',           place:'The princess of Scheria',             reg:'sea',  kind:'person', aspect:0, at:['at','scheria'], spread:2,                 c:['xenia','recognition']},
    {id:'crew',    name:'The Crew',           place:'The companions, all lost',            reg:'sea',  kind:'person', aspect:6, at:['cen',['cyclops','sirens','thrina']],        c:['hybris','nostos']},
  ];
  FIGURES.forEach((f,i)=>{
    let x,z;
    if(f.at[0]==='at'){ const b=byId[f.at[1]]; x=b.x; z=b.z; }
    else { const c=epc(f.at[1]); x=c[0]; z=c[1]; }
    if(f.spread){ const o=doff(f.spread+i*0.7,0.85); x+=o[0]; z+=o[1]; }
    f.x=x; f.z=z; f.lon=null; f.lat=null; f.offMap=true;
    KNOTS.push(f);
  });
  byId=Object.fromEntries(KNOTS.map(k=>[k.id,k]));   // rebuild to include the figures

  // ---- the perception's nature: cartographic perceptions carry a locator
  //      cartouche on their plates; other geometries will carry their own ----
  const CARTOGRAPHIC = true;

  // ---- concept memberships (drive the Kindred chips) ----
  const KCON={troy:['kleos'],ismarus:['xenia','hybris'],malea:['nostos'],lotus:['oblivion','nostos'],
    cyclops:['metis','xenia','hybris','margin'],aeolia:['nostos','xenia'],laistry:['margin','xenia'],
    circe:['oblivion','metis'],nekuia:['nostos','recognition'],sirens:['kleos','oblivion'],
    scylla:['margin'],thrina:['hybris','xenia'],ogygia:['oblivion','nostos'],
    scheria:['xenia','recognition'],ithaca:['nostos','recognition']};
  FIGURES.forEach(f=>{ if(f.c) KCON[f.id]=f.c; });   // the figures share the poem's concepts too
  function kindredOf(k){
    const mine=KCON[k.id]||[];
    return KNOTS.map((o,i)=>{ const shared=(KCON[o.id]||[]).filter(c=>mine.indexOf(c)>=0);
        return {o,i,shared,s:shared.length}; })
      .filter(x=>x.o.id!==k.id && x.s>0)
      .sort((a,b)=>b.s-a.s||a.i-b.i).slice(0,3);
  }

  // ---- note objects: the surface's store is the single truth; the old
  //      odyssey_note_/odyssey_log strings are derived (thread + legacy) ----
  function loadObjs(){ try{ return JSON.parse(localStorage.getItem('ast_notes_v2')||'[]'); }catch(e){ return []; } }
  function saveObjs(a){ try{ localStorage.setItem('ast_notes_v2',JSON.stringify(a)); }catch(e){} }
  function syncDerived(){
    const objs=loadObjs();
    KNOTS.forEach(k=>{
      const txt=objs.filter(n=>n.node===k.id).sort((a,b)=>a.ts-b.ts).map(n=>n.text).join('\n\n');
      try{ txt?localStorage.setItem('odyssey_note_'+k.id,txt):localStorage.removeItem('odyssey_note_'+k.id); }catch(e){}
    });
    const order=KNOTS.filter(k=>objs.some(n=>n.node===k.id))
      .sort((a,b)=>Math.min.apply(null,objs.filter(n=>n.node===a.id).map(n=>n.ts))
                  -Math.min.apply(null,objs.filter(n=>n.node===b.id).map(n=>n.ts)))
      .map(k=>k.id);
    try{ localStorage.setItem('odyssey_log',JSON.stringify(order)); }catch(e){}
  }

  // ---- locator cartouche: simplified Mediterranean coastline (lon,lat) ----
  const COASTS=[
    [[12.4,37.8],[13.7,38.1],[15.1,38.25],[15.65,38.0],[15.1,36.8],[14.3,36.7],[12.8,37.1],[12.4,37.8]],      // Sicily
    [[15.65,38.05],[16.2,38.9],[16.6,38.5],[17.1,39.0],[16.5,39.8],[17.5,40.3],[18.4,40.0],[18.0,40.7],[16.8,41.1]], // heel+Adriatic
    [[15.65,38.05],[14.9,40.2],[13.7,41.2],[12.6,41.4],[11.8,42.0]],                                           // Tyrrhenian coast
    [[11.0,37.1],[10.2,36.8],[10.5,35.8],[11.1,35.2],[10.0,34.3],[10.85,33.6],[12.3,32.9],[15.2,32.4],[17.5,31.9],[20.1,32.2],[22.0,32.7],[24.0,32.0]], // Africa
    [[20.0,39.7],[20.7,38.9],[21.1,38.35],[21.6,38.15],[22.4,38.15],[23.2,38.0],[23.0,37.5],[23.15,36.42],[22.5,36.55],[21.9,36.7],[21.7,37.4],[21.1,37.7],[21.3,38.3]], // Greece
    [[20.0,39.7],[19.4,40.3],[19.4,41.0]],                                                                     // Epirus north
    [[26.2,40.0],[26.35,39.5],[26.9,39.0],[26.7,38.4],[27.2,37.9],[27.5,37.0],[28.2,36.7]],                    // Anatolia
    [[23.6,35.2],[24.7,35.4],[25.7,35.3],[26.3,35.2],[25.0,34.9],[23.6,35.2]],                                 // Crete
    [[9.4,41.4],[9.2,42.6],[8.6,42.4],[8.8,41.6],[8.2,40.9],[8.4,39.2],[9.1,39.1],[9.6,40.4],[9.4,41.4]],      // Corsica+Sardinia
    [[14.35,35.95],[14.57,35.83]],                                                                             // Malta
  ];
  function drawCartouche(cv,k){
    const dpr=Math.min(window.devicePixelRatio||1,2);
    const W=206,H=142; cv.width=W*dpr; cv.height=H*dpr; cv.style.width=W+'px'; cv.style.height=H+'px';
    const g=cv.getContext('2d'); g.setTransform(dpr,0,0,dpr,0,0); g.clearRect(0,0,W,H);
    let minX=1e9,maxX=-1e9,minZ=1e9,maxZ=-1e9;
    const acc=(x,z)=>{ if(x<minX)minX=x; if(x>maxX)maxX=x; if(z<minZ)minZ=z; if(z>maxZ)maxZ=z; };
    COASTS.forEach(l=>l.forEach(pt=>{ const q=project(pt[0],pt[1]); acc(q[0],q[1]); }));
    KNOTS.forEach(kk=>{ if(!kk.offMap) acc(kk.x,kk.z); });
    const pad=9, sc=Math.min((W-2*pad)/(maxX-minX),(H-2*pad)/(maxZ-minZ));
    const ox=(W-(maxX-minX)*sc)/2, oz=(H-(maxZ-minZ)*sc)/2;
    const X=x=>ox+(x-minX)*sc, Y=z=>oz+(z-minZ)*sc;
    g.fillStyle='rgba(27,25,22,0.36)';
    COASTS.forEach(line=>{ for(let i=0;i<line.length-1;i++){
      const a=project(line[i][0],line[i][1]), b=project(line[i+1][0],line[i+1][1]);
      const ax=X(a[0]),ay=Y(a[1]),bx=X(b[0]),by=Y(b[1]);
      const n=Math.max(1,Math.round(Math.hypot(bx-ax,by-ay)/2.4));
      for(let s=0;s<=n;s++){ const f=s/n;
        g.beginPath(); g.arc(ax+(bx-ax)*f+(Math.random()-0.5),ay+(by-ay)*f+(Math.random()-0.5),0.65,0,7); g.fill(); } } });
    g.fillStyle='rgba(27,25,22,0.28)';
    for(let i=0;i<ROUTE.length-1;i++){ const a=byId[ROUTE[i]], b=byId[ROUTE[i+1]];
      const ax=X(a.x),ay=Y(a.z),bx=X(b.x),by=Y(b.z);
      const n=Math.max(1,Math.round(Math.hypot(bx-ax,by-ay)/4.5));
      for(let s=0;s<=n;s++){ const f=s/n; g.beginPath(); g.arc(ax+(bx-ax)*f,ay+(by-ay)*f,0.55,0,7); g.fill(); } }
    g.fillStyle='rgba(27,25,22,0.5)';
    KNOTS.forEach(kk=>{ if(kk.offMap) return; g.beginPath(); g.arc(X(kk.x),Y(kk.z),1.1,0,7); g.fill(); });
    g.strokeStyle='#1b1916'; g.lineWidth=1.1; g.beginPath(); g.arc(X(k.x),Y(k.z),4.6,0,7); g.stroke();
    g.fillStyle='#1b1916'; g.beginPath(); g.arc(X(k.x),Y(k.z),1.9,0,7); g.fill();
  }

  // ============================================================
  //  LITERAL SCULPTURES — one volumetric metaphor per knot.
  //  Module-scope so BOTH the atlas map and the full-page plate can
  //  build them. Each builder receives (k, e) where
  //  e(dx,dy,dz,size,mark,colOverride) places a point in LOCAL space
  //  (origin-centred); the caller decides where that origin sits and
  //  at what scale. Figures of people are rendered by ATTRIBUTE.
  //  mark ids: 1 disc,2 stipple,3 dblring,4 cross,5 ring,6 blot,
  //            7 bar,8 square,9 routedot,0 pinprick
  // ============================================================
  // ---- geometry + stroke helpers — shared with every perception via
  //      the cloud engine (../_shared/cloud-engine.js). The treatment:
  //      many SMALL points tracing edges and surfaces, never fat fills;
  //      full-ink accents kept rare. Strokes are dense point-runs. ----
  const {R,gj,sdir,pRing,pDisc,pCone,pConeShell,pCol,pWall,pProfile,pProfileShell,
         pEll,stroke,strokeD,seg,segD,IFK}=window.CloudEngine;

  const SCULPT = {
    // 1 · TROY — the walled city, breached — and the horse inside it
    troy(k,e){
      for(let i=0;i<460;i++){ const t=R()*6.2831;
        if(Math.abs(((t+Math.PI)%6.2831)-Math.PI)<0.42 && R()<0.8) continue;   // the breach
        const rr=0.62+gj(0.025); e(Math.cos(t)*rr, R()*0.4, Math.sin(t)*rr, 1.05, 8); }
      for(let h=0;h<5;h++){ const a=0.6+h/5*5.1;                                // towers clear of the breach
        for(let i=0;i<26;i++){ e(Math.cos(a)*0.62+gj(0.025), R()*0.62, Math.sin(a)*0.62+gj(0.025), 1.3, 8); } }
      // the horse: body, four legs, arched neck, head — full ink, the dark heart of the ring
      pEll(e,0,0.46,0,0.21,0.11,0.1,170,1.15,1,IFK);
      [[0.14,0.055],[0.14,-0.055],[-0.14,0.055],[-0.14,-0.055]].forEach(L=>{
        seg(e,[L[0],0.38,L[1]],[L[0],0.03,L[1]],24,1.1,1,IFK,0.005); });
      stroke(e,f=>[0.18+f*0.1, 0.52+f*0.17, 0],18,1.1,1,IFK,0.006);             // neck
      pEll(e,0.31,0.71,0,0.07,0.035,0.035,44,1.15,1,IFK);                       // head, nose forward
      e(0.36,0.72,0,2.2,1,IFK);                                                 // the eye — one accent
      for(let i=0;i<80;i++){ const p=pDisc(0.5,0); e(p[0],0.02,p[2],1.1,0); }
    },
    // 2 · ISMARUS — the citadel afire: intact wall, flame-strokes, one bent smoke column
    ismarus(k,e){
      for(let i=0;i<280;i++){ const p=pWall(0.4,0.26,0.025); e(p[0],p[1],p[2],1.1,8); }
      for(let i=0;i<30;i++){ const a=R()*6.2831, rr=R()*0.3;                    // flames inside
        seg(e,[Math.cos(a)*rr,0.26,Math.sin(a)*rr],[Math.cos(a)*rr+gj(0.03),0.44+R()*0.14,Math.sin(a)*rr+gj(0.03)],9,1.05,7,IFK,0.008); }
      stroke(e,f=>{                                                             // the smoke, bending east
        return [f*f*0.55, 0.4+f*1.5, f*0.18]; },130,0.95,2,null,0.05);
      for(let i=0;i<110;i++){ const f=R(); const v=0.34+0.34*f;
        e(f*f*0.55+gj(0.1), 0.4+f*1.5, f*0.18+gj(0.1), 0.8+0.5*(1-f), 2, [v,v*0.97,v*0.92]); }
      for(let i=0;i<80;i++){ const p=pDisc(0.38,0); e(p[0],0.02,p[2],1.1,0); }
    },
    // 3 · CAPE MALEA — the waterspout: one tight helix, spray flung off its head
    malea(k,e){
      stroke(e,f=>{ const a=f*9.0, r=0.5*(1-0.72*f);
        return [Math.cos(a)*r, 0.06+f*1.5, Math.sin(a)*r]; },420,1.0,2,null,0.014);
      for(let s=0;s<3;s++){ const a0=s/3*6.2831;
        stroke(e,f=>[Math.cos(a0+f*1.4)*(0.14+f*0.42), 1.5+f*0.16, Math.sin(a0+f*1.4)*(0.14+f*0.42)],28,0.9,2,null,0.014); }
      for(let i=0;i<100;i++){ const p=pRing(0.58,0.06,0.03); e(p[0],p[1],p[2],1.0,0); }
    },
    // 4 · LOTUS-EATERS — the flower drawn: eight petal-outlines, tips lifted, a dark boss
    lotus(k,e){
      const petals=8;
      for(let pI=0;pI<petals;pI++){ const a=pI/petals*6.2831, ca=Math.cos(a), sa=Math.sin(a);
        const pca=Math.cos(a+1.5708), psa=Math.sin(a+1.5708);
        [1,-1].forEach(side=>{ stroke(e,f=>{                                   // petal edge curves
          const len=0.12+f*0.46, w=side*0.13*Math.sin(f*Math.PI), lift=0.05+0.2*f*f;
          return [ca*len+pca*w, lift, sa*len+psa*w]; },30,1.0,2,null,0.006); });
        stroke(e,f=>[ca*(0.12+f*0.46), 0.05+0.2*f*f, sa*(0.12+f*0.46)],16,0.85,2,null,0.005); // vein
      }
      for(let i=0;i<60;i++){ const p=pDisc(0.09,0); e(p[0],0.1+R()*0.07,p[2],1.9,1,IFK); }  // boss
      for(let i=0;i<70;i++){ const p=pRing(0.58,0.04,0.02); e(p[0],0.02,p[2],1.0,0); }
    },
    // 5 · CYCLOPS — the one-eyed mountain: a bare shell now, the eye its only weight
    cyclops(k,e){
      const H=1.5, RB=0.7, eyeY=H*0.62, eyeR=0.24;
      for(let i=0;i<980;i++){ const p=pConeShell(RB,H,0.03);
        if(Math.hypot(p[0],p[1]-eyeY,p[2])<eyeR) continue;
